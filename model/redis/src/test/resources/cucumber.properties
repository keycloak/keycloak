# Cucumber Configuration Properties

# Pretty print output
cucumber.publish.quiet=true
cucumber.ansi-colors.disabled=false

# Snippet format (camelCase method names)
cucumber.snippet-type=camelcase

# Plugin configuration
cucumber.plugin=\
  pretty,\
  html:target/cucumber-reports/cucumber.html,\
  json:target/cucumber-reports/cucumber.json,\
  junit:target/cucumber-reports/cucumber.xml

# Feature file location
cucumber.features=src/test/resources/features

# Step definitions package
cucumber.glue=org.keycloak.models.redis.steps

# Filter tags (comment out to run all)
# cucumber.filter.tags=@critical

# Object factory (if using dependency injection)
# cucumber.object-factory=io.cucumber.picocontainer.PicoFactory
