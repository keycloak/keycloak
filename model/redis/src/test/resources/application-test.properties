# Common Test Configuration
# This file contains properties shared across all test environments.
# Environment-specific properties (Redis/Keycloak connection details) are in:
#   - application-test-standalone.properties (local development)
#   - application-test-docker-cluster.properties (Docker cluster testing)

# Keycloak Admin Credentials
keycloak.admin.username=admin
keycloak.admin.password=admin

# Test Realm Configuration
test.realm.name=test-realm

# Test Client Configuration
test.client.default=test-client
test.client.1=client-1
test.client.2=client-2

# Test User Configuration
test.user.default=testuser
test.user.2=testuser2
test.user.3=testuser3

# Default test password for all users
test.user.default.password=Test123!

# Test Timeouts (in seconds)
test.timeout.short=5
test.timeout.medium=6
test.timeout.long=180
