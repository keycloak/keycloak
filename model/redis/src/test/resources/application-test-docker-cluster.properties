# Docker Cluster Test Environment Configuration
# This file contains environment-specific properties for Docker cluster testing.
# Common properties are loaded from application-test.properties
# Uses internal Docker hostnames that resolve within the Docker network

# Redis Cluster Connection Configuration (Inside Docker Network)
redis.host=redis-cluster-1
redis.port=6379
redis.cluster.enabled=true

# Keycloak Configuration (Internal Docker Network)
keycloak.base.url=http://keycloak-test:8080
