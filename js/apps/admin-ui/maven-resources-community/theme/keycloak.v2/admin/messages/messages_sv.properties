periodicFullSyncHelp=Om "Importera användare" är aktiverat startas en periodisk uppgift för att synkronisera användare från LDAP till Keycloak. Denna typ av synkronisering hämtar alla användare från LDAP vid varje körning och importerar nya användare eller uppdaterar befintliga. Om du har ett stort antal användare i LDAP kan detta vara ineffektivt. I så fall kan du avaktivera det här alternativet och använda "Periodisk synkronisering av ändrade användare" istället.
periodicChangedUsersSyncHelp=Om "Importera användare" är aktiverat startas en periodisk uppgift för att synkronisera användare från LDAP till Keycloak baserat på deras skapade eller senast uppdaterade tidsstämplar. Denna typ av synkronisering är mer effektiv än en fullständig synkronisering, särskilt om du har ett stort antal användare i LDAP. Det kräver dock att LDAP-servern stöder sökning med hjälp av attributen "createTimestamp" och "modifyTimestamp" i frågepredikaten.
signatureAlgorithmHelp=Den signaturalgoritm som ska användas för att signera dokument. Observera att "SHA1"-baserade algoritmer är föråldrade och kan tas bort i framtiden. Det rekommenderas att hålla sig till någon säkrare algoritm i stället för "*_SHA1".
