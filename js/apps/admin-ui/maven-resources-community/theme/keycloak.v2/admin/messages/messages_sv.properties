hideOnLoginWhenOrgNotResolved=Dölj på inloggningssidan när organisationen inte är löst
hideOnLoginWhenOrgNotResolvedHelp=Om den är aktiverad döljs identitetsleverantören på inloggningssidan när organisationen inte kan lösas baserat på användarens e-postdomän. I annat fall visas identitetsleverantören på inloggningssidan oavsett om organisationen kan identifieras eller inte. Om "Dölj på inloggningssidan" också är aktiverat kommer identitetsleverantören alltid att döljas på inloggningssidan.
