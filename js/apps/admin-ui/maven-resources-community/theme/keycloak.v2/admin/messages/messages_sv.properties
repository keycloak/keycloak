samlClientEncryptionDigestMethodHelp=Digest-metod som ska användas när någon RSA-OAEP-algoritm väljs som algoritm för nyckeltransport. Standardvärdet är SHA-256.
samlClientEncryptionMaskGenerationFunction=Funktion för generering av mask
samlClientEncryptionMaskGenerationFunctionHelp=Maskgenereringsfunktion som ska användas när RSA-OAEP-11 väljs som algoritm för nyckeltransport. Standardvärde mgf1sha256.
openIdVerifiableCredentials=OpenID för verifierbara autentiseringsuppgifter
openIdVerifiableCredentialsHelp=Det här avsnittet används för att konfigurera inställningar relaterade till OpenID för verifierbar legitimationsutfärdande (OID4VCI).
oid4vciEnabled=Aktivera OID4VCI
oid4vciEnabledHelp=Aktivera det här alternativet om du vill att klienten ska kunna begära verifierbara autentiseringsuppgifter från Keycloaks OID4VCI-ändpunkt för autentiseringsuppgifter.
noAccessPolicies=Ingen åtkomstpolicy
noAccessPoliciesInstructions=Det har inte konfigurerats några åtkomstpolicyer ännu. Klicka på knappen nedan för att konfigurera den första policyn.
includeInOpenIdProviderMetadata=Inkludera i metadata för OpenID-leverantör
includeInOpenIdProviderMetadataHelp=Om den är aktiverad kommer detta klient scope att inkluderas i OpenID Provider Metadata.
invalid_request=Ogiltig begäran
unauthorized_client=Obehörig klient
access_denied=Åtkomst nekad
unsupported_response_type=Svarstyp som inte stöds
invalid_scope=Ogiltig scope
server_error=Fel på servern
temporarily_unavailable=Temporärt ej tillgänglig
interaction_required=Interaktion krävs
login_required=Inloggning krävs
account_selection_required=Val av konto krävs
consent_required=Samtycke krävs
invalid_request_uri=Ogiltig uri för begäran
invalid_request_object=Ogiltigt objekt för begäran
request_not_supported=Begäran stöds inte
request_uri_not_supported=Request uri stöds inte
registration_not_supported=Registrering stöds inte
oid4vciAttributes=OID4VCI-attribut
oid4vciNonceLifetime=OID4VCI Nonce Livslängd
oid4vciNonceLifetimeHelp=Livslängden för OID4VCI-noncen.
preAuthorizedCodeLifespan=Förhandsauktoriserad kod Livslängd
preAuthorizedCodeLifespanHelp=Livslängden för den förauktoriserade koden.
oid4vciFormValidationError=Se till att attributfälten för OID4VCI fylls i med värden som är 30 sekunder eller större.
signedIssuerMetadata=Metadata för signerad utfärdare
signedIssuerMetadataHelp=Aktivera signering av emittentens metadata. När detta är aktiverat kommer utfärdarens metadata att signeras med hjälp av den konfigurerade signeringsalgoritmen.
signedMetadataLifespan=Livslängd för signerade metadata
signedMetadataLifespanHelp=Livslängden för de signerade metadata. Efter denna tid kommer de signerade metadata att upphöra att gälla.
signedMetadataSigningAlgorithm=Signerade metadata Signeringsalgoritm
signedMetadataSigningAlgorithmHelp=Den algoritm som används för att signera utfärdarens metadata. Detta säkerställer metadatas integritet och äkthet.
requireEncryption=Kräv kryptering
requireEncryptionHelp=Om funktionen är aktiverad krävs kryptering för begäran om autentiseringsuppgifter. Klienter måste kryptera sina begäranden med hjälp av de krypteringsalgoritmer som stöds.
enableDeflateCompression=Aktivera DEF-komprimering
enableDeflateCompressionHelp=Om den är aktiverad stöds DEF-komprimeringsalgoritmen för begäran om autentiseringsuppgifter. Detta gör att klienter kan komprimera sina begäranden för att minska storleken på nyttolasten.
batchIssuanceSize=Storlek på utskick av batch
batchIssuanceSizeHelp=Det maximala antalet autentiseringsuppgifter som kan utfärdas i en enda batchbegäran. Detta hjälper till att hantera serverbelastning och svarstider.
timeClaimCorrelationMitigation=Begränsning av korrelation mellan tidsanspråk
timeClaimsStrategy=Strategi att tillämpa på tidsanspråk
timeClaimsStrategyHelp=Strategi för att tillämpa på tidsanspråk. Värden som stöds: off, randomisera, runda.
randomizeWindow=Fönster för slumpmässighet
randomizeWindowHelp=När strategin är randomize subtraheras ett slumpmässigt antal sekunder mellan 0 och värdet för detta attribut från den ursprungliga tidsstämpeln för att motverka korrelationsattacker.
roundUnit=Rund enhet
roundUnitHelp=När strategy är round, trunkeras tidsstämplar till den valda enhetsgränsen (UTC). Värden som stöds: SEKUND, MINUT, TIMME, DAG.
randomize=Randomisera
round=Runda
second=Andra
day=Dag
attestationTrust=Intygsförtroende
trustedKeyIds=Betrodda nyckel-ID:n
trustedKeyIdsHelp=Kommaseparerad lista över nyckel-ID:n (kid) från realmens nyckelarkiv. Dessa nycklar är betrodda för validering av plånboksattesteringar.
trustedKeys=Betrodda nycklar (JSON)
trustedKeysHelp=En JSON-array med JWK-objekt. Dessa nycklar är betrodda för validering av plånboksattesteringar utöver realm-nycklar.
credentialConfigurationId=ID för konfiguration av referenser
credentialConfigurationIdHelp=Den unika identifieraren för denna behörighetskonfiguration. Detta ID används i metadata för referensutfärdaren och i referensbegäran.
credentialIdentifier=Legitimationsidentifierare
credentialIdentifierHelp=En specifik identifierare för denna typ av referenser. Detta kan användas för att skilja mellan olika varianter av samma typ av referenser.
issuerDid=Emittent DID
issuerDidHelp=Den decentraliserade identifieraren (DID) för utfärdaren av referenserna. Detta identifierar vem som utfärdar de verifierbara referenserna.
credentialLifetime=Credential Lifetime (sekunder)
credentialLifetimeHelp=Legitimationens livslängd i sekunder. Efter den här tiden upphör inloggningsuppgifterna att gälla och blir ogiltiga.
supportedFormats=Format som stöds
supportedFormatsHelp=Formatet för den verifierbara referensen. Format som för närvarande stöds: SD-JWT VC (dc+sd-jwt), JWT VC (jwt_vc).
credentialDisplay=Visning av referenser
credentialDisplayHelp=JSON-array med objekt som innehåller visningsmetadata för plånböcker (namn, logotyp, färger etc.). Exempel: [{"namn: [{"name": "IdentityCredential", "locale": "en-US", "logo": {"uri": "https://example.com/logo.png", "alt_text": "Logo"},"background_color": "#12107c", "text_color": "#FFFFFF"}]
credentialSigningAlgorithm=Algoritm för legitimeringssignering
credentialSigningAlgorithmHelp=Signeringsalgoritm som används för att signera autentiseringsuppgifter (t.ex. "ES256"). Lämna tomt om du vill använda standardvärdena för realm som härleds från tillgängliga nycklar.
hashAlgorithm=Hash-algoritm
hashAlgorithmHelp=Hashalgoritm som används för SD-JWT-autentiseringsuppgifter (t.ex. "SHA-256"). Standardvärdet är "SHA-256" om det inte anges.
supportedCredentialTypes=Typer av referenser som stöds
supportedCredentialTypesHelp=Kommaseparerad lista över typer av referenser (t.ex. "VerifiableCredential,UniversityDegreeCredential"). Används i referensdefinitionen för JWT VC och SD-JWT-format. Om detta alternativ inte konfigureras kommer namnet på klient scope att användas som ett "type"-krav för motsvarande referens.
verifiableCredentialType=Verifierbar typ av referenser (VCT)
verifiableCredentialTypeHelp=Identifierare av referenstyp för SD-JWT-format. Detta värde används i vct-anspråket för den utfärdade referensen. Krävs för SD-JWT-format.
tokenJwsType=Token JWS Typ
tokenJwsTypeHelp=Typvärdet som skrivs in i JWT:s typhuvud. Standardvärdet är "JWS". Kan ställas in på anpassade värden som "dc+sd-jwt" om det krävs av plånboken eller systemet.
visibleClaims=Synliga anspråk
visibleClaimsHelp=Kommaseparerad lista över påståenden som alltid redovisas i SD-JWT-kroppen (t.ex. "id,iat,nbf,exp,jti,given_name"). Standardvärde är "id,iat,nbf,exp,jti". Gäller endast för SD-JWT-format.
signingKeyId=Signeringsnyckel ID
signingKeyIdHelp=Valfritt. ID för den nyckel i realm som används för att signera referensen. Om det inte anges kommer realmens aktiva signeringsnyckel för den algoritm som anges i "Credential Signing Algorithm" (om den är inställd) att användas automatiskt. Om detta alternativ anges rekommenderas det starkt att även ange "Credential Signing Algorithm" eftersom ID:t för signeringsnyckeln måste vara för den algoritm som anges i det alternativet.
useDefaultKey=Använd standard (realmens aktiva signeringsnyckel)
workflows=Arbetsflöden
titleWorkflows=Arbetsflöden
workflowsExplain=Arbetsflöden gör det möjligt för administratörer att automatisera hanteringen av realm-resurser genom tidsbaserade eller händelsebaserade policyer.
createWorkflow=Skapa arbetsflöde
workflowYAML=Arbetsflöde YAML
workflowYAMLHelp=YAML-representationen av arbetsflödet.
emptyWorkflows=Inga arbetsflöden
emptyWorkflowsInstructions=Det finns inga arbetsflöden i denna domän. Skapa ett arbetsflöde för att komma igång.
emptyUserWorkflowsInstructions=Det finns inga arbetsflöden schemalagda för den här användaren.
workflowCreated=Arbetsflödet har skapats.
workflowCreateError=Det gick inte att skapa arbetsflödet: {{error}}
workflowDeleteConfirm=Ta bort arbetsflöde?
workflowDeleteConfirmDialog=Denna åtgärd tar bort arbetsflödet permanent. Detta kan inte ångras.
workflowNameRequired=Arbetsflödets namn är obligatoriskt.
workflowDeletedSuccess=Arbetsflödet har tagits bort.
workflowDeleteError=Det gick inte att ta bort arbetsflödet: {{error}}
updateWorkflow=Uppdatera arbetsflödet
copyWorkflow=Arbetsflöde för kopiering
workflowDetails=Detaljer om arbetsflödet
updateWorkflowDetails=För närvarande kan arbetsflöden inte redigeras, förutom att ändra namn och aktivera/inaktivera. Du kan kopiera arbetsflödet och redigera kopian.
copyWorkflowDetails=Du ska nu skapa ett nytt arbetsflöde baserat på ett befintligt.
createWorkflowDetails=Skapa ett nytt arbetsflöde genom att tillhandahålla dess JSON-representation.
workflowEnabled=Arbetsflöde aktiverat
workflowDisabled=Arbetsflöde inaktiverat
workflowUpdated=Arbetsflödet uppdaterades framgångsrikt
workflowUpdateError=Det gick inte att uppdatera arbetsflödet: {{error}}
step=Steg
