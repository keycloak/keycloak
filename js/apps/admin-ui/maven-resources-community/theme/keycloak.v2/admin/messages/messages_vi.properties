workflows=Workflows
titleWorkflows=Workflows
workflowsExplain=Workflows cho phép quản trị viên tự động hóa việc quản lý tài nguyên realm thông qua chính sách dựa trên thời gian hoặc dựa trên sự kiện.
createWorkflow=Tạo workflow
workflowYAML=Workflow YAML
workflowYAMLHelp=Biểu diễn YAML của workflow.
emptyWorkflows=Không có workflow nào
emptyWorkflowsInstructions=Không có workflow nào trong realm này. Vui lòng tạo workflow để bắt đầu.
emptyUserWorkflowsInstructions=Không có workflow nào được lập lịch cho người dùng này.
workflowCreated=Workflow đã được tạo.
workflowCreateError=Không thể tạo workflow\: {{error}}
workflowDeleteConfirm=Xóa workflow?
workflowDeleteConfirmDialog=Hành động này sẽ xóa vĩnh viễn workflow. Không thể hoàn tác.
workflowNameRequired=Tên workflow là bắt buộc.
workflowDeletedSuccess=Workflow đã được xóa.
workflowDeleteError=Không thể xóa workflow\: {{error}}
updateWorkflow=Cập nhật workflow
copyWorkflow=Sao chép workflow
workflowDetails=Chi tiết workflow
updateWorkflowDetails=Hiện tại, workflow không thể chỉnh sửa ngoại trừ thay đổi tên và bật/tắt. Bạn có thể sao chép workflow và chỉnh sửa bản sao.
copyWorkflowDetails=Bạn sắp tạo workflow mới dựa trên workflow hiện có.
createWorkflowDetails=Tạo workflow mới bằng cách cung cấp biểu diễn JSON của nó.
workflowEnabled=Workflow đã bật
workflowDisabled=Workflow đã tắt
workflowUpdated=Đã cập nhật workflow thành công
workflowUpdateError=Không thể cập nhật workflow\: {{error}}
step=Bước
