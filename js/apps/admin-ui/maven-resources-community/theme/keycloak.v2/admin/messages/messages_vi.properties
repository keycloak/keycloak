completed=Hoàn thành
whichWorkflowsWillAppear=Workflow nào sẽ xuất hiện trong danh sách này?
whichWorkflowsWillAppearDetail=Workflow cho người dùng này với ít nhất một bước đang chờ sẽ xuất hiện. Một số workflow đã hoàn thành hoàn toàn cũng có thể xuất hiện nếu bộ lập lịch chưa dọn dẹp chúng.
