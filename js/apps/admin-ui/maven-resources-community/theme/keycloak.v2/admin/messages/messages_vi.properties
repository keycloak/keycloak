hideOnLoginWhenOrgNotResolvedHelp=Nếu bật, identity provider sẽ bị ẩn trên trang đăng nhập khi tổ chức không thể được phân giải dựa trên miền email của người dùng. Ngược lại, identity provider sẽ hiển thị trên trang đăng nhập bất kể tổ chức có được phân giải hay không. Nếu 'Ẩn trên trang đăng nhập' cũng bật, identity provider sẽ luôn bị ẩn trên trang đăng nhập.
