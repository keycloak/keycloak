account_selection_required=Yêu cầu chọn tài khoản
consent_required=Yêu cầu đồng ý
invalid_request_uri=Request uri không hợp lệ
invalid_request_object=Request object không hợp lệ
request_not_supported=Request không được hỗ trợ
request_uri_not_supported=Request uri không được hỗ trợ
registration_not_supported=Đăng ký không được hỗ trợ
oid4vciAttributes=Thuộc tính OID4VCI
oid4vciNonceLifetime=Thời hạn Nonce OID4VCI
oid4vciNonceLifetimeHelp=Thời hạn của nonce OID4VCI.
oid4vciFormValidationError=Vui lòng đảm bảo các trường thuộc tính OID4VCI được điền giá trị 30 giây hoặc lớn hơn.
signedMetadataLifespan=Thời hạn Signed Metadata
signedMetadataLifespanHelp=Thời hạn của signed metadata. Sau thời gian này, signed metadata sẽ hết hạn.
signedMetadataSigningAlgorithm=Thuật toán ký Signed Metadata
signedMetadataSigningAlgorithmHelp=Thuật toán dùng để ký metadata issuer. Điều này đảm bảo tính toàn vẹn và xác thực của metadata.
enableDeflateCompression=Bật nén DEF
enableDeflateCompressionHelp=Nếu bật, thuật toán nén DEF được hỗ trợ cho yêu cầu credential. Điều này cho phép client nén yêu cầu để giảm kích thước payload.
batchIssuanceSize=Kích thước Batch Issuance
batchIssuanceSizeHelp=Số lượng credential tối đa có thể được cấp trong một yêu cầu batch duy nhất. Điều này giúp quản lý tải server và thời gian phản hồi.
timeClaimCorrelationMitigation=Giảm thiểu tương quan time-claim
timeClaimsStrategy=Chiến lược áp dụng cho time claim
timeClaimsStrategyHelp=Chiến lược áp dụng cho time claim. Giá trị được hỗ trợ\: off, randomize, round.
randomizeWindow=Cửa sổ Randomize
randomizeWindowHelp=Khi chiến lược là randomize, trừ một số giây ngẫu nhiên giữa 0 và giá trị của thuộc tính này khỏi timestamp gốc để giảm thiểu tấn công tương quan.
roundUnit=Đơn vị Round
roundUnitHelp=Khi chiến lược là round, cắt ngắn timestamp đến ranh giới đơn vị đã chọn (UTC). Giá trị được hỗ trợ\: SECOND, MINUTE, HOUR, DAY.
randomize=Randomize
round=Round
second=Giây
day=Ngày
attestationTrust=Attestation Trust
trustedKeyIds=Trusted Key IDs
trustedKeyIdsHelp=Danh sách phân cách bằng dấu phẩy của Key IDs (kid) từ keystore realm. Các khóa này được tin cậy để xác thực wallet attestation.
trustedKeys=Trusted Keys (JSON)
trustedKeysHelp=Mảng JSON của đối tượng JWK. Các khóa này được tin cậy để xác thực wallet attestation ngoài khóa realm.
# OID4VCI Credential Configuration
credentialConfigurationId=Credential Configuration ID
credentialConfigurationIdHelp=Định danh duy nhất cho cấu hình credential này. ID này được dùng trong metadata credential issuer và yêu cầu credential.
credentialIdentifier=Credential Identifier
credentialIdentifierHelp=Định danh cụ thể cho loại credential này. Có thể dùng để phân biệt giữa các biến thể khác nhau của cùng loại credential.
issuerDid=Issuer DID
issuerDidHelp=Decentralized Identifier (DID) của issuer credential. Điều này xác định ai là người cấp verifiable credentials.
credentialLifetime=Thời hạn Credential (giây)
credentialLifetimeHelp=Thời hạn của credential tính bằng giây. Sau thời gian này, credential sẽ hết hạn và trở nên không hợp lệ.
bindingRequired=Yêu cầu ràng buộc mật mã
bindingRequiredHelp=Nếu bật, cấu hình credential này yêu cầu cryptographic holder binding và các bằng chứng tương ứng. Nếu tắt, không yêu cầu ràng buộc mật mã và metadata liên quan sẽ bị bỏ qua.
cryptographicBindingMethodsSupported=Phương thức ràng buộc mật mã được hỗ trợ
cryptographicBindingMethodsSupportedHelp=Danh sách phân cách bằng dấu phẩy của các biểu diễn vật liệu khóa mật mã mà credential sẽ bị ràng buộc (ví dụ\: jwk). Nếu trống, không có phương thức ràng buộc mật mã nào sẽ được quảng bá.
cryptographicBindingMethodsSupportedInvalid=Phương thức ràng buộc không được hỗ trợ\: {{invalid}}. Giá trị cho phép\: jwk
bindingSupportedProofTypes=Loại proof được hỗ trợ
bindingSupportedProofTypesHelp=Danh sách phân cách bằng dấu phẩy của loại proof được chấp nhận khi cryptographic binding bật (ví dụ\: jwt). Nếu trống, không có loại proof nào sẽ được quảng bá và proof sẽ không được thực thi.
bindingSupportedProofTypesInvalid=Loại proof không được hỗ trợ\: {{invalid}}. Giá trị cho phép\: jwt, attestation
supportedFormats=Định dạng được hỗ trợ
supportedFormatsHelp=Định dạng của verifiable credential. Định dạng hiện được hỗ trợ\: SD-JWT VC (dc+sd-jwt), JWT VC (jwt_vc).
credentialDisplay=Hiển thị Credential
credentialDisplayHelp=Mảng JSON của đối tượng chứa metadata hiển thị cho wallet (tên, logo, màu sắc, v.v.). Ví dụ\: [{"name": "IdentityCredential", "locale": "en-US", "logo": {"uri": "https://example.com/logo.png", "alt_text": "Logo"}, "background_color": "#12107c", "text_color": "#FFFFFF"}]
credentialSigningAlgorithm=Thuật toán ký Credential
credentialSigningAlgorithmHelp=Thuật toán ký dùng để chọn khóa realm hoạt động để ký credential (ví dụ "ES256"). Nếu không chỉ định, khóa hoạt động sẽ được chọn bằng thuật toán mặc định của realm. Tùy chọn này bị tắt nếu chọn 'Signing Key ID' cụ thể.
hashAlgorithm=Thuật toán Hash
hashAlgorithmHelp=Thuật toán hash dùng cho credential SD-JWT (ví dụ "SHA-256"). Mặc định là "SHA-256" nếu không chỉ định.
supportedCredentialTypes=Loại Credential được hỗ trợ
supportedCredentialTypesHelp=Danh sách phân cách bằng dấu phẩy của loại credential (ví dụ "VerifiableCredential,UniversityDegreeCredential"). Dùng trong định nghĩa credential cho định dạng JWT VC và SD-JWT. Khi tùy chọn này không được cấu hình, tên của client scope sẽ được dùng làm claim 'type' của credential tương ứng.
verifiableCredentialType=Verifiable Credential Type (VCT)
verifiableCredentialTypeHelp=Định danh loại credential cho credential định dạng SD-JWT. Giá trị này được dùng trong claim vct của credential được cấp. Bắt buộc cho định dạng SD-JWT.
tokenJwsType=Token JWS Type
tokenJwsTypeHelp=Giá trị type được ghi vào header typ của JWT. Nếu trống, giá trị mặc định theo định dạng sẽ được dùng ("dc+sd-jwt" cho SD-JWT VC và "vc+jwt" cho JWT VC). Có thể đặt giá trị tùy chỉnh nếu wallet hoặc hệ thống yêu cầu.
tokenJwsTypeFormatWarning=Token JWS Type đã cấu hình không khớp với giá trị khuyến nghị cho định dạng credential đã chọn. Giá trị khuyến nghị\: {{recommended}}.
visibleClaims=Claim hiển thị
visibleClaimsHelp=Danh sách phân cách bằng dấu phẩy của claim luôn được tiết lộ trong body SD-JWT (ví dụ "id,iat,nbf,exp,jti,given_name"). Mặc định là "id,iat,nbf,exp,jti". Chỉ áp dụng cho định dạng SD-JWT.
signingKeyId=Signing Key ID
signingKeyIdHelp=Tùy chọn. ID của khóa realm dùng để ký credential. Nếu không chỉ định, khóa ký hoạt động của realm với thuật toán được chỉ định bởi 'Credential Signing Algorithm' (nếu đặt) sẽ được dùng tự động. Nếu chọn khóa cụ thể ở đây, tùy chọn 'Credential Signing Algorithm' sẽ bị tắt và tự động đặt thành thuật toán của khóa.
useDefaultKey=Dùng mặc định (khóa ký hoạt động của realm)
useDefaultAlg=Dùng thuật toán mặc định
