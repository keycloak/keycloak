samlClientKeyEncryptionAlgorithmHelp=Thuật toán vận chuyển khóa dùng cho client để mã hóa khóa bí mật dùng cho mã hóa. Giá trị mặc định RSA-OAEP-11.
samlClientEncryptionDigestMethod=Phương thức digest cho RSA-OAEP
samlClientEncryptionDigestMethodHelp=Phương thức digest dùng khi bất kỳ thuật toán RSA-OAEP nào được chọn làm thuật toán vận chuyển khóa. Giá trị mặc định SHA-256.
samlClientEncryptionMaskGenerationFunction=Hàm tạo mask
samlClientEncryptionMaskGenerationFunctionHelp=Hàm tạo mask dùng khi RSA-OAEP-11 được chọn làm thuật toán vận chuyển khóa. Giá trị mặc định mgf1sha256.
openIdVerifiableCredentials=OpenID for Verifiable Credentials
openIdVerifiableCredentialsHelp=Phần này dùng để cấu hình thiết lập liên quan đến OpenID for Verifiable Credential Issuance (OID4VCI).
oid4vciEnabled=Bật OID4VCI
oid4vciEnabledHelp=Bật tùy chọn này để cho phép client yêu cầu verifiable credentials từ credential endpoint OID4VCI của Keycloak.
noAccessPolicies=Không có access policy nào
noAccessPoliciesInstructions=Chưa cấu hình access policy nào. Nhấn nút bên dưới để cấu hình policy đầu tiên.
includeInOpenIdProviderMetadata=Bao gồm trong OpenID Provider Metadata
includeInOpenIdProviderMetadataHelp=Nếu bật, client scope này sẽ được bao gồm trong OpenID Provider Metadata.
