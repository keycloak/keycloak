periodicFullSyncHelp=Jika 'Import users' diaktifkan, tugas periodik dimulai untuk menyinkronkan pengguna dari LDAP ke Keycloak. Tipe sinkronisasi ini mengambil semua pengguna dari LDAP setiap kali dijalankan, mengimpor pengguna baru atau memperbarui yang sudah ada. Jika Anda memiliki sejumlah besar pengguna di LDAP, ini mungkin tidak efisien. Dalam kasus tersebut, Anda dapat menonaktifkan opsi ini dan menggunakan 'Periodic changed users sync' sebagai gantinya.
periodicChangedUsersSyncHelp=Jika 'Import users' diaktifkan, tugas periodik dimulai untuk menyinkronkan pengguna dari LDAP ke Keycloak berdasarkan timestamp dibuat atau terakhir diperbarui. Tipe sinkronisasi ini lebih efisien daripada sinkronisasi penuh, terutama jika Anda memiliki sejumlah besar pengguna di LDAP. Namun, ini memerlukan bahwa server LDAP Anda mendukung pencarian menggunakan atribut 'createTimestamp' dan 'modifyTimestamp' dalam predikat kueri.
