lightweightAccessToken=Selalu gunakan token akses ringan
lightweightAccessTokenHelp=Jika aktif, token akses ringan selalu digunakan. Jika nonaktif, token tersebut tidak digunakan secara default, tetapi masih memungkinkan untuk mengaktifkannya dengan eksekutor kebijakan klien.
supportJwtClaimInIntrospectionResponse=Dukungan klaim JWT dalam Respons Introspeksi
supportJwtClaimInIntrospectionResponseHelp=Jika aktif, permintaan introspeksi yang menggunakan header 'Accept: application/jwt' juga akan mengandung klaim bernama "jwt" dengan klaim hasil introspeksi yang dienkode sebagai token akses JWT.
allowTokenIntrospectionWithoutAudienceCheck=Izinkan introspeksi token tanpa pemeriksaan audiens
allowTokenIntrospectionWithoutAudienceCheckHelp=Mengizinkan klien ini untuk mengintrospeksi token tanpa validasi audiens. Opsi ini sudah usang dan akan dihapus dalam rilis masa depan. Hanya aktifkan untuk kompatibilitas mundur selama migrasi.
allowUserinfoWithLightweightAccessToken=Izinkan UserInfo dengan token akses ringan
allowUserinfoWithLightweightAccessTokenHelp=Mengizinkan token akses ringan yang diterbitkan oleh klien ini untuk digunakan dengan endpoint UserInfo. Token ringan dirancang untuk introspeksi token. Opsi ini sudah usang dan akan dihapus dalam rilis masa depan. Hanya aktifkan untuk kompatibilitas mundur selama migrasi.
ssf=SSF
ssfTransmitterEnabled=SSF Transmitter
ssfTransmitterEnabledHelp=Jika diaktifkan, realm ini bertindak sebagai Shared Signals Framework (SSF) Transmitter dan memaparkan endpoint Metadata Konfigurasi SSF. Menonaktifkan untuk realm dengan aliran aktif akan menghapus peristiwa antrian untuk receiver tersebut saat menyimpan; jeda atau hapus aliran terlebih dahulu jika Anda ingin receiver diberi notifikasi melalui SET yang diperbarui-aliran sebelum menjadi senyap.
ssfTransmitterDisableConfirmTitle=Nonaktifkan SSF Transmitter untuk realm ini?
ssfTransmitterDisableConfirmIntro=Menonaktifkan fitur SSF Transmitter untuk realm ini memiliki efek berikut:
ssfTransmitterDisableConfirmBulletEndpoints=Semua endpoint SSF Transmitter (metadata, aliran, subjek, status, SSE) akan mengembalikan 404 ke receiver.
ssfTransmitterDisableConfirmBulletEvents=Tidak ada peristiwa pengguna atau admin baru yang akan dicatat untuk receiver SSF di realm ini.
ssfTransmitterDisableConfirmBulletDelivery=Semua peristiwa antrian untuk receiver di realm ini (PENDING dan HELD) akan dihapus saat menyimpan. Tidak dapat dipulihkan.
ssfTransmitterDisableConfirmBulletReceivers=Receiver tidak diberi notifikasi bahwa aliran menjadi senyap. Mereka hanya berhenti melihat peristiwa.
ssfTransmitterDisableConfirmRecommendation=Direkomendasikan: jeda atau hapus aliran SSF aktif di realm ini sebelum menyimpan agar receiver mendapatkan notifikasi yang diperbarui-aliran yang tepat sebelum pengiriman berhenti.
ssfTransmitterDisableConfirmContinue=Nonaktifkan transmitter
ssfTransmitterDisableEventsCleared=Peristiwa SSF antrian untuk realm ini telah dihapus.
ssfTransmitterDisableEventsClearFailed=Gagal menghapus peristiwa SSF antrian untuk realm ini
ssfReceiver=SSF Receiver
ssfTabReceiver=Receiver
ssfTabStream=Aliran
ssfTabSubjects=Subjek
ssfTabEventSearch=Pencarian Peristiwa
ssfTabEmitEvents=Pancarkan Peristiwa
ssfPendingEventsHelp=Cari status pengiriman peristiwa SSF tertentu berdasarkan jti-nya, atau pancarkan peristiwa sintetis untuk receiver ini dari konsol admin.
ssfPendingLookupJti=jti Peristiwa
ssfPendingLookupJtiHelp=JWT id dari Security Event Token — dikembalikan dari tindakan emit di bawah atau diambil dari log transmitter.
ssfPendingLookupJtiPlaceholder=jti-peristiwa
ssfPendingLookup=Cari
ssfPendingLookupNotFound=Tidak ada peristiwa tertunda yang ditemukan untuk jti ini pada receiver ini.
ssfPendingLookupResult=Hasil
ssfPendingFieldStatus=Status
ssfPendingFieldEventType=Tipe peristiwa
ssfPendingFieldDeliveryMethod=Metode pengiriman
ssfPendingFieldAttempts=Percobaan
ssfPendingFieldCreatedAt=Dibuat pada
