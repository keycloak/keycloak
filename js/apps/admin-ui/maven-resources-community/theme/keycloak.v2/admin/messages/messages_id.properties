signedMetadataSigningAlgorithm=Algoritme Penandatanganan Metadata Tertanda tangan
signedMetadataSigningAlgorithmHelp=Algoritme yang digunakan untuk menandatangani metadata penerbit. Ini menjamin integritas dan keaslian metadata.
requireRequestEncryption=Wajibkan Enkripsi Permintaan
requireRequestEncryptionHelp=Jika diaktifkan, enkripsi diperlukan untuk permintaan kredensial di atas TLS. Dompet harus mengenkripsi permintaan menggunakan metadata enkripsi permintaan yang didukung.
requireResponseEncryption=Wajibkan Enkripsi Respons
requireResponseEncryptionHelp=Jika diaktifkan, enkripsi diperlukan untuk respons kredensial di atas TLS. Dompet harus menyediakan kunci enkripsi dalam permintaan kredensial.
enableDeflateCompression=Aktifkan kompresi DEF
enableDeflateCompressionHelp=Jika diaktifkan, algoritme kompresi DEF didukung untuk permintaan kredensial. Ini memungkinkan klien untuk mengompresi permintaan mereka untuk mengurangi ukuran payload.
batchIssuanceSize=Ukuran Penerbitan Batch
batchIssuanceSizeHelp=Jumlah maksimum kredensial yang dapat diterbitkan dalam satu permintaan batch. Ini membantu mengelola beban server dan waktu respons.
timeClaimCorrelationMitigation=Mitigasi korelasi claim waktu
timeClaimsStrategy=Strategi yang diterapkan pada claim waktu
timeClaimsStrategyHelp=Strategi yang diterapkan pada claim waktu. Nilai yang didukung: off, randomize, round.
randomizeWindow=Jendela Acak
randomizeWindowHelp=Ketika strategi adalah randomize, kurangi jumlah detik acak antara 0 dan nilai atribut ini dari timestamp asli untuk mengurangi serangan korelasi.
roundUnit=Satuan Pembulatan
roundUnitHelp=Ketika strategi adalah round, potong timestamp ke batas unit yang dipilih (UTC). Nilai yang didukung: SECOND, MINUTE, HOUR, DAY.
randomize=Acak
round=Bulatkan
second=Detik
day=Hari
credentialConfigurationId=ID Konfigurasi Kredensial
credentialConfigurationIdHelp=Pengenal unik untuk konfigurasi kredensial ini. ID ini digunakan dalam metadata penerbit kredensial dan permintaan kredensial.
credentialIdentifier=Pengenal Kredensial
credentialIdentifierHelp=Pengenal spesifik untuk tipe kredensial ini. Ini dapat digunakan untuk membedakan antara varian berbeda dari tipe kredensial yang sama.
credentialOfferRequired=Penawaran Kredensial Diperlukan
credentialOfferRequiredHelp=Penerbit memerlukan penawaran kredensial untuk konfigurasi kredensial ini.
issuerDid=Issuer DID
issuerDidHelp=Decentralized Identifier (DID) dari penerbit kredensial. Ini mengidentifikasi siapa yang menerbitkan kredensial dapat diverifikasi.
credentialLifetime=Masa Berlaku Kredensial (detik)
credentialLifetimeHelp=Masa berlaku kredensial dalam detik. Setelah waktu ini, kredensial akan kedaluwarsa dan menjadi tidak valid.
bindingRequired=Ikatan Kriptografi Diperlukan
bindingRequiredHelp=Jika diaktifkan, konfigurasi kredensial ini memerlukan ikatan pemilik kriptografi dan bukti yang sesuai. Jika dinonaktifkan, tidak diperlukan ikatan kriptografi dan metadata terkait akan dihilangkan.
cryptographicBindingMethodsSupported=Metode Ikatan Kriptografi
cryptographicBindingMethodsSupportedHelp=Daftar terpisahkan koma dari representasi materi kunci kriptografi yang akan diikat ke kredensial (misalnya: jwk). Jika kosong, tidak ada metode ikatan kriptografi yang akan diiklankan.
cryptographicBindingMethodsSupportedInvalid=Metode ikatan tidak didukung: {{invalid}}. Nilai yang diizinkan: jwk
bindingSupportedProofTypes=Tipe Bukti yang Didukung
bindingSupportedProofTypesHelp=Daftar terpisahkan koma dari tipe bukti yang diterima ketika ikatan kriptografi diaktifkan (misalnya: jwt). Jika kosong, tidak ada tipe bukti yang akan diiklankan dan bukti tidak akan diberlakukan.
bindingSupportedProofTypesInvalid=Tipe bukti tidak didukung: {{invalid}}. Nilai yang diizinkan: jwt, attestation
supportedFormats=Format yang Didukung
supportedFormatsHelp=Format kredensial dapat diverifikasi. Format yang saat ini didukung: SD-JWT VC (dc+sd-jwt), JWT VC (jwt_vc).
credentialDisplay=Tampilan Kredensial
credentialDisplayHelp=Array JSON objek yang berisi metadata tampilan untuk dompet (nama, logo, warna, dll). Contoh: [{"name": "IdentityCredential", "locale": "en-US", "logo": {"uri": "https://example.com/logo.png", "alt_text": "Logo"}, "background_color": "#12107c", "text_color": "#FFFFFF"}]
credentialSigningAlgorithm=Algoritme Penandatanganan Kredensial
credentialSigningAlgorithmHelp=Algoritme penandatanganan yang digunakan untuk memilih kunci realm aktif untuk menandatangani kredensial (misalnya, "ES256"). Jika tidak ditentukan, kunci aktif akan dipilih menggunakan algoritme default realm. Opsi ini dinonaktifkan jika 'Signing Key ID' tertentu dipilih.
hashAlgorithm=Algoritme Hash
hashAlgorithmHelp=Algoritme hash yang digunakan untuk kredensial SD-JWT (misalnya "SHA-256"). Default "SHA-256" jika tidak ditentukan.
supportedCredentialTypes=Tipe Kredensial yang Didukung
supportedCredentialTypesHelp=Daftar terpisahkan koma dari tipe kredensial (misalnya "VerifiableCredential,UniversityDegreeCredential"). Digunakan dalam definisi kredensial untuk format JWT VC dan SD-JWT. Ketika opsi ini tidak dikonfigurasi, nama cakupan klien akan digunakan sebagai claim 'type' dari kredensial yang sesuai.
verifiableCredentialType=Tipe Kredensial Dapat Diverifikasi (VCT)
verifiableCredentialTypeHelp=Pengenal tipe kredensial untuk kredensial format SD-JWT. Nilai ini digunakan dalam claim vct dari kredensial yang diterbitkan. Diperlukan untuk format SD-JWT.
tokenJwsType=Tipe Token JWS
tokenJwsTypeHelp=Nilai tipe yang ditulis ke header typ dari JWT. Jika kosong, default spesifik format digunakan ("dc+sd-jwt" untuk SD-JWT VC dan "vc+jwt" untuk JWT VC). Dapat diatur ke nilai kustom jika diperlukan oleh dompet atau sistem.
tokenJwsTypeFormatWarning=Tipe Token JWS yang dikonfigurasi tidak cocok dengan nilai yang direkomendasikan untuk format kredensial yang dipilih. Nilai yang direkomendasikan: {{recommended}}.
visibleClaims=Claim yang Dilihat
visibleClaimsHelp=Daftar terpisahkan koma dari claim yang selalu diungkapkan dalam badan SD-JWT (misalnya "id,iat,nbf,exp,jti,given_name"). Default "id,iat,nbf,exp,jti". Hanya berlaku untuk format SD-JWT.
signingKeyId=ID Kunci Penandatanganan
signingKeyIdHelp=Opsional. ID kunci realm yang digunakan untuk menandatangani kredensial. Jika tidak ditentukan, kunci penandatanganan aktif realm dari algoritme yang ditentukan oleh 'Credential Signing Algorithm' (jika diatur) akan digunakan secara otomatis. Jika kunci tertentu dipilih di sini, opsi 'Credential Signing Algorithm' akan dinonaktifkan dan secara otomatis diatur ke algoritme kunci.
useDefaultKey=Gunakan default (kunci penandatanganan aktif realm)
useDefaultAlg=Gunakan algoritme default
