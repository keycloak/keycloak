removeInvalidUsersHelp=Hapus pengguna dari basis data lokal jika mereka tidak tersedia dari penyimpanan pengguna saat menjalankan pencarian. Jika ini true, pengguna yang tidak lagi tersedia dari penyimpanan pengguna mereka yang bersangkutan akan dihapus dari basis data lokal setiap kali mencoba mencari pengguna. Jika false, maka pengguna yang sebelumnya diimpor dari penyimpanan pengguna akan disimpan di basis data lokal, sebagai hanya-baca dan dinonaktifkan, bahkan jika pengguna tersebut tidak lagi tersedia dari penyimpanan pengguna. Misalnya, pengguna dihapus langsung dari LDAP atau `Users DN` tidak valid. Perhatikan bahwa perilaku ini hanya akan terjadi ketika pengguna belum di-cache.
