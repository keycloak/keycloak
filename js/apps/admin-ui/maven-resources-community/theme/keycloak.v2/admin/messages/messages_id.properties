ssfPendingFieldLastError=Kesalahan terakhir
ssfPendingFieldDecodedSet=Security Event Token (terurai)
ssfPendingFieldUserId=Pengguna yang teridentifikasi
ssfLookupTitle=Cari peristiwa
ssfLookupTitleHelp=Periksa status pengiriman Security Event Token tertentu berdasarkan jti-nya. Dibatasi untuk receiver ini.
ssfEmitTitle=Pancarkan peristiwa sintetis
ssfEmitTitleHelp=Dorong peristiwa sintetis ke receiver ini. Transmitter memformat sub_id sesuai dengan Format Subjek Pengguna yang dikonfigurasi receiver dan menerapkan filter langganan yang sama seperti peristiwa native.
ssfEmitEventType=Tipe peristiwa
ssfEmitEventTypeHelp=Salah satu tipe peristiwa yang dapat dipancarkan oleh transmitter receiver ini. Payload di bawah ini dineserialisasi terhadap kelas peristiwa yang terdaftar untuk tipe yang dipilih.
ssfEmitEventTypeSelectPrompt=-- pilih tipe peristiwa --
ssfEmitEventTypeRequired=Pilih tipe peristiwa untuk dipancarkan.
ssfEmitSubjectValueHelp=Berhasil dipecah menjadi pengguna Keycloak (user-id / user-email / user-username) atau organisasi (org-alias). Untuk subjek pengguna, transmitter membangun sub_id menggunakan Format Subjek Pengguna yang dikonfigurasi receiver sehingga SET yang dipancarkan sesuai dengan bentuk peristiwa native untuk receiver ini; subjek org memancarkan subjek tenant-only yang kompleks. Filter langganan-subjek dan aturan fail-loud khusus-format (no email, no organization for +tenant) tetap berlaku.
ssfEmitSubjectValueRequired=Nilai subjek diperlukan.
ssfEmitPayload=Payload peristiwa (JSON)
ssfEmitPayloadHelp=Body khusus peristiwa — harus dineserialisasi terhadap kelas tipe peristiwa yang dipilih. Kosongkan untuk memancarkan payload kosong (hanya bermakna untuk tipe peristiwa tanpa bidang yang diperlukan). Placeholder yang didukung (diekspansi sebelum penguraian JSON): __now__ beresolusi ke waktu Unix saat ini dalam detik. Dapat digunakan tanpa kutip untuk bidang numerik, misalnya "event_timestamp": __now__.
ssfEmitPayloadInvalidJson=Payload bukan JSON valid: {{error}}
ssfEmitEvent=Pancarkan peristiwa
ssfEmitResult=Dipancarkan — status={{status}}, jti={{jti}}
ssfEmitResultLookupLink=Cari peristiwa ini dalam Pencarian Peristiwa
ssfReceiverHelp=Kebijakan sisi transmitter diterapkan ketika Keycloak mengirim Security Event Tokens ke receiver ini.
ssfSectionGeneral=Umum
ssfSectionGeneralHelp=Identitas, tampilan, dan perilaku aliran untuk penerima SSF ini: profil dan deskripsi, audiens yang ditargetkan, subjek mana yang dikirimkan, format pengidentifikasi subjek, kebijakan verifikasi, dan jendela anugerah yang diterapkan ketika receiver menghapus subjek. Diterapkan setiap kali aliran terdaftar atau diperbarui untuk klien ini.
ssfSectionAuthentication=Autentikasi
ssfSectionAuthenticationHelp=Aturan akses yang membatasi siapa yang dapat mengelola aliran SSF receiver ini dan memanggil endpoint emisi peristiwa sintetis.
ssfSectionDelivery=Pengiriman
ssfSectionDeliveryHelp=Metode pengiriman mana yang dapat digunakan receiver ini dan, ketika pengiriman push diizinkan, awalan URL yang diizinkan transmitter untuk mendorong Security Event Tokens.
ssfSectionEvents=Peristiwa
ssfSectionEventsHelp=Tipe peristiwa mana yang diiklankan dan dikirimkan oleh receiver ini, batasan usia dan ketidakaktifan yang membatasi outbox, dan apakah admin dapat memancarkan peristiwa sintetis untuk debugging atau integrasi alur kerja.
ssfAllowedDeliveryMethods=Metode pengiriman yang diizinkan
ssfAllowedDeliveryMethodsHelp=Metode pengiriman mana yang dapat dipilih receiver ini saat mendaftarkan aliran. Setidaknya satu metode harus diaktifkan. Receiver memilih salah satu metode yang diizinkan pada saat pembuatan aliran; membatasi daftar ini hanya ke polling melarang transmitter membuat panggilan HTTP keluar ke receiver ini sepenuhnya.
ssfAllowedDeliveryMethods.push=Pengiriman push
ssfAllowedDeliveryMethods.pushHelp=Transmitter POST Security Event Tokens ke URL yang disediakan receiver (RFC 8935). Memerlukan URL push yang valid dikonfigurasi di bawah.
ssfAllowedDeliveryMethods.poll=Pengiriman polling
ssfAllowedDeliveryMethods.pollHelp=Receiver menarik Security Event Tokens yang antri dari endpoint polling milik transmitter (RFC 8936). URL endpoint dihasilkan oleh Keycloak; tidak diperlukan daftar izin per receiver.
ssfValidPushUrls=URL push yang valid
ssfValidPushUrlsHelp=Daftar izin pola URL yang dapat terdaftar receiver sebagai endpoint push-nya. Setiap entri dicocokkan dengan URL yang disediakan receiver menggunakan pencocokan tepat atau wildcard sufiks trailing-* (misalnya https://receiver/push/* mengizinkan tenant + id aliran apa pun di bawah path tersebut). URL di luar daftar izin ditolak dengan HTTP 400 — ini adalah pertahanan SSRF receiver. Bare * tidak dihormati.
ssfValidPushUrls.add=Tambahkan URL push yang valid
ssfReceiverEnabled=SSF Receiver
ssfReceiverEnabledHelp=Jika diaktifkan, klien ini bertindak sebagai Penerima Shared Signals Framework (SSF). Keycloak akan mengirimkan peristiwa keamanan ke klien ini sesuai dengan aliran SSF yang dikonfigurasi.
ssfStream=Aliran SSF
ssfStreamHelp=Aliran yang terdaftar untuk receiver ini dan pengaturan pengiriman peristiwa-nya.
ssfStreamNotRegistered=Belum ada aliran SSF yang terdaftar
ssfStreamNotRegisteredHelp=Klien penerima ini belum mendaftarkan aliran SSF ke transmitter. Anda dapat membuat satu untuk pihaknya di bawah, atau receiver dapat membuatnya sendiri melalui API SSF Transmitter.
ssfCreateStream=Buat aliran
ssfCreateStreamReset=Hapus
ssfCreateStreamSuccess=Aliran SSF berhasil dibuat.
ssfCreateStreamError=Tidak dapat membuat aliran SSF: {{error}}
ssfCreateStreamDeliveryMethod=Metode pengiriman
ssfCreateStreamDeliveryMethodHelp=Metode pengiriman SSF yang akan digunakan untuk aliran ini. Push (RFC 8935) mengirim SET yang ditandatangani ke endpoint yang dihosting receiver; Poll (RFC 8936) menghosting endpoint di transmitter dan receiver menarik SET sesuai jadwalnya sendiri. Push memerlukan receiver untuk menyediakan URL endpoint-nya sendiri; Poll menggunakan URL yang dihasilkan transmitter yang dikembalikan dalam respons pembuatan.
ssfCreateStreamEndpointUrl=URL endpoint push
ssfCreateStreamEndpointUrlHelp=URL HTTPS di sisi receiver yang akan di-POST Security Event Tokens oleh transmitter.
ssfCreateStreamEndpointUrlRequired=URL endpoint push diperlukan.
ssfCreateStreamEndpointUrlInvalid=URL endpoint push harus berupa URL http atau https absolut.
ssfCreateStreamEventsRequested=Peristiwa yang diminta
ssfCreateStreamEventsRequestedHelp=Tipe peristiwa SSF yang harus dilanggan receiver. Pilih dari peristiwa yang dikonfigurasi transmitter untuk dipancarkan; kosongkan untuk menggunakan set default yang didukung transmitter.
ssfCreateStreamDescription=Deskripsi
ssfCreateStreamDescriptionHelp=Label yang dapat dibaca manusia untuk aliran, ditampilkan di UI admin ini untuk operator.
ssfStreamAudienceCurrentHelp=Audiens yang saat ini dikonfigurasi pada aliran SSF yang terdaftar. Memperbarui bidang Audiens Aliran di bagian SSF Receiver hanya memengaruhi aliran yang terdaftar receiver setelah perubahan.
ssfStreamPushEndpointUrl=URL endpoint push
ssfStreamPushEndpointUrlHelp=URL HTTPS di sisi receiver yang di-POST Security Event Tokens oleh transmitter. Hanya ditampilkan untuk aliran yang menggunakan metode pengiriman push HTTP.
ssfStreamPollEndpointUrl=URL endpoint polling
ssfStreamPollEndpointUrlHelp=URL yang dihosting transmitter yang di-POST receiver untuk menarik Security Event Tokens yang tertunda (RFC 8936). Receiver mengautentikasi dengan bearer token-nya sendiri; tidak ada header otorisasi sisi transmitter yang dikonfigurasi.
ssfStreamPushAuthHeader=Header Authorization push
ssfStreamPushAuthHeaderHelp=Nilai yang dikirim dalam header permintaan Authorization pada setiap push (misalnya bearer token) apa adanya.
ssfDeleteStream=Hapus Aliran
ssfDeleteStreamConfirmTitle=Hapus aliran SSF?
ssfDeleteStreamConfirmMessage=Aliran SSF yang terdaftar untuk klien ini akan dihapus dan receiver harus membuat ulang. Ini tidak dapat dibatalkan. Lanjutkan?
ssfDeleteStreamSuccess=Aliran SSF berhasil dihapus.
ssfSubjects=Subjek SSF
ssfSubjectsHelp=Kelola pengguna atau organisasi mana yang mendapatkan peristiwa tentangnya dari receiver ini. Gunakan Periksa untuk melihat apakah subjek saat ini termasuk.
ssfSubjectType=Tipe subjek
ssfSubjectTypeHelp=Bagaimana nilai di bawah diinterpretasikan saat mencari subjek. Opsi User beresolusi ke pengguna Keycloak berdasarkan email, ID, atau nama pengguna; Organization (by alias) beresolusi ke organisasi Keycloak. Preferensi notifikasi disimpan sebagai atribut ssf.notify.${clientId} pada entitas yang teridentifikasi.
ssfSubjectType.userEmail=Pengguna (berdasarkan email)
ssfSubjectType.userId=Pengguna (berdasarkan ID)
ssfSubjectType.userUsername=Pengguna (berdasarkan nama pengguna)
ssfSubjectType.orgAlias=Organisasi (berdasarkan alias)
ssfSubjectValue=Nilai subjek
ssfSubjectAdd=Tambahkan subjek
ssfSubjectRemove=Hapus subjek
ssfSubjectCheck=Periksa
ssfSubjectStatusLabel=Status subjek
ssfSubjectValueRequired=Silakan masukkan nilai subjek.
ssfSubjectNotFound=Subjek tidak ditemukan. Verifikasi nilai dan tipe subjek.
ssfSubjectIsNotified=Peristiwa untuk subjek ini dikirim ke aliran ini.
ssfSubjectIsNotifiedViaOrg=Subjek termasuk melalui keanggotaan organisasi untuk aliran ini.
ssfSubjectIsNotifiedViaOrgNamed=Subjek termasuk melalui keanggotaan dalam organisasi '{{org}}' untuk aliran ini.
ssfSubjectIsImplicitlyIncluded=Subjek secara implisit termasuk dalam pengiriman peristiwa untuk aliran ini (default_subjects=ALL dan tidak ada pengecualian eksplisit).
ssfSubjectIsNotNotified=Subjek tidak termasuk dalam pengiriman peristiwa untuk aliran ini.
ssfSubjectAdded=Subjek telah ditambahkan ke aliran ini.
ssfSubjectIgnore=Abaikan subjek
ssfSubjectIgnored=Subjek telah diabaikan untuk aliran ini.
ssfSubjectIsIgnored=Subjek secara eksplisit dikecualikan dari pengiriman peristiwa untuk aliran ini.
ssfSubjectIsIgnoredViaOrg=Subjek dikecualikan melalui keanggotaan organisasi untuk aliran ini.
ssfSubjectIsIgnoredViaOrgNamed=Subjek dikecualikan melalui keanggotaan dalam organisasi '{{org}}' untuk aliran ini.
ssfSubjectRemoved=Subjek telah dihapus dari aliran ini.
ssfSubjectActionError=Tidak dapat memperbarui preferensi notifikasi subjek: {{error}}
ssfDeleteStreamError=Tidak dapat menghapus aliran SSF: {{error}}
ssfVerifyStream=Verifikasi
ssfVerifyStreamSuccess=Peristiwa verifikasi dikirim ke receiver.
ssfVerifyStreamError=Tidak dapat mengirim peristiwa verifikasi: {{error}}
ssfProfile=Profil
ssfProfileHelp=Profil Shared Signals Framework yang digunakan saat mentransmisikan peristiwa ke receiver ini.
ssfProfile.SSF_1_0=SSF 1.0
ssfProfile.SSE_CAEP=SSE CAEP 1.0
ssfCreateStreamProfileHelp=Profil SSF yang diterapkan pada peristiwa yang dikirim melalui aliran ini. Profil adalah pengaturan per-receiver, sehingga mengubahnya di sini juga memperbarui atribut profil klien receiver sebelum aliran dibuat.
ssfUserSubjectFormat=Format Subjek
ssfUserSubjectFormatHelp=Format pengidentifikasi subjek yang digunakan transmitter untuk bagian pengguna dari Security Event Tokens SSF. Default adalah iss_sub (issuer realm + ID pengguna). Pilih email untuk memancarkan alamat email pengguna sebagai gantinya. Varian +tenant membungkus subjek pengguna dalam subjek kompleks dan menambahkan sibling tenant yang membawa alias organisasi Keycloak pengguna — gunakan ini ketika receiver mengharapkan perutean multi-tenant. Peristiwa dibuang (dengan entri log yang jelas) ketika format yang dipilih tidak dapat dihasilkan (misalnya email dipilih tetapi pengguna tidak memiliki email, atau +tenant dipilih tetapi pengguna tidak termasuk dalam organisasi apa pun).
ssfUserSubjectFormat.iss_sub=iss_sub (Issuer dan Subject)
ssfUserSubjectFormat.email=email
ssfUserSubjectFormat.complex.iss_sub+tenant=kompleks(iss_sub + organisasi tenant)
ssfUserSubjectFormat.complex.email+tenant=kompleks(email + organisasi tenant)
ssfDefaultSubjects=Subjek Default
ssfDefaultSubjectsHelp=Mengontrol apakah transmitter mengirimkan peristiwa untuk semua pengguna realm (ALL) atau hanya untuk pengguna yang secara eksplisit ditambahkan melalui endpoint add-subject atau tab Subjects (NONE). Receiver dapat menimpa ini per-aliran pada saat pembuatan.
ssfDefaultSubjects.ALL=ALL (kirim peristiwa untuk semua subjek)
ssfDefaultSubjects.NONE=NONE (kirim hanya untuk subjek yang ditambahkan)
ssfAutoNotifyOnLogin=Tambahkan subjek saat login
ssfAutoNotifyOnLoginHelp=Ketika diaktifkan dan Subjek Default diatur ke NONE, pengguna yang login melalui klien ini secara otomatis ditambahkan ke kumpulan subjek yangReceiver ini mendapatkan peristiwa tentangnya — setara dengan mengklik Tambah untuk mereka di tab Subjects. Berguna untuk skenario federasi di mana hanya pengguna yang mengautentikasi melalui klien ini yang harus disertakan dalam pengiriman peristiwa.
ssfRequireServiceAccount=Wajibkan akun layanan
ssfRequireServiceAccountHelp=Ketika diaktifkan, hanya akun layanan klien sendiri yang dapat mengakses API transmitter SSF. Ini adalah perilaku default ketika tidak diatur secara eksplisit. Nonaktifkan untuk klien yang menggunakan alur kode otorisasi di mana pengguna nyata mengautentikasi dan backend receiver menggunakan token yang dihasilkan untuk mengelola aliran SSF-nya.
ssfRequiredRole=Peran yang diperlukan
ssfRequiredRoleHelp=Ketika diatur, pengguna terautentikasi harus memegang peran ini (peran realm atau peran klien pada klien ini) untuk mengakses API transmitter SSF. Diperiksa sebagai tambahan dari persyaratan akun layanan (jika diaktifkan) dan persyaratan cakupan. Kosongkan untuk melewati pemeriksaan peran.
ssfAllowEmitEvents=Pancarkkan peristiwa diaktifkan
ssfAllowEmitEventsHelp=Ketika diaktifkan, akun layanan yang memegang peran yang dikonfigurasi di bawah dapat mendorong peristiwa sintetis SSF untuk receiver ini melalui endpoint emit admin. Gunakan ini untuk lingkungan di mana Keycloak tidak dapat secara native mengamati peristiwa hulu (misalnya perubahan kredensial yang terjadi di LDAP). Jika tidak ada peran yang dikonfigurasi, endpoint ditolak. Penelpon yang memiliki izin untuk mengelola klien ini melewati pemeriksaan peran.
ssfEmitEventsRole=Peran pancarkan peristiwa yang diperlukan
ssfEmitEventsRoleHelp=Peran yang harus dipegang oleh akun layanan pemanggil untuk mendorong peristiwa sintetis. Pilih peran realm atau peran klien pada receiver ini. Hanya berlaku ketika "Peristiwa sintetis" diaktifkan.
ssfMinVerificationInterval=Interval Verifikasi Minimum
ssfMinVerificationIntervalHelp=Jumlah waktu minimum dalam detik yang harus berlalu antara permintaan verifikasi yang dimulai receiver untuk aliran klien ini. Permintaan berikutnya dalam jendela ini ditolak dengan HTTP 429. Kosongkan untuk menggunakan default seragam transmitter.
ssfMaxEventAge=Usia maksimum peristiwa
ssfMaxEventAgeHelp=Usia maksimum (dalam detik) peristiwa outbox yang tertunda, ditahan, atau surat mati untuk receiver ini. Baris yang lebih lama dibersihkan oleh pass perawatan rumah transmitter sebelum jendela retensi surat mati global berlaku. Gunakan nilai pendek untuk receiver yang peristiwa kehilangan relevansinya dengan cepat (misalnya session-revoked). Biarkan diwariskan untuk kembali hanya ke retensi seragam transmitter.
ssfInactivityTimeout=Batas waktu ketidakaktifan
ssfInactivityTimeoutHelp=SSF 1.0 inactivity_timeout — jika tidak ada aktivitas receiver yang memenuhi syarat (hit apa pun pada API manajemen-aliran, atau polling untuk aliran POLL) tiba dalam jendela ini, transmitter secara otomatis menjeda aliran dan mengirim peristiwa stream-updated. Aktivitas dilacak dengan granularitas 5 menit (write-coalesced untuk menghindari menghantam penyimpanan klien pada polling sibuk), sehingga pemeriksaan efektif dapat menyala hingga 5 menit terlambat — pilih batas waktu dengan nyaman lebih besar dari itu. Kosongkan untuk tidak ada batas waktu.
ssfSubjectRemovalGrace=Anugerah penghapusan subjek
ssfSubjectRemovalGraceHelp=Pertahanan SSF 1.0 'Penghapusan Subjek Berniat Jahat'. Setelah /streams/subjects/remove yang digerakkan receiver, transmitter tetap mengirimkan peristiwa untuk subjek selama beberapa detik ini, mempertahankan terhadap token bearer receiver yang terkompromi yang membungkam peristiwa secara diam-diam untuk target. Penghapusan yang digerakkan admin selalu langsung berlaku. Kosongkan untuk mewariskan default SPI subject-removal-grace-seconds seragam transmitter; atur ke 0 untuk memilih receiver ini keluar dari jendela anugerah bahkan ketika default transmitter positif (misalnya untuk receiver yang secara sah menghapus subjek ketika pengguna keluar dari layanan mereka).
ssfAutoVerifyStream=Verifikasi Aliran Otomatis
ssfAutoVerifyStreamHelp=Ketika diaktifkan, transmitter secara otomatis mengirimkan SET verifikasi-aliran segera setelah receiver membuat aliran. Ketika dinonaktifkan, receiver dapat melakukan verifikasi dengan mengirim permintaan verifikasi eksplisit ke endpoint verifikasi.
ssfVerificationDelay=Keterlambatan Verifikasi
ssfVerificationDelayHelp=Keterlambatan dalam milidetik sebelum transmitter mengirim peristiwa verifikasi setelah aliran dibuat. Hanya berlaku ketika Verifikasi Aliran Otomatis diaktifkan.
ssfStreamStatus=Status
ssfStreamStatusHelp=Status saat ini dari aliran SSF untuk klien ini. Gunakan tombol aksi di bawah untuk mengubahnya — yang melalui jalur transisi yang diwajibkan spesifikasi SSF, yang mengirimkan SET stream-updated ke receiver dan menyelaraskan antrian outbox dengan status baru.
ssfStreamStatus.enabled=Diaktifkan
ssfStreamStatus.paused=Dijeda
ssfStreamStatus.disabled=Dinonaktifkan
ssfStreamStatusEnable=Aktifkan aliran
ssfStreamStatusPause=Jeda aliran
ssfStreamStatusDisable=Nonaktifkan aliran
ssfStreamStatusUpdateSuccess=Status aliran diperbarui. Peristiwa stream-updated telah dikirim ke receiver.
ssfStreamStatusUpdateError=Tidak dapat memperbarui status aliran: {{error}}
ssfStreamStatusLabel=Status aliran
ssfStreamIndicator.enabled=Diaktifkan
ssfStreamIndicator.paused=Dijeda
ssfStreamIndicator.disabled=Dinonaktifkan
ssfStreamIndicator.registered=Terdaftar
ssfStreamIndicator.unregistered=Tidak terdaftar
ssfStreamStatusReason=Alasan status
ssfStreamStatusReasonHelp=Alasan yang dapat dibaca manusia yang terkait dengan status aliran saat ini, jika ada yang disediakan ketika status terakhir diubah (misalnya oleh receiver menjeda atau menonaktifkan aliran).
ssfDelivery=Metode Pengiriman
ssfDeliveryHelp=Metode pengiriman yang digunakan transmitter untuk peristiwa pada aliran ini. Push (RFC 8935) mengirim SET yang ditandatangani ke endpoint receiver; Poll (RFC 8936) memegang peristiwa di outbox transmitter sampai receiver menariknya melalui endpoint polling yang dihosting transmitter.
ssfDelivery.PUSH=Push
ssfDelivery.POLL=Polling
ssfDelivery.PULL=Tarik
ssfPushEndpointConnectTimeout=Batas Waktu Koneksi Push
ssfPushEndpointConnectTimeoutHelp=Batas waktu koneksi dalam milidetik saat mengirim peristiwa SSF melalui push HTTP ke endpoint push receiver.
ssfPushEndpointSocketTimeout=Socket Push Timeout
ssfPushEndpointSocketTimeoutHelp=Batas waktu socket (baca) dalam milidetik saat mengirim peristiwa SSF melalui push HTTP ke endpoint push receiver.
welcomeTabTitle=Selamat Datang
welcomeTo=Selamat datang di {{realmDisplayInfo}}
welcomeText=Keycloak menyediakan federasi pengguna, autentikasi kuat, manajemen pengguna, otorisasi terperinci, dan lainnya. Tambahkan autentikasi ke aplikasi danamankan layanan dengan usaha minimal. Tidak perlu berurusan dengan menyimpan pengguna atau mengautentikasi pengguna.
viewDocumentation=Lihat dokumentasi
viewGuides=Lihat panduan
joinCommunity=Bergabung dengan komunitas
readBlog=Baca blog
customValue=Nilai kustom
termsAndConditionsUserAttribute=Cap waktu penerimaan syarat dan ketentuan
