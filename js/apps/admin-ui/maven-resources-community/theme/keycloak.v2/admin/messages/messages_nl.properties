workflowYAMLHelp=De YAML-weergave van de werkstroom.
emptyWorkflows=Geen werkstromen
emptyWorkflowsInstructions=Er zijn geen workflows op dit gebied. Maak een workflow om aan de slag te gaan.
emptyUserWorkflowsInstructions=Er zijn geen workflows gepland voor deze gebruiker.
workflowCreated=De werkstroom is gemaakt.
workflowCreateError=Kan de werkstroom niet maken\: {{error}}
workflowDeleteConfirm=Werkstroom verwijderen?
workflowDeleteConfirmDialog=Met deze actie wordt de workflow definitief verwijderd. Dit kan niet ongedaan worden gemaakt.
workflowNameRequired=Workflownaam is vereist.
workflowDeletedSuccess=De werkstroom is verwijderd.
workflowDeleteError=Kon de werkstroom niet verwijderen\: {{error}}
