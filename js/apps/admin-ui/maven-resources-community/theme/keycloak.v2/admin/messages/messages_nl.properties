hideOnLoginWhenOrgNotResolved=Verbergen op inlogpagina wanneer organisatie niet is opgelost
hideOnLoginWhenOrgNotResolvedHelp=Indien ingeschakeld, wordt de identiteitsprovider verborgen op de inlogpagina wanneer de organisatie niet kan worden opgelost op basis van het e-maildomein van de gebruiker. Anders wordt de identiteitsprovider op de inlogpagina weergegeven, ongeacht of de organisatie is opgelost of niet. Als 'Verbergen op inlogpagina' ook is ingeschakeld, zal de identiteitsprovider altijd verborgen zijn op de inlogpagina.
showOnLoginForUnlinkedMembers=Toon op inlogpagina voor niet-gelinkte leden
showOnLoginForUnlinkedMembersHelp=Indien ingeschakeld, wordt deze identiteitsprovider getoond aan organisatieleden, zelfs als ze al aan een andere identiteitsprovider zijn gekoppeld.
