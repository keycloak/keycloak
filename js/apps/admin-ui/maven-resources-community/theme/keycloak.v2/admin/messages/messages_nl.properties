ssfUserSubjectFormat.complex.email+tenant=complex(e-mail + huurderorganisatie)
ssfDefaultSubjects=Standaardonderwerpen
ssfDefaultSubjectsHelp=Bepaalt of de zender gebeurtenissen levert voor alle realm-gebruikers (ALL) of alleen voor gebruikers die expliciet zijn toegevoegd via het eindpunt voor het toevoegen van een onderwerp of het tabblad Onderwerpen (NONE). Ontvangers kunnen dit per stream opheffen tijdens het maken.
ssfDefaultSubjects.ALL=ALL (evenementen leveren voor alle onderwerpen)
ssfDefaultSubjects.NONE=GEEN (alleen leveren voor toegevoegde onderwerpen)
ssfAutoNotifyOnLogin=Onderwerp toevoegen bij inloggen
ssfAutoNotifyOnLoginHelp=Indien ingeschakeld en Standaardonderwerpen is ingesteld op GEEN, worden gebruikers die inloggen via deze client automatisch toegevoegd aan de reeks onderwerpen waar deze ontvanger gebeurtenissen over ontvangt – wat overeenkomt met het klikken op Toevoegen voor hen op het tabblad Onderwerpen. Handig voor federatieve scenario's waarbij alleen gebruikers die zich via deze client authenticeren, moeten worden opgenomen in de gebeurtenislevering.
ssfRequireServiceAccount=Serviceaccount vereist
ssfRequireServiceAccountHelp=Indien ingeschakeld, heeft alleen het eigen serviceaccount van de klant toegang tot de SSF-zender-API. Dit is het standaardgedrag als het niet expliciet is ingesteld. Schakel dit uit voor clients die de autorisatiecodestroom gebruiken waarbij een echte gebruiker zich authenticeert en de backend van de ontvanger het resulterende token gebruikt om de SSF-stream te beheren.
ssfRequiredRole=Vereiste rol
ssfRequiredRoleHelp=Indien ingesteld, moet de geverifieerde gebruiker deze rol (realmrol of clientrol op deze client) hebben om toegang te krijgen tot de SSF-zender-API. Gecontroleerd naast de serviceaccountvereiste (indien ingeschakeld) en de bereikvereiste. Laat dit leeg om de rolcontrole over te slaan.
ssfAllowEmitEvents=Gebeurtenissen verzenden ingeschakeld
ssfAllowEmitEventsHelp=Indien ingeschakeld kan een serviceaccount met de hieronder geconfigureerde rol synthetische SSF-gebeurtenissen voor deze ontvanger pushen via het admin-emissie-eindpunt. Gebruik dit voor omgevingen waarin Keycloak niet zelf upstream-gebeurtenissen kan observeren (bijvoorbeeld wijzigingen in de inloggegevens die plaatsvinden in LDAP). Als er geen rol is geconfigureerd, wordt het eindpunt geweigerd. Bellers die toestemming hebben om deze client te beheren, omzeilen de rolcontrole.
ssfEmitEventsRole=Vereiste rol voor het uitzenden van gebeurtenissen
ssfEmitEventsRoleHelp=De rol die het aanroepende serviceaccount moet hebben om synthetische gebeurtenissen te pushen. Selecteer een realmrol of een clientrol op deze ontvanger. Geldt alleen als 'Synthetische gebeurtenissen' is ingeschakeld.
ssfMinVerificationInterval=Min. verificatie-interval
ssfMinVerificationIntervalHelp=Minimale hoeveelheid tijd in seconden die moet verstrijken tussen door de ontvanger geïnitieerde verificatieverzoeken voor de stream van deze client. Volgende verzoeken binnen dit venster worden afgewezen met HTTP 429. Laat dit leeg om de zenderbrede standaard te gebruiken.
ssfMaxEventAge=Maximale leeftijd van het evenement
ssfMaxEventAgeHelp=Maximale leeftijd (in seconden) van lopende, vastgehouden of postvak-gebeurtenissen met onbeantwoorde berichten voor deze ontvanger. Oudere rijen worden gewist door de huishoudpas van de zender voordat de algemene bewaartermijn voor dode letters van toepassing is. Gebruik een korte waarde voor ontvangers waarvan de gebeurtenissen snel aan relevantie verliezen (bijvoorbeeld sessie-ingetrokken). Laat geërfd achter om terug te vallen op alleen de zenderbrede retentie.
ssfInactivityTimeout=Time-out voor inactiviteit
ssfInactivityTimeoutHelp=SSF 1.0 inactivity_timeout - als er binnen dit venster geen in aanmerking komende ontvangeractiviteit (een hit op de streambeheer-API of een poll voor POLL-streams) binnenkomt, pauzeert de zender de stream automatisch en verzendt een stream-updategebeurtenis. De activiteit wordt bijgehouden met een granulariteit van 5 minuten (samengevoegd om te voorkomen dat de clientwinkel op drukke opiniepeilers wordt gehamerd), zodat de effectieve cheque tot 5 minuten te laat kan worden geactiveerd - de time-outs van de pick zijn comfortabel groter dan dat. Laat leeg voor geen time-out.
ssfSubjectRemovalGrace=Onderwerp verwijdering gratie
ssfSubjectRemovalGraceHelp=SSF 1.0 ‘Malicious Subject Removal’-verdediging. Nadat een ontvangergestuurde /streams/subjects/remove de zender gedurende zoveel seconden gebeurtenissen voor het onderwerp blijft leveren, verdedigend tegen een gecompromitteerd ontvangerdragertoken, waarbij gebeurtenissen voor een doelwit stilzwijgend tot zwijgen worden gebracht. Door de beheerder aangestuurde verwijderingen worden altijd onmiddellijk van kracht. Laat dit leeg om de SPI-standaard voor het verwijderen van onderwerpen voor de hele zender over te nemen; ingesteld op 0 om deze ontvanger uit het respijtvenster te halen, zelfs als de standaardwaarde van de zender positief is (bijvoorbeeld voor ontvangers die op legitieme wijze onderwerpen verwijderen wanneer gebruikers hun dienst beëindigen).
ssfAutoVerifyStream=Stream automatisch verifiëren
ssfAutoVerifyStreamHelp=Indien ingeschakeld, verzendt de zender automatisch een streamverificatie-SET kort nadat de ontvanger een stream heeft gemaakt. Indien uitgeschakeld, kan de ontvanger de verificatie uitvoeren door een expliciet verificatieverzoek naar het verificatie-eindpunt te sturen.
ssfVerificationDelay=Vertraging bij verificatie
ssfVerificationDelayHelp=Vertraging in milliseconden voordat de zender de verificatiegebeurtenis verzendt nadat de stream is gemaakt. Is alleen van toepassing als Stream automatisch verifiëren is ingeschakeld.
ssfStreamStatus=Status
ssfStreamStatusHelp=Huidige status van de SSF-stream voor deze client. Gebruik de onderstaande actieknoppen om dit te wijzigen. Deze doorlopen het door de SSF gespecificeerde transitiepad, dat een gestream-update SET naar de ontvanger verzendt en de outbox-achterstand in lijn brengt met de nieuwe status.
