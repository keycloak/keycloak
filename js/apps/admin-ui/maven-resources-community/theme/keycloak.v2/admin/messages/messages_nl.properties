scimApiEnabledHelp=Indien ingeschakeld, worden realm-bronnen beschikbaar gesteld via een API op basis van de SCIM-specificatie (System for Cross-domain Identity Management), namelijk RFC7643 en RFC7644.
excludedDomains=Uitgesloten domeinen
excludedDomainsHelp=Een door komma's gescheiden lijst met domeinen waarmee automatische omleiding kan worden overgeslagen. U kunt jokertekendomeinen zoals `*.example.com` gebruiken om alle subdomeinen van `example.com` uit te sluiten. Bijvoorbeeld `*.example.com, example.com`.
