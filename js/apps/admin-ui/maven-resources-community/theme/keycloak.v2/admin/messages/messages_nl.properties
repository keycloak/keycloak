ssfCreateStreamProfileHelp=Het SSF-profiel werd toegepast op gebeurtenissen die via deze stream werden verzonden. Profiel is een instelling per ontvanger, dus als u deze hier wijzigt, wordt ook het profielkenmerk van de ontvangerclient bijgewerkt voordat de stream wordt gemaakt.
ssfUserSubjectFormat=Onderwerpformaat
ssfUserSubjectFormatHelp=Onderwerpidentificatieformaat dat de zender gebruikt voor het gebruikersgedeelte van SSF Security Event Tokens. Standaard ingesteld op iss_sub (realm-uitgever + gebruikers-ID). Selecteer e-mail om in plaats daarvan het e-mailadres van de gebruiker te verzenden. De +tenantvarianten verpakken het gebruikersonderwerp in een complex onderwerp en voegen een broer of zus toe die de Keycloak-organisatiealias van de gebruiker draagt. Gebruik dit wanneer de ontvanger routering door meerdere tenants verwacht. Gebeurtenissen worden verwijderd (met een duidelijke loginvoer) wanneer het geselecteerde formaat niet kan worden geproduceerd (bijvoorbeeld e-mail geselecteerd maar de gebruiker heeft geen e-mailadres, of +tenant geselecteerd maar de gebruiker behoort tot geen organisatie).
ssfUserSubjectFormat.iss_sub=iss_sub (uitgever en onderwerp)
ssfUserSubjectFormat.email=e-mail
