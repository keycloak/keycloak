whichWorkflowsWillAppear=Welke workflows verschijnen in deze lijst?
whichWorkflowsWillAppearDetail=Er verschijnen workflows voor deze gebruiker met minstens één stap in behandeling. Sommige volledig voltooide workflows kunnen ook verschijnen als de planner deze nog niet heeft opgeschoond.
