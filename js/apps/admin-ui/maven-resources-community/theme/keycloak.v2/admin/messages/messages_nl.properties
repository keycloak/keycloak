ssfEmitErrorInvalidRequest=Ongeldig verzoek: {{detail}}
ssfEmitErrorNoDeliveryConfig=Voor de stream is geen leveringsmethode geconfigureerd, dus de gebeurtenis kan niet worden afgeleverd. Configureer eerst de push- of poll-levering voor de stream.
ssfEmitErrorUnknown=Verzenden mislukt: {{detail}}
ssfReceiverHelp=Beleid aan de zenderzijde wordt toegepast wanneer Keycloak Security Event Tokens aan deze ontvanger levert.
ssfSectionGeneral=Algemeen
ssfSectionGeneralHelp=Identiteits-, weergave- en streamgedrag voor deze SSF-ontvanger: profiel en beschrijving, de beoogde doelgroep, voor welke onderwerpen wordt geleverd, formaat van onderwerpidentificatie, verificatiebeleid en het respijtvenster dat wordt toegepast wanneer ontvangers onderwerpen verwijderen. Toegepast wanneer een stream wordt geregistreerd of bijgewerkt voor deze klant.
ssfSectionAuthentication=Authenticatie
ssfSectionAuthenticationHelp=Toegangsregels die bepalen wie de SSF-stream van deze ontvanger kan beheren en het emissie-eindpunt van synthetische gebeurtenissen kan aanroepen.
ssfSectionDelivery=Levering
ssfSectionDeliveryHelp=Welke bezorgmethoden deze ontvanger mag gebruiken en, wanneer push-bezorging is toegestaan, het URL-voorvoegsel waarnaar de zender beveiligingsgebeurtenistokens mag pushen.
ssfSectionEvents=Evenementen
ssfSectionEventsHelp=Welke gebeurtenistypen deze ontvanger adverteert en levert, leeftijds- en inactiviteitsbeperkingen die het postvak UIT begrenzen, en of beheerders synthetische gebeurtenissen mogen uitzenden voor foutopsporing of workflow-integratie.
ssfAllowedDeliveryMethods=Toegestane bezorgmethoden
ssfAllowedDeliveryMethodsHelp=Welke bezorgmethoden deze ontvanger mag selecteren bij het registreren van een stream. Er moet ten minste één methode zijn ingeschakeld. De ontvanger kiest een van de toegestane methoden tijdens het maken van de stream; Door deze lijst te beperken tot alleen pollen, kan de zender geen uitgaande HTTP-oproepen naar deze ontvanger uitvoeren.
ssfAllowedDeliveryMethods.push=Push-levering
ssfAllowedDeliveryMethods.pushHelp=Zender POST beveiligingsgebeurtenistokens naar een door de ontvanger geleverde URL (RFC 8935). Vereist dat hieronder geldige push-URL's worden geconfigureerd.
ssfAllowedDeliveryMethods.poll=Levering van opiniepeilingen
ssfAllowedDeliveryMethods.pollHelp=De ontvanger haalt beveiligingsgebeurtenistokens in de wachtrij van een poll-eindpunt dat eigendom is van de zender (RFC 8936). De eindpunt-URL wordt gegenereerd door Keycloak; er is geen toelatingslijst per ontvanger nodig.
ssfValidPushUrls=Geldige push-URL's
ssfValidPushUrlsHelp=Toegestane lijst met URL-patronen die de ontvanger kan registreren als push-eindpunt. Elke invoer wordt vergeleken met de door de ontvanger geleverde URL met behulp van een exacte overeenkomst of een jokerteken met achtervoegsel (https://receiver/push/* staat bijvoorbeeld elke tenant + stream-ID onder dat pad toe). Een URL buiten de toelatingslijst wordt afgewezen met HTTP 400. Dit is de SSRF-verdediging van de ontvanger. Blote * wordt niet gehonoreerd.
ssfValidPushUrls.add=Voeg een geldige push-URL toe
ssfReceiverEnabled=SSF-ontvanger
ssfReceiverEnabledHelp=Indien ingeschakeld, fungeert deze client als een Shared Signals Framework (SSF)-ontvanger. Keycloak verzendt beveiligingsgebeurtenissen naar deze client volgens de geconfigureerde SSF-stream.
ssfStream=SSF-stroom
ssfStreamHelp=De stream die voor deze ontvanger is geregistreerd en de instellingen voor de bezorging van gebeurtenissen.
ssfStreamNotRegistered=Nog geen SSF-stream geregistreerd
ssfStreamNotRegisteredHelp=Deze ontvangerclient heeft nog geen SSF-stream geregistreerd bij de zender. Hieronder kunt u er namens hem een ​​aanmaken, of de ontvanger kan er zelf een aanmaken via de SSF Transmitter API.
ssfCreateStream=Stroom maken
ssfCreateStreamReset=Duidelijk
ssfCreateStreamSuccess=SSF-stream is succesvol aangemaakt.
ssfCreateStreamError=Kan SSF-stream niet maken\: {{error}}
ssfCreateStreamDeliveryMethod=Leveringswijze
ssfCreateStreamDeliveryMethodHelp=De SSF-leveringsmethode die voor deze stream moet worden gebruikt. Push (RFC 8935) verzendt ondertekende SETs naar een door de ontvanger gehost eindpunt; Poll (RFC 8936) host het eindpunt op de zender en de ontvanger haalt SETs op volgens zijn eigen schema. Push vereist dat de ontvanger zijn eigen eindpunt-URL opgeeft; Poll gebruikt een door de zender gegenereerde URL die wordt geretourneerd in het maakantwoord.
ssfCreateStreamEndpointUrl=Push-eindpunt-URL
ssfCreateStreamEndpointUrlHelp=HTTPS-URL aan de ontvangerzijde waarnaar de zender beveiligingsgebeurtenistokens zal POSTen.
ssfCreateStreamEndpointUrlRequired=Een push-eindpunt-URL is vereist.
ssfCreateStreamEndpointUrlInvalid=De URL van het push-eindpunt moet een absolute http- of https-URL zijn.
ssfCreateStreamEventsRequested=Evenementen gevraagd
ssfCreateStreamEventsRequestedHelp=De SSF-gebeurtenistypen waarop de ontvanger moet zijn geabonneerd. Kies uit de gebeurtenissen die de zender moet uitzenden; laat dit leeg om de standaard ondersteunde set van de zender te gebruiken.
ssfCreateStreamDescription=Beschrijving
ssfCreateStreamDescriptionHelp=Optioneel voor mensen leesbaar label voor de stream, weergegeven in deze beheerdersinterface voor operators.
ssfStreamAudienceCurrentHelp=Het publiek dat momenteel is geconfigureerd voor de geregistreerde SSF-stream. Het bijwerken van het veld Stream Audience in het gedeelte SSF Receiver heeft alleen invloed op streams die de ontvanger na de wijziging registreert.
ssfStreamPushEndpointUrl=Push-eindpunt-URL
ssfStreamPushEndpointUrlHelp=HTTPS-URL aan de ontvangerzijde waarnaar de zender beveiligingsgebeurtenistokens POST. Alleen weergegeven voor streams die de HTTP-push-leveringsmethode gebruiken.
ssfStreamPollEndpointUrl=Eindpunt-URL van poll
ssfStreamPollEndpointUrlHelp=Door de zender gehoste URL waarnaar de ontvanger POST om in behandeling zijnde Security Event Tokens (RFC 8936) op te halen. De ontvanger authenticeert met zijn eigen dragertoken; er is geen autorisatieheader aan de zenderzijde geconfigureerd.
ssfStreamPushAuthHeader=Push-autorisatiekop
ssfStreamPushAuthHeaderHelp=Waarde die bij elke push (bijvoorbeeld een bearertoken) in de header van het autorisatieverzoek wordt verzonden, zoals deze is.
ssfDeleteStream=Stream verwijderen
ssfDeleteStreamConfirmTitle=SSF-stream verwijderen?
ssfDeleteStreamConfirmMessage=De geregistreerde SSF-stream voor deze client wordt verwijderd en de ontvanger moet deze opnieuw maken. Dit kan niet ongedaan worden gemaakt. Doorgaan?
ssfDeleteStreamSuccess=SSF-stream is succesvol verwijderd.
ssfSubjects=SSF-onderwerpen
