registration_not_supported=Registratie wordt niet ondersteund
oid4vciAttributes=OID4VCI-attributen
oid4vciNonceLifetime=OID4VCI Nonce levenslang
oid4vciNonceLifetimeHelp=De levensduur van de OID4VCI nonce.
credentialOfferLifespan=Levensduur van legitimatieaanbieding
credentialOfferLifespanHelp=De standaardlevensduur van aanbiedingen voor inloggegevens. Geldt voor zowel de autorisatiecode als de vooraf geautoriseerde codetoekenningsstromen.
oid4vciFormValidationError=Zorg ervoor dat de OID4VCI-attribuutvelden gevuld zijn met waarden van 30 seconden of langer.
signedMetadataLifespan=Levensduur van ondertekende metadata
signedMetadataLifespanHelp=De levensduur van de ondertekende metadata. Na deze tijd vervallen de ondertekende metadata.
signedMetadataSigningAlgorithm=Ondertekend algoritme voor metagegevens
signedMetadataSigningAlgorithmHelp=Het algoritme dat wordt gebruikt om de metadata van de uitgever te ondertekenen. Hierdoor wordt de integriteit en authenticiteit van de metadata gewaarborgd.
requireRequestEncryption=Vereist verzoekversleuteling
requireRequestEncryptionHelp=Indien ingeschakeld, is codering vereist voor referentieaanvragen bovenop TLS. Portefeuilles moeten verzoeken versleutelen met behulp van de ondersteunde metagegevens voor verzoekversleuteling.
requireResponseEncryption=Responsversleuteling vereisen
requireResponseEncryptionHelp=Indien ingeschakeld, is codering vereist voor inlogreacties bovenop TLS. Wallets moeten encryptiesleutels opgeven in het referentieverzoek.
enableDeflateCompression=Schakel DEF-compressie in
enableDeflateCompressionHelp=Indien ingeschakeld, wordt het DEF-compressie-algoritme ondersteund voor referentieaanvragen. Hierdoor kunnen klanten hun verzoeken comprimeren om de payloadgrootte te verkleinen.
batchIssuanceSize=Grootte van batchuitgifte
batchIssuanceSizeHelp=Het maximale aantal referenties dat kan worden uitgegeven in één batchverzoek. Dit helpt bij het beheren van de serverbelasting en responstijden.
timeClaimCorrelationMitigation=Beperking van correlatie tussen tijdclaims
timeClaimsStrategy=Strategie die moet worden toegepast op tijdclaims
timeClaimsStrategyHelp=Strategie die moet worden toegepast op tijdclaims. Ondersteunde waarden: uit, willekeurig, rond.
randomizeWindow=Venster willekeurig maken
randomizeWindowHelp=Wanneer de strategie willekeurig is, trekt u een willekeurig aantal seconden tussen 0 en de waarde van dit kenmerk af van de oorspronkelijke tijdstempel om correlatieaanvallen te verminderen.
roundUnit=Ronde eenheid
roundUnitHelp=Wanneer de strategie rond is, kapt u de tijdstempels af tot de geselecteerde eenheidsgrens (UTC). Ondersteunde waarden: TWEEDE, MINUUT, UUR, DAG.
randomize=Willekeurig
round=Ronde
second=Seconde
day=Dag
credentialConfigurationId=Referentieconfiguratie-ID
credentialConfigurationIdHelp=De unieke ID voor deze referentieconfiguratie. Deze ID wordt gebruikt in de metagegevens van de legitimatieverstrekker en in legitimatieverzoeken.
credentialIdentifier=Referentie-ID
credentialIdentifierHelp=Een specifieke ID voor dit referentietype. Dit kan worden gebruikt om onderscheid te maken tussen verschillende varianten van hetzelfde credentialtype.
credentialOfferRequired=Credential-aanbieding vereist
credentialOfferRequiredHelp=De Uitgever heeft een credential-aanbieding nodig voor deze credential-configuratie.
issuerDid=Uitgever DED
issuerDidHelp=De gedecentraliseerde identificatiecode (DID) van de uitgever van de referentie. Hiermee wordt geïdentificeerd wie de verifieerbare inloggegevens uitgeeft.
credentialLifetime=Levensduur legitimatie
credentialLifetimeHelp=De levensduur van de uitgegeven referentie. Na deze tijd vervalt de inloggegevens en kan deze niet meer worden vernieuwd. De portemonnee kan de inloggegevens vernieuwen om een ​​nieuwe VC te verkrijgen, zolang deze levensduur niet is overschreden.
bindingRequired=Cryptografische binding vereist
bindingRequiredHelp=Indien ingeschakeld, vereist deze identificatieconfiguratie cryptografische houderbinding en bijbehorende bewijzen. Indien uitgeschakeld, is er geen cryptografische binding vereist en worden gerelateerde metagegevens weggelaten.
cryptographicBindingMethodsSupported=Cryptografische bindingsmethoden
cryptographicBindingMethodsSupportedHelp=Door komma's gescheiden lijst met representaties van het cryptografische sleutelmateriaal waaraan de referentie zal worden gebonden (bijvoorbeeld: jwk). Indien leeg, worden er geen cryptografische bindingsmethoden geadverteerd.
cryptographicBindingMethodsSupportedInvalid=Niet-ondersteunde bindingsmethode(n): {{invalid}}. Toegestane waarden: jwk
bindingSupportedProofTypes=Ondersteunde proeftypen
bindingSupportedProofTypesHelp=Door komma's gescheiden lijst met bewijstypen die worden geaccepteerd wanneer cryptografische binding is ingeschakeld (bijvoorbeeld: jwt). Indien leeg, worden er geen proeftypen geadverteerd en worden proefdrukken niet afgedwongen.
bindingSupportedProofTypesInvalid=Niet-ondersteunde proefdruktype(s): {{invalid}}. Toegestane waarden: jwt, attestation
supportedFormats=Ondersteunde formaten
supportedFormatsHelp=Het formaat van de verifieerbare referentie. Momenteel ondersteunde formaten: SD-JWT VC (dc+sd-jwt), JWT VC (jwt_vc).
credentialRefreshInterval=Interval voor vernieuwing van legitimatie
credentialRefreshIntervalHelp=Hoe vaak de portemonnee de inloggegevens moet vernieuwen. De vervaldatum van de daadwerkelijke VC die naar de portemonnee wordt teruggestuurd, is ingesteld op dit interval. Het vernieuwingstoken blijft geldig gedurende de volledige levensduur van de referentie, waardoor regelmatige verlenging mogelijk is. Als dit niet is ingesteld, wordt de standaardwaarde ingesteld op 7 dagen of de levensduur van de inloggegevens, afhankelijk van welke van de twee het kleinst is.
refreshIntervalCannotExceedLifetime=Het vernieuwingsinterval van de inloggegevens ({{interval}}) mag de levensduur van de inloggegevens ({{lifetime}}) niet overschrijden. Het vernieuwingstoken verloopt met de levensduur van de referentie.
credentialDisplay=Referentieweergave
credentialDisplayHelp=JSON-array van objecten die weergavemetagegevens voor portefeuilles bevatten (naam, logo, kleuren, enz.). Voorbeeld: [{"name": "IdentityCredential", "locale": "en-US", "logo": {"uri": "https://example.com/logo.png", "alt_text": "Logo"}, "background_color": "#12107c", "text_color": "#FFFFFF"}]
credentialSigningAlgorithm=Algoritme voor handtekeningondertekening
credentialSigningAlgorithmHelp=Ondertekeningsalgoritme dat wordt gebruikt om de actieve realm-sleutel te selecteren voor het ondertekenen van inloggegevens (bijvoorbeeld 'ES256'). Indien niet gespecificeerd, wordt de actieve sleutel geselecteerd met behulp van het standaardalgoritme van de realm. Deze optie is uitgeschakeld als een specifieke 'Signing Key ID' is geselecteerd.
hashAlgorithm=Hash-algoritme
hashAlgorithmHelp=Hash-algoritme gebruikt voor SD-JWT-inloggegevens (bijvoorbeeld 'SHA-256'). Standaard ingesteld op "SHA-256" indien niet gespecificeerd.
supportedCredentialTypes=Ondersteunde identificatietypen
supportedCredentialTypesHelp=Door komma's gescheiden lijst met typen legitimatiegegevens (bijvoorbeeld 'VerifiableCredential,UniversityDegreeCredential'). Wordt gebruikt in de referentiedefinitie voor JWT VC- en SD-JWT-formaten. Wanneer deze optie niet is geconfigureerd, wordt de naam van het clientbereik gebruikt als een 'type'-claim van de bijbehorende referentie.
verifiableCredentialType=Verifieerbaar identificatietype (VCT)
verifiableCredentialTypeHelp=De ID van het identificatietype voor referenties in de SD-JWT-indeling. Deze waarde wordt gebruikt in de vct-claim van de uitgegeven referentie. Vereist voor SD-JWT-indeling.
tokenJwsType=Token JWS-type
tokenJwsTypeHelp=De typewaarde die in de typ-header van de JWT is geschreven. Indien leeg, wordt een formaatspecifieke standaardwaarde gebruikt ("dc+sd-jwt" voor SD-JWT VC en "vc+jwt" voor JWT VC). Kan worden ingesteld op aangepaste waarden indien vereist door de portemonnee of het systeem.
tokenJwsTypeFormatWarning=Het geconfigureerde Token JWS-type komt niet overeen met de aanbevolen waarde voor het geselecteerde referentieformaat. Aanbevolen waarde: {{recommended}}.
visibleClaims=Zichtbare claims
visibleClaimsHelp=Door komma's gescheiden lijst met claims die altijd worden bekendgemaakt in de hoofdtekst van de SD-JWT (bijvoorbeeld "id,iat,nbf,exp,jti,given_name"). Standaard ingesteld op "id,iat,nbf,exp,jti". Alleen van toepassing op het SD-JWT-formaat.
signingKeyId=Sleutel-ID ondertekenen
signingKeyIdHelp=Optioneel. De ID van de realmsleutel die wordt gebruikt om de referentie te ondertekenen. Als dit niet is opgegeven, wordt de actieve ondertekeningssleutel van het domein van het algoritme dat is opgegeven door 'Credential Signing Algorithm' (indien ingesteld) automatisch gebruikt. Als hier een specifieke sleutel wordt geselecteerd, wordt de optie 'Credential Signing Algorithm' uitgeschakeld en automatisch ingesteld op het algoritme van de sleutel.
useDefaultKey=Standaard gebruiken (actieve ondertekeningssleutel van realm)
useDefaultAlg=Gebruik standaardalgoritme
workflows=Werkstromen
titleWorkflows=Werkstromen
workflowsExplain=Workflows stellen beheerders in staat het beheer van realm-resources te automatiseren door middel van op tijd of gebeurtenissen gebaseerd beleid.
createWorkflow=Werkstroom creëren
