unmanagedAttributesHelpText=Niet-beheerde attributen zijn gebruikersattributen die niet expliciet zijn gedefinieerd in de gebruikersprofielconfiguratie. Standaard zijn niet-beheerde attributen `Uitgeschakeld` en niet beschikbaar vanuit enige context zoals registratie, account en de administratieconsole. Door deze in te stellen op `Ingeschakeld`, worden niet-beheerde attributen volledig herkend door de server en toegankelijk via alle contexten, wat nuttig is als u begint met het migreren van een bestaande realm naar het declaratieve gebruikersprofiel en nog niet alle gebruikersattributen hebt gedefinieerd in de gebruikersprofielconfiguratie. Door `Alleen beheerders kunnen schrijven` in te stellen, kunnen niet-beheerde attributen alleen worden beheerd via de administratieconsole en API, wat nuttig is als u al een aangepast attribuut hebt gedefinieerd dat door gebruikers kan worden beheerd, maar niet zeker bent over het toevoegen van andere attributen die alleen door beheerders beheerd mogen worden. Door `Alleen beheerders kunnen inzien` in te stellen, zijn niet-beheerde attributen alleen-lezen en alleen beschikbaar via de administratieconsole en API.
