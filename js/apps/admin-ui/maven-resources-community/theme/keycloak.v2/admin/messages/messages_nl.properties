policyRolesHelp=Klik op ‘Rollen toevoegen’ om de geaccepteerde rollen onderdeel te maken van deze policy. Aanvinken van het ‘verplicht veld’ vakje betekent dat de geselecteerde rollen aanwezig MOETEN zijn tijdens het evalueren van de policy, afgezien van andere rollen. Alle relevante rollen gedeselecteerd laten, staat gelijk aan de beslissingsstrategie ‘Affirmatief’.
