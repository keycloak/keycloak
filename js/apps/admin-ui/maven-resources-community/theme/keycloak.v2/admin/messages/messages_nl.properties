periodicFullSyncHelp=Als 'Gebruikers importeren' is ingeschakeld, wordt er een periodieke taak gestart om gebruikers van LDAP naar Keycloak te synchroniseren. Bij dit type synchronisatie worden bij elke run alle gebruikers uit LDAP opgehaald, waarbij nieuwe gebruikers worden geïmporteerd of bestaande worden bijgewerkt. Als u een groot aantal gebruikers in LDAP heeft, kan dit inefficiënt zijn. In dat geval kunt u deze optie uitschakelen en in plaats daarvan 'Periodieke gewijzigde gebruikerssynchronisatie' gebruiken.
periodicChangedUsersSyncHelp=Als 'Gebruikers importeren' is ingeschakeld, wordt er een periodieke taak gestart om gebruikers van LDAP naar Keycloak te synchroniseren op basis van hun gemaakte of laatst bijgewerkte tijdstempels. Dit type synchronisatie is efficiënter dan een volledige synchronisatie, vooral als u een groot aantal gebruikers in LDAP heeft. Het vereist echter dat uw LDAP-server zoeken ondersteunt met de attributen 'createTimestamp' en 'modifyTimestamp' in querypredikaten.
