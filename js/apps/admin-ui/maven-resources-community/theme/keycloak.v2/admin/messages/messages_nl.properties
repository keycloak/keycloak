fullNameClaim=Naamclaim
fullNameClaimHelp=De naam van de claim uit het JSON-document dat wordt geretourneerd door het eindpunt van het gebruikersprofiel en dat de volledige naam van de gebruiker vertegenwoordigt. Indien niet opgegeven, is de standaardwaarde `name`.
givenNameClaim=Voornaam Claim
givenNameClaimHelp=De naam van de claim uit het JSON-document dat wordt geretourneerd door het gebruikersprofieleindpunt dat de voornaam van de gebruiker vertegenwoordigt. Indien niet opgegeven, is de standaardwaarde `given_name`.
familyNameClaim=Familienaam Claim
familyNameClaimHelp=De naam van de claim uit het JSON-document dat wordt geretourneerd door het eindpunt van het gebruikersprofiel en dat de achternaam van de gebruiker vertegenwoordigt. Indien niet opgegeven, is de standaardwaarde `family_name`.
samlClientEncryptionAlgorithm=Encryptie-algoritme
samlClientEncryptionAlgorithmHelp=Versleutelingsalgoritme gebruikt voor de client. Standaard AES_256_GCM.
samlClientKeyEncryptionAlgorithm=Sleuteltransportalgoritme
samlClientKeyEncryptionAlgorithmHelp=Sleuteltransportalgoritme dat door de client wordt gebruikt om de geheime sleutel te versleutelen die voor versleuteling wordt gebruikt. Standaardwaarde RSA-OAEP-11.
samlClientEncryptionDigestMethod=Digest-methode voor RSA-OAEP
samlClientEncryptionDigestMethodHelp=Digest-methode die moet worden gebruikt wanneer een RSA-OAEP-algoritme is geselecteerd als het sleuteltransportalgoritme. Standaardwaarde SHA-256.
samlClientEncryptionMaskGenerationFunction=Functie voor het genereren van maskers
samlClientEncryptionMaskGenerationFunctionHelp=Maskergeneratiefunctie om te gebruiken wanneer RSA-OAEP-11 is geselecteerd als het sleuteltransportalgoritme. Standaardwaarde mgf1sha256.
openIdVerifiableCredentials=OpenID voor verifieerbare inloggegevens
openIdVerifiableCredentialsHelp=Deze sectie wordt gebruikt om instellingen te configureren die verband houden met OpenID voor Verifiable Credential Issuance (OID4VCI).
oid4vciEnabled=Schakel OID4VCI in
oid4vciEnabledHelp=Schakel deze optie in zodat de client verifieerbare inloggegevens kan opvragen bij het OID4VCI-inloggegevenseindpunt van Keycloak.
oid4vciAttesterTrustIdps=OID4VCI Attester vertrouwt identiteitsproviders
oid4vciAttesterTrustIdpsHelp=Vertrouwensmateriaal-identiteitsproviders die vertrouwde openbare sleutels van attesters bevatten voor validatie van sleutelattesten.
noAccessPolicies=Geen toegangsbeleid
noAccessPoliciesInstructions=Er is nog geen toegangsbeleid geconfigureerd. Klik op de onderstaande knop om het eerste beleid te configureren.
includeInOpenIdProviderMetadata=Opnemen in metagegevens van de OpenID-provider
includeInOpenIdProviderMetadataHelp=Indien ingeschakeld, wordt dit clientbereik opgenomen in OpenID Provider Metadata.
