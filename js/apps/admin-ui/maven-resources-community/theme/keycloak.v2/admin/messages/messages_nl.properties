ssfStreamStatusReason=Statusreden
ssfStreamStatusReasonHelp=Voor mensen leesbare reden die verband houdt met de huidige streamstatus, als deze is opgegeven toen de status voor het laatst werd gewijzigd (bijvoorbeeld doordat een ontvanger de stream pauzeert of uitschakelt).
ssfDelivery=Leveringsmethode
ssfDeliveryHelp=De bezorgmethode die de zender gebruikt voor evenementen op deze stream. Push (RFC 8935) verzendt ondertekende SET's naar het eindpunt van de ontvanger; Poll (RFC 8936) houdt gebeurtenissen vast in de outbox van de zender totdat de ontvanger ze via het door de zender gehoste poll-eindpunt haalt.
