usernameLdapAttributeHelp=Naam van het LDAP-attribuut, dat wordt toegewezen als Keycloak-gebruikersnaam. Voor veel LDAP-serverleveranciers kan dit 'uid' zijn. Voor Active Directory kan dit 'sAMAccountName' of 'cn' zijn. Het attribuut moet worden ingevuld voor alle LDAP-gebruikersrecords die u van LDAP naar Keycloak wilt importeren.
