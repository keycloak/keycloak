policyDecisionStagey=De beslissingsstrategie bepaalt hoe het beleid dat verband houdt met een bepaalde toestemming wordt geëvalueerd en hoe een definitieve beslissing wordt verkregen. 'Bevestigend' betekent dat ten minste één beleid tot een positief besluit moet leiden, zodat het uiteindelijke besluit ook positief kan zijn. 'Unaniem' betekent dat al het beleid tot een positief besluit moet leiden, zodat het uiteindelijke besluit ook positief kan zijn. ‘Consensus’ houdt in dat het aantal positieve besluiten groter moet zijn dan het aantal negatieve besluiten. Als het aantal positieve en negatieve punten hetzelfde is, zal de uiteindelijke beslissing negatief zijn.
