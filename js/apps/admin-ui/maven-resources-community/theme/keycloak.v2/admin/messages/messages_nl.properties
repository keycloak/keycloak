referralHelp=Specificeert of LDAP-verwijzingen moeten worden gevolgd of genegeerd. Houd er rekening mee dat het inschakelen van verwijzingen de authenticatie kan vertragen, omdat de LDAP-server hierdoor kan beslissen welke andere LDAP-servers hij wil gebruiken. Dit kunnen mogelijk niet-vertrouwde servers zijn.
authenticatorRefConfig.value.help=Voeg een aangepaste referentienaam toe voor de authenticator. Wanneer deze authenticator met succes is voltooid tijdens een authenticatiestroom, gebruikt de protocolmapper Authentication Method Reference (AMR) deze waarde om de amr-claim van de gegenereerde tokens in te vullen. Let op: het AMR-protocol moet worden geconfigureerd voor de gegeven client om de AMR-claim in te vullen.
authenticatorRefConfig.value.label=Authenticatorreferentie
authenticatorRefConfig.maxAge.help=De maximale leeftijd in seconden waarvoor de authenticatorreferentiewaarde geschikt is in een SSO-sessie. Wanneer de protocoltoewijzer Authentication Method Reference (AMR) wordt gebruikt, wordt de AMR alleen als geldig beschouwd en in het token ingevuld als de uitvoering van de authenticator binnen de opgegeven maximale leeftijd is voltooid.
authenticatorRefConfig.maxAge.label=Authenticatorreferentie Max. leeftijd
loa-condition-level=Niveau van authenticatie (LoA)
loa-condition-level.tooltip=Niveau van authenticatie. Deze waarde moet altijd een geheel getal zijn, wat groter is dan of gelijk is aan 0. De substromen in de authenticatiestroom moeten altijd worden geordend van het laagste niveau naar een hoger niveau.
loa-max-age=Maximale leeftijd
loa-max-age.tooltip=Maximale leeftijd in seconden voordat dit authenticatieniveau geldig is. Als het specifieke niveau wordt aangevraagd en de gebruiker al eerder dan het opgegeven aantal seconden geleden met dit niveau is geverifieerd, wordt hem niet gevraagd zich opnieuw te authenticeren. Maar als hij later dan het aangegeven aantal seconden geleden heeft geauthenticeerd, zal hij zich opnieuw moeten authenticeren met dit niveau. Waarde 0 in de configuratie betekent dat de gebruiker zich altijd opnieuw moet authenticeren op dit niveau wanneer dit niveau wordt aangevraagd.
includeInLightweight.label=Toevoegen aan lichtgewicht toegangstoken
includeInLightweight.tooltip=Moet de claim worden toegevoegd aan het lichtgewicht toegangstoken?
lightweightAccessToken=Gebruik altijd een lichtgewicht toegangstoken
lightweightAccessTokenHelp=Als deze optie Aan staat, worden er altijd lichtgewicht toegangstokens gebruikt. Als deze op Uit staat, worden ze niet standaard gebruikt, maar is het nog steeds mogelijk om ze in te schakelen met de clientbeleiduitvoerder.
supportJwtClaimInIntrospectionResponse=Ondersteun de JWT-claim in Introspection Response
supportJwtClaimInIntrospectionResponseHelp=Als deze op Aan staat, bevatten introspectieverzoeken die de header 'Accepteren: application/jwt' gebruiken ook een claim met de naam 'jwt', waarbij de claims van het introspectieresultaat gecodeerd zijn als JWT-toegangstoken.
allowTokenIntrospectionWithoutAudienceCheck=Sta token-introspectie toe zonder controle van het publiek
allowTokenIntrospectionWithoutAudienceCheckHelp=Hiermee kan deze client tokens introspecteren zonder publieksvalidatie. Deze optie is verouderd en zal in een toekomstige release worden verwijderd. Alleen inschakelen voor achterwaartse compatibiliteit tijdens migratie.
allowUserinfoWithLightweightAccessToken=Sta UserInfo toe met een lichtgewicht toegangstoken
allowUserinfoWithLightweightAccessTokenHelp=Maakt het mogelijk dat lichtgewicht toegangstokens die door deze client zijn uitgegeven, worden gebruikt met het UserInfo-eindpunt. Lichtgewicht tokens zijn ontworpen voor token-introspectie. Deze optie is verouderd en zal in een toekomstige release worden verwijderd. Alleen inschakelen voor achterwaartse compatibiliteit tijdens migratie.
ssf=SSF
ssfTransmitterEnabled=SSF-zender
ssfTransmitterEnabledHelp=Indien ingeschakeld, fungeert deze realm als een Shared Signals Framework (SSF) Transmitter en wordt het SSF Configuration Metadata-eindpunt zichtbaar. Als u dit uitschakelt voor een realm met actieve streams, worden gebeurtenissen in de wachtrij verwijderd voor de ontvangers die zijn opgeslagen; pauzeer of verwijder de streams eerst als u wilt dat ontvangers op de hoogte worden gesteld via een stream-bijgewerkte SET voordat ze stil worden.
ssfTransmitterDisableConfirmTitle=SSF-zender uitschakelen voor dit rijk?
ssfTransmitterDisableConfirmIntro=Het uitschakelen van de SSF-zenderfunctie voor dit rijk heeft de volgende effecten\:
ssfTransmitterDisableConfirmBulletEndpoints=Alle eindpunten van de SSF-zender (metagegevens, streams, onderwerpen, status, SSE) retourneren 404 naar ontvangers.
ssfTransmitterDisableConfirmBulletEvents=Er worden geen nieuwe gebruikers- of beheerdersgebeurtenissen geregistreerd voor SSF-ontvangers in dit rijk.
ssfTransmitterDisableConfirmBulletDelivery=Alle gebeurtenissen in de wachtrij voor ontvangers in dit domein (PENDING en HELD) worden bij het opslaan verwijderd. Ze kunnen niet worden hersteld.
ssfTransmitterDisableConfirmBulletReceivers=Ontvangers krijgen geen melding dat de streams stilvallen. Ze zien simpelweg geen gebeurtenissen meer.
ssfTransmitterDisableConfirmRecommendation=Aanbevolen\: pauzeer of verwijder de actieve SSF-streams in dit domein voordat u ze opslaat, zodat ontvangers een goede melding krijgen over updates van de stream voordat de levering stopt.
