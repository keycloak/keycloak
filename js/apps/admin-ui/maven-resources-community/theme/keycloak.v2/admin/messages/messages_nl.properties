ssfEmitTitle=Zend een synthetische gebeurtenis uit
ssfEmitTitleHelp=Stuur een synthetische gebeurtenis naar deze ontvanger. De zender formatteert de sub_id volgens het door de ontvanger geconfigureerde User Subject Format en past dezelfde abonnementsfilters toe als native gebeurtenissen.
ssfEmitEventType=Type evenement
ssfEmitEventTypeHelp=Een van de gebeurtenistypen die de zender van deze ontvanger kan uitzenden. De onderstaande payload wordt gedeserialiseerd op basis van de gebeurtenisklasse die voor het geselecteerde type is geregistreerd.
ssfEmitEventTypeSelectPrompt=-- selecteer een evenementtype --
ssfEmitEventTypeRequired=Selecteer een gebeurtenistype dat u wilt verzenden.
ssfEmitSubjectValueHelp=Wordt omgezet in een Keycloak-gebruiker (gebruikers-ID / e-mailadres / gebruikersnaam) of organisatie (org-alias). Voor gebruikersonderwerpen bouwt de zender de sub_id op met behulp van het geconfigureerde User Subject Format van de ontvanger, zodat de uitgezonden SET overeenkomt met de vorm van een oorspronkelijke gebeurtenis voor deze ontvanger; org-onderwerpen zenden een complex alleen-tenant-onderwerp uit. Onderwerp-abonnementsfilters en de formaatspecifieke fail-loude regels (geen e-mail, geen organisatie voor +tenant) zijn nog steeds van toepassing.
ssfEmitSubjectValueRequired=Er is een onderwerpwaarde vereist.
ssfEmitPayload=Gebeurtenispayload (JSON)
ssfEmitPayloadHelp=Gebeurtenisspecifieke hoofdtekst: moet deserialiseren op basis van de klasse van het geselecteerde gebeurtenistype. Laat dit leeg om een ​​lege payload uit te zenden (alleen zinvol voor gebeurtenistypen zonder verplichte velden). Ondersteunde tijdelijke aanduidingen (uitgebreid vóór JSON-parsering): __now__ wordt omgezet naar de huidige Unix-tijd in seconden. Bruikbaar zonder aanhalingstekens voor numerieke velden, b.v. "event_timestamp": __nu__.
ssfEmitPayloadInvalidJson=Payload is geen geldige JSON: {{error}}
ssfEmitEvent=Gebeurtenis uitzenden
