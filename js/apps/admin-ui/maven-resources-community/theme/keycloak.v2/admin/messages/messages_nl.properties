copyWorkflow=Kopieerwerkstroom
workflowDetails=Workflowdetails
updateWorkflowDetails=Momenteel kunnen workflows niet worden bewerkt, behalve om de naam te wijzigen en aan/uit te zetten. U kunt de workflow kopiëren en de kopie bewerken.
copyWorkflowDetails=U staat op het punt een nieuwe workflow te maken op basis van een bestaande.
createWorkflowDetails=Maak een nieuwe werkstroom door de JSON-representatie ervan op te geven.
workflowEnabled=Werkstroom ingeschakeld
workflowDisabled=Werkstroom uitgeschakeld
