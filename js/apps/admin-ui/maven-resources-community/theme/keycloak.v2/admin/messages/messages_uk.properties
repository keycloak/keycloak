authenticatorRefConfig.maxAge.help=Максимальний вік у секундах, протягом якого значення посилання на автентифікатор є дійсним у SSO-сесії. Коли використовується мапер протоколу Authentication Method Reference (AMR), AMR вважатиметься дійсним і заповнюватиметься в токені, лише якщо виконання автентифікатора було завершено протягом указаного максимального віку.
