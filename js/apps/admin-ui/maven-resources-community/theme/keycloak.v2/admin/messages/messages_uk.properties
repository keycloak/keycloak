loa-max-age=Максимальний вік
loa-max-age.tooltip=Максимальний вік у секундах, протягом якого цей рівень автентифікації є дійсним. Якщо указано конкретний рівень, і користувач уже автентифікувався з цим рівнем раніше, ніж указана кількість секунд тому, його не проситимуть повторно автентифікуватися. Але якщо він автентифікувався пізніше, ніж указана кількість секунд тому, йому потрібно буде знову автентифікуватися з цим рівнем. Значення 0 в конфігурації означає, що користувачу завжди потрібно повторно автентифікуватися з цим рівнем щоразу, коли цей рівень запитується.
