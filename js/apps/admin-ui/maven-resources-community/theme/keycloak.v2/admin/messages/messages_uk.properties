familyNameClaim=Клейм прізвища
familyNameClaimHelp=Назва клейму з документа JSON, поверненого кінцевою точкою профілю користувача, що представляє прізвище користувача. Якщо не указано, за замовчуванням `family_name`.
samlClientEncryptionAlgorithm=Алгоритм шифрування
samlClientEncryptionAlgorithmHelp=Алгоритм шифрування, що використовується для клієнта. За замовчуванням AES_256_GCM.
samlClientKeyEncryptionAlgorithm=Алгоритм передачі ключа
samlClientKeyEncryptionAlgorithmHelp=Алгоритм передачі ключа, що використовується клієнтом для шифрування секретного ключа, який використовується для шифрування. Значення за замовчуванням RSA-OAEP-11.
samlClientEncryptionDigestMethod=Метод дайджесту для RSA-OAEP
samlClientEncryptionDigestMethodHelp=Метод дайджесту, який використовується, коли як алгоритм передачі ключа вибрано будь-який алгоритм RSA-OAEP. Значення за замовчуванням SHA-256.
samlClientEncryptionMaskGenerationFunction=Функція генерації маски
samlClientEncryptionMaskGenerationFunctionHelp=Функція генерації маски, яка використовується, коли як алгоритм передачі ключа вибрано RSA-OAEP-11. Значення за замовчуванням mgf1sha256.
openIdVerifiableCredentials=OpenID для облікових даних, що перевіряються
openIdVerifiableCredentialsHelp=Цей розділ використовується для налаштування параметрів, пов’язаних з OpenID для видачі облікових даних, що перевіряються (OID4VCI).
oid4vciEnabled=Увімкнути OID4VCI
oid4vciEnabledHelp=Увімкніть цю опцію, щоб дозволити клієнту запитувати облікові дані, що перевіряються, у кінцевій точці облікових даних OID4VCI Keycloak.
noAccessPolicies=Немає політик доступу
noAccessPoliciesInstructions=Ще не налаштовано жодної політики доступу. Натисніть кнопку нижче, щоб налаштувати першу політику.
includeInOpenIdProviderMetadata=Включити в метадані OpenID Provider
includeInOpenIdProviderMetadataHelp=Якщо увімкнено, ця клієнтська область буде включена в метадані OpenID Provider.
# standard error responses OAuth
invalid_request=Недійсний запит
unauthorized_client=Неавторизований клієнт
access_denied=Доступ відмовлено
unsupported_response_type=Непідтримуваний тип відповіді
invalid_scope=Недійсна область
server_error=Помилка сервера
temporarily_unavailable=Тимчасово недоступний
# standard error responses OIDC
interaction_required=Потрібна взаємодія
login_required=Потрібен вхід
account_selection_required=Потрібен вибір облікового запису
consent_required=Потрібна згода
invalid_request_uri=Недійсний URI запиту
invalid_request_object=Недійсний об’єкт запиту
request_not_supported=Запит не підтримується
request_uri_not_supported=URI запиту не підтримується
registration_not_supported=Реєстрація не підтримується
oid4vciAttributes=Атрибути OID4VCI
oid4vciNonceLifetime=Час життя Nonce OID4VCI
oid4vciNonceLifetimeHelp=Час життя nonce OID4VCI.
credentialOfferLifespan=Час життя пропозиції облікових даних
credentialOfferLifespanHelp=Час життя за замовчуванням пропозицій облікових даних. Застосовується як до потоку authorization code, так і до pre-authorized code grant.
oid4vciFormValidationError=Будь ласка, переконайтеся, що поля атрибутів OID4VCI заповнені значеннями 30 секунд або більше.
signedMetadataLifespan=Час життя підписаних метаданих
signedMetadataLifespanHelp=Час життя підписаних метаданих. Після цього часу підписані метадані будуть прострочені.
signedMetadataSigningAlgorithm=Алгоритм підпису підписаних метаданих
signedMetadataSigningAlgorithmHelp=Алгоритм, що використовується для підпису метаданих видавця. Це забезпечує цілісність та автентичність метаданих.
requireRequestEncryption=Вимагати шифрування запиту
requireRequestEncryptionHelp=Якщо увімкнено, шифрування є обов’язковим для запитів облікових даних поверх TLS. Гаманці повинні шифрувати запити, використовуючи метадані шифрування запитів, що підтримуються.
requireResponseEncryption=Вимагати шифрування відповіді
requireResponseEncryptionHelp=Якщо увімкнено, шифрування є обов’язковим для відповідей облікових даних поверх TLS. Гаманці повинні надавати ключі шифрування у запиті облікових даних.
enableDeflateCompression=Увімкнути стиснення DEF
enableDeflateCompressionHelp=Якщо увімкнено, алгоритм стиснення DEF підтримується для запитів облікових даних. Це дозволяє клієнтам стискати свої запити, щоб зменшити розмір корисного навантаження.
batchIssuanceSize=Розмір пакетної видачі
batchIssuanceSizeHelp=Максимальна кількість облікових даних, які можна видати в одному пакетному запиті. Це допомагає керувати навантаженням на сервер та часом відповіді.
timeClaimCorrelationMitigation=Зменшення кореляції часових клеймів
timeClaimsStrategy=Стратегія, що застосовується до часових клеймів
timeClaimsStrategyHelp=Стратегія, що застосовується до часових клеймів. Підтримувані значення: off, randomize, round.
randomizeWindow=Вікно рандомізації
randomizeWindowHelp=Коли стратегія randomize, віднімайте випадкову кількість секунд між 0 і значенням цього атрибута від оригінальної мітки часу для зменшення атак кореляції.
roundUnit=Одиниця округлення
roundUnitHelp=Коли стратегія round, скорочуйте мітки часу до межі вибраної одиниці (UTC). Підтримувані значення: SECOND, MINUTE, HOUR, DAY.
randomize=Рандомізувати
round=Округлити
second=Секунда
day=День
attestationTrust=Довіра до атестації
trustedKeyIds=Довірені ID ключів
trustedKeyIdsHelp=Список Key ID (kid) зі сховища ключів Realm, розділених комами. Цим ключам довіряють для перевірки атестацій гаманця.
trustedKeys=Довірені ключі (JSON)
trustedKeysHelp=Масив JSON об’єктів JWK. Цим ключам довіряють для перевірки атестацій гаманця на додаток до ключів Realm.
# OID4VCI Credential Configuration
credentialConfigurationId=ID конфігурації облікових даних
credentialConfigurationIdHelp=Унікальний ідентифікатор для цієї конфігурації облікових даних. Цей ID використовується в метаданих видавця облікових даних та в запитах облікових даних.
credentialIdentifier=Ідентифікатор облікових даних
credentialIdentifierHelp=Конкретний ідентифікатор для цього типу облікових даних. Це може використовуватися для розрізнення між різними варіантами одного й того ж типу облікових даних.
issuerDid=DID видавця
issuerDidHelp=Децентралізований ідентифікатор (DID) видавця облікових даних. Це ідентифікує, хто видає облікові дані, що перевіряються.
credentialLifetime=Час життя облікових даних (секунди)
credentialLifetimeHelp=Час життя облікових даних у секундах. Після цього часу облікові дані будуть прострочені та стануть недійсними.
bindingRequired=Потрібна криптографічна прив’язка
bindingRequiredHelp=Якщо увімкнено, ця конфігурація облікових даних вимагає криптографічної прив’язки власника та відповідних доказів. Якщо вимкнено, криптографічна прив’язка не вимагається, і пов’язані метадані будуть пропущені.
cryptographicBindingMethodsSupported=Методи криптографічної прив’язки
cryptographicBindingMethodsSupportedHelp=Список представлень криптографічного ключового матеріалу, до якого прив’язуватимуться облікові дані, розділених комами (наприклад: jwk). Якщо порожнє, методи криптографічної прив’язки не оголошуватимуться.
cryptographicBindingMethodsSupportedInvalid=Непідтримувані методи прив’язки: {{invalid}}. Дозволені значення: jwk
bindingSupportedProofTypes=Підтримувані типи доказів
bindingSupportedProofTypesHelp=Список типів доказів, що приймаються, коли увімкнено криптографічну прив’язку, розділених комами (наприклад: jwt). Якщо порожнє, типи доказів не оголошуватимуться, і докази не будуть примусовими.
bindingSupportedProofTypesInvalid=Непідтримувані типи доказів: {{invalid}}. Дозволені значення: jwt, attestation
supportedFormats=Підтримувані формати
supportedFormatsHelp=Формат облікових даних, що перевіряються. Наразі підтримувані формати: SD-JWT VC (dc+sd-jwt), JWT VC (jwt_vc).
credentialDisplay=Відображення облікових даних
credentialDisplayHelp=Масив JSON об’єктів, що містять метадані відображення для гаманців (назва, логотип, кольори тощо). Приклад: [{"name": "IdentityCredential", "locale": "en-US", "logo": {"uri": "https://example.com/logo.png", "alt_text": "Logo"}, "background_color": "#12107c", "text_color": "#FFFFFF"}]
credentialSigningAlgorithm=Алгоритм підпису облікових даних
credentialSigningAlgorithmHelp=Алгоритм підпису, що використовується для вибору активного ключа області для підпису облікових даних (наприклад, "ES256"). Якщо не указано, активний ключ буде вибрано за допомогою алгоритму області за замовчуванням. Цю опцію вимкнено, якщо вибрано конкретний ’Signing Key ID’.
hashAlgorithm=Алгоритм хешування
hashAlgorithmHelp=Алгоритм хешування, що використовується для облікових даних SD-JWT (наприклад, "SHA-256"). За замовчуванням "SHA-256", якщо не указано.
supportedCredentialTypes=Підтримувані типи облікових даних
supportedCredentialTypesHelp=Список типів облікових даних, розділених комами (наприклад, "VerifiableCredential,UniversityDegreeCredential"). Використовується у визначенні облікових даних для форматів JWT VC та SD-JWT. Якщо ця опція не налаштована, ім’я клієнтської області буде використовуватися як заява ’type’ відповідних облікових даних.
verifiableCredentialType=Тип облікових даних, що перевіряються (VCT)
verifiableCredentialTypeHelp=Ідентифікатор типу облікових даних для облікових даних формату SD-JWT. Це значення використовується в заяві vct виданих облікових даних. Обов’язково для формату SD-JWT.
tokenJwsType=Тип JWS токена
tokenJwsTypeHelp=Значення типу, що записується в заголовок typ JWT. Якщо порожнє, використовується значення за замовчуванням, специфічне для формату ("dc+sd-jwt" для SD-JWT VC та "vc+jwt" для JWT VC). Можна встановити користувацькі значення, якщо це потрібно гаманцю або системі.
tokenJwsTypeFormatWarning=Налаштований тип JWS токена не відповідає рекомендованому значенню для вибраного формату облікових даних. Рекомендоване значення: {{recommended}}.
visibleClaims=Видимі клейми
visibleClaimsHelp=Список клеймів, розділених комами, які завжди розкриваються в тілі SD-JWT (наприклад, "id,iat,nbf,exp,jti,given_name"). За замовчуванням "id,iat,nbf,exp,jti". Застосовується лише для формату SD-JWT.
signingKeyId=ID ключа підпису
signingKeyIdHelp=Необов’язково. ID ключа області, що використовується для підпису облікових даних. Якщо не указано, активний ключ підпису області з алгоритмом, вказаним у ’Credential Signing Algorithm’ (якщо встановлено), буде використано автоматично. Якщо тут вибрано конкретний ключ, опцію ’Credential Signing Algorithm’ буде вимкнено та автоматично встановлено алгоритм цього ключа.
useDefaultKey=Використовувати за замовчуванням (активний ключ підпису області)
useDefaultAlg=Використовувати алгоритм за замовчуванням
# Workflows
workflows=Робочі процеси
titleWorkflows=Робочі процеси
workflowsExplain=Робочі процеси дозволяють адміністраторам автоматизувати керування ресурсами Realm за допомогою політик на основі часу або подій.
createWorkflow=Створити робочий процес
workflowYAML=YAML робочого процесу
workflowYAMLHelp=YAML-представлення робочого процесу.
emptyWorkflows=Немає робочих процесів
emptyWorkflowsInstructions=У цій області немає робочих процесів. Будь ласка, створіть робочий процес, щоб почати.
emptyUserWorkflowsInstructions=Для цього користувача немає запланованих робочих процесів.
workflowCreated=Робочий процес створено.
workflowCreateError=Не вдалося створити робочий процес\: {{error}}
workflowDeleteConfirm=Видалити робочий процес?
workflowDeleteConfirmDialog=Ця дія назавжди видалить робочий процес. Це не можна скасувати.
workflowNameRequired=Назва робочого процесу обов’язкова.
workflowDeletedSuccess=Робочий процес видалено.
workflowDeleteError=Не вдалося видалити робочий процес\: {{error}}
updateWorkflow=Оновити робочий процес
copyWorkflow=Копіювати робочий процес
workflowDetails=Деталі робочого процесу
updateWorkflowDetails=Наразі робочі процеси не можна редагувати, окрім зміни назви та увімкнення/вимкнення. Ви можете скопіювати робочий процес і відредагувати копію.
copyWorkflowDetails=Ви збираєтеся створити новий робочий процес на основі наявного.
createWorkflowDetails=Створіть новий робочий процес, надавши його JSON-представлення.
workflowEnabled=Робочий процес увімкнено
workflowDisabled=Робочий процес вимкнено
workflowUpdated=Робочий процес успішно оновлено
workflowUpdateError=Не вдалося оновити робочий процес\: {{error}}
step=Крок
nextStep=Наступний крок
scheduledAfter=Заплановано після
pending=В очікуванні
completed=Завершено
whichWorkflowsWillAppear=Які робочі процеси з’являться у цьому списку?
whichWorkflowsWillAppearDetail=З’являться робочі процеси для цього користувача з принаймні одним кроком в очікуванні. Деякі повністю завершені робочі процеси також можуть з’явитися, якщо планувальник їх ще не очистив.
# OID4VCI Protocol Mapper UI
claimDisplayName=Відображуване ім’я клейму
claimDisplayLocale=Локаль клейму
claimDisplayNamePlaceholder=наприклад, Email Address
claimDisplayLocalePlaceholder=наприклад, en, de, fr
addClaimDisplay=Додати запис відображення клейму
removeClaimDisplay=Видалити запис відображення клейму
noClaimDisplayEntries=Немає записів відображення клеймів. Записи відображення надають зручні для користувачів назви клеймів для різних локалей у застосунках гаманців.
smtpConnectionTimeout=Таймаут з’єднання
smtpConnectionTimeoutHelp=Таймаут у мілісекундах для з’єднання з SMTP-сервером.
smtpSocketReadTimeout=Таймаут читання сокета
smtpSocketReadTimeoutHelp=Таймаут у мілісекундах для читання з SMTP-сервера.
smtpSocketWriteTimeout=Таймаут запису сокета
smtpSocketWriteTimeoutHelp=Таймаут у мілісекундах для запису на SMTP-сервер.
eventTypes.USER_SESSION_DELETED.name=Сесію користувача видалено
eventTypes.USER_SESSION_DELETED.description=Сесію користувача видалено
eventTypes.USER_SESSION_DELETED_ERROR.name=Помилка видалення сесії користувача
eventTypes.USER_SESSION_DELETED_ERROR.description=Помилка видалення сесії користувача
hideOnLoginWhenOrgNotResolved=Приховувати на сторінці входу, коли організацію не визначено
hideOnLoginWhenOrgNotResolvedHelp=Якщо увімкнено, провайдер ідентифікації буде прихований на сторінці входу, коли організацію неможливо визначити на основі домену email користувача. В іншому випадку провайдер ідентифікації буде показаний на сторінці входу незалежно від того, чи визначено організацію. Якщо також увімкнено ’Hide on login page’, провайдер ідентифікації завжди буде прихований на сторінці входу.
showOnLoginForUnlinkedMembers=Показувати на сторінці входу для непов’язаних учасників
showOnLoginForUnlinkedMembersHelp=Якщо увімкнено, цей провайдер ідентифікації показується учасникам організації, навіть якщо вони вже пов’язані з іншим провайдером ідентифікації.
theme.keycloak.v2.admin.description=Чистіший та сучасніший, v2 підтримує автоматичне перемикання між світлим/темним режимами. (За замовчуванням для адміністратора)

