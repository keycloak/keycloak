supportsClientAssertionReuse=Дозволити повторне використання client assertions
supportsClientAssertionReuseHelp=За замовчуванням client assertion не може використовуватися кілька разів. Якщо клієнт не може отримати нову client assertion для кожного запиту, цю опцію можна увімкнути, щоб дозволити повторне використання тієї самої client assertion.
allowClientIdAsAudience=Дозволяти Client ID як audience для assertions
allowClientIdAsAudienceHelp=Якщо увімкнено, Client ID, налаштований у провайдері ідентифікації, є єдиним дійсним audience для assertions, що використовуються у Federated client authentication і в JWT Authorization Grants (Client Assertions та JWT Authorization Grant). Client ID використовується замість token-url/issuer-url, визначених у відповідних специфікаціях. Зауважте, що ця поведінка не охоплюється жодним стандартом.
