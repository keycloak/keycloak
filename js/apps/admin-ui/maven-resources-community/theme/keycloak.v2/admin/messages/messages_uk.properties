  За замовчуванням некеровані атрибути «Вимкнено» і недоступні з жодного контексту, такого як реєстрація, обліковий запис чи адміністративна консоль. \
  При встановленні «Увімкнено» некеровані атрибути повністю розпізнаються сервером і доступні через усі контексти; це корисно, якщо ви починаєте міграцію наявного Realm на декларативний профіль користувача і ще не маєте всіх атрибутів користувача, визначених у конфігурації профілю. \
  При встановленні «Лише адміністратори можуть писати» некерованими атрибутами можна керувати лише через адміністративну консоль та API; це корисно, якщо у вас уже визначено користувацькі атрибути, якими можуть керувати користувачі, але ви не впевнені щодо додавання інших атрибутів, якими повинні керувати лише адміністратори. \
  При встановленні «Лише адміністратори можуть переглядати» некеровані атрибути доступні лише для читання та доступні лише через адміністративну консоль та API.
