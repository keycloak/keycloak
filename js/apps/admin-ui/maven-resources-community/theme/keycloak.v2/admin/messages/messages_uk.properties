caseSensitiveOriginalUsernameHelp=Якщо увімкнено, оригінальне ім’я користувача з провайдера ідентифікації зберігається без змін під час федерації користувачів. В іншому випадку ім’я користувача з провайдера ідентифікації переводиться в нижній регістр і може не збігатися з оригінальним значенням, якщо воно чутливе до регістру. Цей параметр впливає лише на ім’я користувача, пов’язане з федеративною ідентичністю, оскільки імена користувачів на сервері завжди в нижньому регістрі.
supportsClientAssertions=Підтримує client assertions
