referralHelp=Určuje, zda se mají doporučení LDAP dodržovat nebo ignorovat. Upozorňujeme, že povolení odkazů může zpomalit ověřování, protože umožňuje serveru LDAP rozhodnout, které další servery LDAP použít. To by mohlo potenciálně zahrnovat nedůvěryhodné servery.
authenticatorRefConfig.value.help=Přidejte vlastní referenční název pro ověřovatele. Když je tento autentizátor úspěšně dokončen během ověřovacího toku, mapovač protokolu AMR (Authentication Method Reference) použije tuto hodnotu k naplnění claimu `amr` vygenerovaných tokenů. Poznámka: Protokol AMR musí být nakonfigurován pro daného klienta, aby naplnil claim `amr`.
authenticatorRefConfig.value.label=Reference Authenticator
authenticatorRefConfig.maxAge.help=Maximální stáří v sekundách, pro které je dobrá referenční hodnota ověřovatele v relaci SSO. Když je použit mapovač protokolu AMR (Authentication Method Reference), AMR bude považováno za platné a vyplněné v tokenu pouze v případě, že bylo provedení ověřovače dokončeno v rámci stanoveného maximálního stáří.
authenticatorRefConfig.maxAge.label=Maximální stáří referenčního authenticatoru
loa-condition-level=Úroveň autentizace (LoA)
loa-condition-level.tooltip=Úroveň autentizace. Tato hodnota by měla být vždy celé číslo, které je větší nebo rovno 0. Dílčí toky v toku ověřování by měly být vždy seřazeny od nejnižších úrovní po vyšší úrovně.
loa-max-age=Maximální věk
loa-max-age.tooltip=Maximální věk v sekundách pro platnost této úrovně ověření. Pokud je požadována konkrétní úroveň a uživatel se již s touto úrovní autentizoval dříve, než zadaný počet sekund, nebude požádán o opětovné ověření. Pokud se však autentizoval později, než je zadaný počet sekund, bude se muset znovu ověřit s touto úrovní. Hodnota 0 v konfiguraci znamená, že uživatel se vždy musí znovu autentizovat s touto úrovní, kdykoli je tato úroveň požadována.
