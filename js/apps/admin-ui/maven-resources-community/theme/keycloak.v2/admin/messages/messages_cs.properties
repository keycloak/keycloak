periodicFullSyncHelp=Pokud je povoleno „Importovat uživatele“, spustí se pravidelná úloha synchronizace uživatelů z LDAP do Keycloak. Tento typ synchronizace načte všechny uživatele z LDAP při každém spuštění, importem nových uživatelů nebo aktualizací stávajících. Pokud máte v LDAP velký počet uživatelů, může to být neefektivní. V takovém případě můžete tuto možnost deaktivovat a místo toho použít „Pravidelně změněná synchronizace uživatelů“.
periodicChangedUsersSyncHelp=Pokud je povoleno „Importovat uživatele“, spustí se pravidelná úloha synchronizace uživatelů z LDAP do Keycloak na základě jejich vytvořených nebo naposledy aktualizovaných časových razítek. Tento typ synchronizace je efektivnější než úplná synchronizace, zvláště pokud máte v LDAP velký počet uživatelů. Vyžaduje však, aby váš server LDAP podporoval vyhledávání pomocí atributů 'createTimestamp' a 'modifyTimestamp' v predikátech dotazu.
signatureAlgorithmHelp=Algoritmus podpisu, který se má použít k podepisování dokumentů. Upozorňujeme, že algoritmy založené na „SHA1“ jsou zastaralé a mohou být v budoucnu odstraněny. Doporučuje se držet se nějakého bezpečnějšího algoritmu místo '*_SHA1'.
