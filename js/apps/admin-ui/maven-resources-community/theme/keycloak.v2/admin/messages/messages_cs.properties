policyDecisionStagey=Strategie rozhodování určuje, jak se vyhodnocují zásady spojené s daným oprávněním a jak se získá konečné rozhodnutí. „Affirmative“ znamená, že alespoň jedna zásada musí být vyhodnocena kladně, aby konečné rozhodnutí bylo také kladné. „Unanimous“ znamená, že všechny zásady musí být vyhodnoceny kladně, aby konečné rozhodnutí bylo také kladné. „Consensus“ znamená, že počet kladných rozhodnutí musí být větší než počet záporných rozhodnutí. Pokud je počet kladných a záporných rozhodnutí stejný, bude konečné rozhodnutí záporné.
