clientAssertionSigningAlgHelp=Podpisový algoritmus pro vytvoření výrazu JWT jako ověření klienta. V případě JWT podepsaného soukromým klíčem nebo JWT podepsaného tajným klíčem klienta je vyžadováno. Pokud není zadán žádný algoritmus, je upraven následující algoritmus. RS256 je přizpůsoben v případě JWT podepsaného soukromým klíčem. HS256 je přizpůsoben v případě JWT podepsaného klientským tajemstvím.
