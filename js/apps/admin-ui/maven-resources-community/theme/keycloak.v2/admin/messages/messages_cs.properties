addExecutionHelp=Provedení může mít širokou škálu akcí, od odeslání resetovacího e-mailu až po ověření jednorázového hesla.
requestObjectRequiredHelp=Určuje, zda klient potřebuje poskytnout objekt požadavku se svými požadavky naautorizaci a jakou metodu k tomu může použít. Pokud je nastaveno na"nevyžadováno", poskytnutí objektu požadavku je volitelné. Ve všech ostatníchpřípadech je poskytnutí objektu požadavku povinné. Pokud je nastaveno na"požadavek", objekt požadavku musí být poskytnut hodnotou. Pokud je nastavenona "request_uri", musí být objekt požadavku poskytnut jako odkaz. Pokud jenastaveno na "request or request_uri", lze použít kteroukoli metodu.
clientScopesRolesScope=Pokud není definováno žádné mapování rozsahu role, každý uživatel může používat tento rozsah klienta. Pokud jsou definována mapování rozsahu rolí, uživatel musí být členem alespoň jedné z rolí.
