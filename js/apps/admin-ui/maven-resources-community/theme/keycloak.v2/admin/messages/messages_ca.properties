requireRequestEncryption=Requereix xifratge de la sol·licitud
requireRequestEncryptionHelp=Si s’habilita, es requereix xifratge per a les sol·licituds de credencials a més de TLS. Les carteres han de xifrar les sol·licituds utilitzant les metadades de xifratge de sol·licituds admeses.
requireResponseEncryption=Requereix xifratge de la resposta
requireResponseEncryptionHelp=Si s’habilita, es requereix xifratge per a les respostes de credencials a més de TLS. Les carteres han de proporcionar claus de xifratge a la sol·licitud de credencial.
enableDeflateCompression=Habilita la compressió DEF
enableDeflateCompressionHelp=Si s’habilita, l’algorisme de compressió DEF és compatible amb les sol·licituds de credencials. Això permet als clients comprimir les seves sol·licituds per reduir la mida de la càrrega.
batchIssuanceSize=Mida d’emissió per lots
batchIssuanceSizeHelp=El nombre màxim de credencials que es poden emetre en una única sol·licitud per lots. Això ajuda a gestionar la càrrega del servidor i els temps de resposta.
timeClaimCorrelationMitigation=Mitigació de correlació de reclamacions temporals
timeClaimsStrategy=Estratègia per aplicar a les reclamacions temporals
timeClaimsStrategyHelp=Estratègia per aplicar a les reclamacions temporals. Valors admesos: off, randomize, round.
randomizeWindow=Finestra d’aleatorització
randomizeWindowHelp=Quan l’estratègia és «randomize», resta un nombre aleatori de segons entre 0 i el valor d’aquest atribut de la marca de temps original per mitigar els atacs de correlació.
roundUnit=Unitat d’arrodoniment
roundUnitHelp=Quan l’estratègia és «round», trunca les marques de temps a la frontera de la unitat seleccionada (UTC). Valors admesos: SECOND, MINUTE, HOUR, DAY.
randomize=Aleatoritza
round=Arrodoneix
second=Segon
day=Dia
credentialConfigurationId=ID de configuració de credencial
credentialConfigurationIdHelp=L’identificador únic per a aquesta configuració de credencial. Aquest ID s’utilitza a les metadades de l’emissor de credencials i a les sol·licituds de credencials.
credentialIdentifier=Identificador de credencial
credentialIdentifierHelp=Un identificador específic per a aquest tipus de credencial. Això es pot fer servir per distingir entre variants diferents del mateix tipus de credencial.
credentialOfferRequired=Oferta de credencial requerida
credentialOfferRequiredHelp=L’emissor requereix una oferta de credencial per a aquesta configuració de credencial.
issuerDid=DID de l’emissor
issuerDidHelp=L’identificador descentralitzat (DID) de l’emissor de credencials. Això identifica qui emet les credencials verificables.
credentialLifetime=Durada de la credencial (segons)
credentialLifetimeHelp=La durada de la credencial en segons. Passat aquest temps, la credencial expirarà i deixarà de ser vàlida.
bindingRequired=Vinculació criptogràfica requerida
bindingRequiredHelp=Si s’habilita, aquesta configuració de credencial requereix vinculació criptogràfica del titular i les proves corresponents. Si s’inhabilita, no es requereix cap vinculació criptogràfica i les metadades relacionades s’ometran.
cryptographicBindingMethodsSupported=Mètodes de vinculació criptogràfica
cryptographicBindingMethodsSupportedHelp=Llista separada per comes de representacions del material de clau criptogràfica al qual s’enllaçarà la credencial (per exemple: jwk). Si està buida, no s’anunciarà cap mètode de vinculació criptogràfica.
cryptographicBindingMethodsSupportedInvalid=Mètode(s) de vinculació no admès(os): {{invalid}}. Valors permesos: jwk
bindingSupportedProofTypes=Tipus de proves admesos
bindingSupportedProofTypesHelp=Llista separada per comes de tipus de proves acceptats quan la vinculació criptogràfica està habilitada (per exemple: jwt). Si està buida, no s’anunciarà cap tipus de prova i no s’exigiran proves.
bindingSupportedProofTypesInvalid=Tipus de prova no admès(os): {{invalid}}. Valors permesos: jwt, attestation
supportedFormats=Formats admesos
supportedFormatsHelp=El format de la credencial verificable. Formats admesos actualment: SD-JWT VC (dc+sd-jwt), JWT VC (jwt_vc).
credentialDisplay=Visualització de la credencial
credentialDisplayHelp=Array JSON d’objectes que contenen metadades de visualització per a les carteres (nom, logotip, colors, etc.). Exemple: [{"name": "IdentityCredential", "locale": "en-US", "logo": {"uri": "https://example.com/logo.png", "alt_text": "Logo"}, "background_color": "#12107c", "text_color": "#FFFFFF"}]
credentialSigningAlgorithm=Algorisme de signatura de la credencial
credentialSigningAlgorithmHelp=Algorisme de signatura utilitzat per seleccionar la clau activa del domini per signar les credencials (per exemple, «ES256»). Si no s’especifica, la clau activa es seleccionarà utilitzant l’algorisme per defecte del domini. Aquesta opció està inhabilitada si s’ha seleccionat un «ID de clau de signatura» específic.
hashAlgorithm=Algorisme de resum
hashAlgorithmHelp=Algorisme de resum utilitzat per a les credencials SD-JWT (per exemple, «SHA-256»). El valor per defecte és «SHA-256» si no s’especifica.
supportedCredentialTypes=Tipus de credencials admesos
supportedCredentialTypesHelp=Llista separada per comes de tipus de credencials (per exemple, «VerifiableCredential,UniversityDegreeCredential»). S’utilitza a la definició de credencial per als formats JWT VC i SD-JWT. Quan aquesta opció no està configurada, el nom de l’abast de client s’utilitzarà com a reclamació «type» de la credencial corresponent.
verifiableCredentialType=Tipus de credencial verificable (VCT)
verifiableCredentialTypeHelp=L’identificador del tipus de credencial per a credencials en format SD-JWT. Aquest valor s’utilitza a la reclamació vct de la credencial emesa. Requerit per al format SD-JWT.
tokenJwsType=Tipus JWS del testimoni
tokenJwsTypeHelp=El valor de tipus escrit a la capçalera typ del JWT. Si està buit, s’utilitza un valor per defecte específic del format («dc+sd-jwt» per a SD-JWT VC i «vc+jwt» per a JWT VC). Es pot establir a valors personalitzats si ho requereix la cartera o el sistema.
