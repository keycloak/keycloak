referralHelp=Especifica si s’han de seguir o ignorar les referències LDAP. Tingueu en compte que habilitar les referències pot alentir l’autenticació, ja que permet que el servidor LDAP decideixi quins altres servidors LDAP fer servir. Això podria incloure servidors de confiança dubtosa.
authenticatorRefConfig.value.help=Afegiu un nom de referència personalitzat per a l’autenticador. Quan aquest autenticador es completi correctament durant un flux d’autenticació, l’assignador de protocol de referència del mètode d’autenticació (AMR) farà servir aquest valor per emplenar la reclamació amr dels testimonis generats. Tingueu en compte que el protocol AMR s’ha de configurar per al client donat per emplenar la reclamació AMR.
authenticatorRefConfig.value.label=Referència de l’autenticador
authenticatorRefConfig.maxAge.help=L’edat màxima en segons durant la qual el valor de referència de l’autenticador és vàlid en una sessió SSO. Quan es fa servir l’assignador de protocol de referència del mètode d’autenticació (AMR), l’AMR només es considerarà vàlid i s’inclourà al testimoni si l’execució de l’autenticador s’ha completat dins de l’edat màxima especificada.
authenticatorRefConfig.maxAge.label=Edat màxima de la referència de l’autenticador
loa-condition-level=Nivell d’autenticació (LoA)
loa-condition-level.tooltip=Nivell d’autenticació. Aquest valor ha de ser sempre un enter major o igual a 0. Els subfluxos del flux d’autenticació s’han d’ordenar sempre dels nivells més baixos als més alts.
loa-max-age=Edat màxima
loa-max-age.tooltip=Edat màxima en segons durant la qual aquest nivell d’autenticació és vàlid. Si es sol·licita el nivell concret i l’usuari ja s’ha autenticat amb aquest nivell fa menys dels segons especificats, no se li demanarà que es torni a autenticar. Però si s’ha autenticat fa més dels segons especificats, caldrà que es torni a autenticar amb aquest nivell. El valor 0 a la configuració significa que sempre se li demanarà a l’usuari que es torni a autenticar amb aquest nivell quan es sol·liciti.
includeInLightweight.label=Afegeix al testimoni d’accés lleuger
includeInLightweight.tooltip=S’ha d’afegir la reclamació al testimoni d’accés lleuger?
lightweightAccessToken=Fes servir sempre el testimoni d’accés lleuger
lightweightAccessTokenHelp=Si està activat, sempre es fan servir testimonis d’accés lleugers. Si està desactivat, no es fan servir per defecte, però encara és possible habilitar-los amb un executor de política de client.
supportJwtClaimInIntrospectionResponse=Admet la reclamació JWT a la resposta d’introspecció
supportJwtClaimInIntrospectionResponseHelp=Si està activat, les sol·licituds d’introspecció que fan servir la capçalera «Accept: application/jwt» també contindran una reclamació anomenada «jwt» amb les reclamacions del resultat de la introspecció codificades com a testimoni d’accés JWT.
allowTokenIntrospectionWithoutAudienceCheck=Permet la introspecció de testimonis sense comprovació d’audiència
allowTokenIntrospectionWithoutAudienceCheckHelp=Permet que aquest client faci la introspecció de testimonis sense validació d’audiència. Aquesta opció és obsoleta i s’eliminarà en una versió futura. Habiliteu-la només per compatibilitat amb versions anteriors durant la migració.
allowUserinfoWithLightweightAccessToken=Permet la informació d’usuari amb testimoni d’accés lleuger
allowUserinfoWithLightweightAccessTokenHelp=Permet que els testimonis d’accés lleugers emesos per aquest client es facin servir amb el punt final d’informació d’usuari. Els testimonis lleugers estan dissenyats per a la introspecció de testimonis. Aquesta opció és obsoleta i s’eliminarà en una versió futura. Habiliteu-la només per compatibilitat amb versions anteriors durant la migració.
ssf=SSF
ssfTransmitterEnabled=Transmissor SSF
ssfTransmitterEnabledHelp=Si està habilitat, aquest domini actua com a transmissor del marc de senyals compartides (SSF) i exposa el punt final de metadades de configuració SSF. Si es deshabilita per a un domini amb flux actius, els esdeveniments en cua per als receptors d’aquests fluxos s’eliminaran en desar; poseu en pausa o suprimiu els fluxos primer si voleu que els receptors rebin una notificació SET d’actualització de flux abans que s’aturi la transmissió.
ssfTransmitterDisableConfirmTitle=Deshabiliteu el transmissor SSF per a aquest domini?
ssfTransmitterDisableConfirmIntro=Deshabilitar la funcionalitat de transmissor SSF per a aquest domini té els efectes següents:
ssfTransmitterDisableConfirmBulletEndpoints=Tots els punts finals del transmissor SSF (metadades, fluxos, subjectes, estat, SSE) retornaran 404 als receptors.
ssfTransmitterDisableConfirmBulletEvents=No es registraran nous esdeveniments d’usuari ni d’administrador per als receptors SSF d’aquest domini.
ssfTransmitterDisableConfirmBulletDelivery=Tots els esdeveniments en cua per als receptors d’aquest domini (PENDING i HELD) s’eliminaran en desar. No es podran recuperar.
ssfTransmitterDisableConfirmBulletReceivers=No s’avisa els receptors que els fluxos han deixat de funcionar. Simplement deixen de veure esdeveniments.
ssfTransmitterDisableConfirmRecommendation=Recomanació: poseu en pausa o suprimiu els fluxos SSF actius d’aquest domini abans de desar perquè els receptors rebin una notificació adequada d’actualització de flux abans que s’aturi el lliurament.
ssfTransmitterDisableConfirmContinue=Deshabilita el transmissor
