generatedAccessTokenHelp=Vegeu l’exemple de testimoni d’accés que es generarà i s’enviarà al client quan l’usuari seleccionat s’autentiqui. Podeu veure les reclamacions i els rols que contindrà el testimoni en funció dels assignadors de protocol efectius, les assignacions d’abast de rol i també les reclamacions i els rols assignats a l’usuari real.
webAuthnPolicyAcceptableAaguidsHelp=La llista d’AAGUID permesos amb els quals es pot registrar un autenticador. Un AAGUID és un identificador de 128 bits que indica el tipus d’autenticador (per exemple, marca i model). Aquesta opció requereix que la preferència de confirmació d’attestació estigui configurada (normalment «Directa») per garantir que es passi un AAGUID de confiança. L’attestació predeterminada «Cap» no és fiable i pot anonimitzar l’AAGUID amb el valor zero.
