unmanagedAttributesHelpText=Els atributs no gestionats són atributs d’usuari que no estan definits explícitament en la configuració del perfil d’usuari. Per defecte, els atributs no gestionats estan «Desactivats» i no es troben disponibles des de cap context, com ara el registre, el compte i la consola d’administració. Si ho definiu com a «Activat», el servidor reconeix completament els atributs no gestionats i seran accessibles a través de tots els contextos, el que pot resultar útil si comenceu a migrar un domini existent al perfil d’usuari declaratiu i encara no teniu tots els atributs d’usuari definits en la configuració del perfil d’usuari. Si ho definiu com a «Només els administradors poden escriure», els atributs no gestionats només es poden gestionar a través de la consola d’administració i l’API, el que pot resultar útil si ja heu definit algun atribut personalitzat que els usuaris puguin gestionar, però no esteu segur d’afegir altres atributs que només els administradors haurien de gestionar. Si ho definiu com a «Només els administradors ho poden veure», els atributs no gestionats són de només lectura i només estan disponibles a través de la consola d’administració i l’API.
