permissionDecisionStrategyHelp=L’estratègia de decisió dicta com s’avaluen les polítiques associades a un permís donat i com s’obté una decisió final. «Afirmatiu» significa que almenys una política ha d’avaluar-se positivament perquè la decisió final també sigui positiva. «Unànime» significa que totes les polítiques han d’avaluar-se positivament perquè la decisió final també sigui positiva. «Consens» significa que el nombre de decisions positives ha de ser superior al de decisions negatives. Si el nombre de decisions positives i negatives és el mateix, la decisió final serà negativa.
