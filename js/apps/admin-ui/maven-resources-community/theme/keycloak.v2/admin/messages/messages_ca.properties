periodicFullSyncHelp=Si «Importa usuaris» està habilitat, s’inicia una tasca periòdica per sincronitzar els usuaris de LDAP a Keycloak. Aquest tipus de sincronització obté tots els usuaris de LDAP en cada execució, important els nous usuaris o actualitzant els existents. Si teniu un gran nombre d’usuaris a LDAP, això pot ser ineficient. En aquest cas, podeu inhabilitar aquesta opció i fer servir «Sincronització periòdica d’usuaris modificats» en comptes d’aquesta.
periodicChangedUsersSyncHelp=Si «Importa usuaris» està habilitat, s’inicia una tasca periòdica per sincronitzar els usuaris de LDAP a Keycloak basant-se en les marques de temps de creació o última actualització. Aquest tipus de sincronització és més eficient que una sincronització completa, especialment si teniu un gran nombre d’usuaris a LDAP. Tanmateix, requereix que el servidor LDAP admeti la cerca amb els atributs «createTimestamp» i «modifyTimestamp» als predicats de consulta.
