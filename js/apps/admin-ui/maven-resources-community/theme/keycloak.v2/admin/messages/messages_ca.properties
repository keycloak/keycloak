supportsClientAssertionReuseHelp=Per defecte, una aserció de client no es pot utilitzar diverses vegades. Si el client no pot obtenir una nova aserció de client per a cada sol·licitud, podeu habilitar aquesta opció per permetre la reutilització de la mateixa aserció de client.
