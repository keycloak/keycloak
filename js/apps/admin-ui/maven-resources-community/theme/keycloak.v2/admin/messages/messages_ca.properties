ssfLookupTitle=Cerca un esdeveniment
ssfLookupTitleHelp=Inspeccioneu l’estat de lliurament d’un testimoni d’esdeveniments de seguretat específic pel seu jti. Limitat a aquest receptor.
ssfEmitTitle=Emet un esdeveniment sintètic
ssfEmitTitleHelp=Envieu un esdeveniment sintètic a aquest receptor. El transmissor formata el sub_id segons el format de subjecte d’usuari configurat del receptor i aplica els mateixos filtres de subscripció que els esdeveniments natius.
ssfEmitEventType=Tipus d’esdeveniment
ssfEmitEventTypeHelp=Un dels tipus d’esdeveniments que el transmissor d’aquest receptor pot emetre. La càrrega útil de sota es deserialitza contra la classe d’esdeveniments registrada per al tipus seleccionat.
ssfEmitEventTypeSelectPrompt=-- seleccioneu un tipus d’esdeveniment --
ssfEmitEventTypeRequired=Seleccioneu un tipus d’esdeveniment per emetre.
ssfEmitSubjectValueHelp=Es resol en un usuari de Keycloak (id-usuari / correu-electrònic-usuari / nom-usuari) o organització (àlies-org). Per als subjectes d’usuari, el transmissor construeix el sub_id fent servir el format de subjecte d’usuari configurat del receptor, de manera que el SET emès coincideixi amb la forma d’un esdeveniment natiu per a aquest receptor; els subjectes d’organització emeten un subjecte complex de només inquilí. Els filtres de subscripció de subjectes i les regles de fallada per format específic (sense correu electrònic, sense organització per a +tenant) continuen aplicant-se.
ssfEmitSubjectValueRequired=Cal un valor de subjecte.
ssfEmitPayload=Càrrega útil de l’esdeveniment (JSON)
ssfEmitPayloadHelp=Cos específic de l’esdeveniment: s’ha de deserialitzar contra la classe del tipus d’esdeveniment seleccionat. Deixeu-lo buit per emetre una càrrega útil buida (només té sentit per als tipus d’esdeveniments sense camps obligatoris). Marcadors de posició admesos (expandits abans de l’anàlisi JSON): __now__ es resol en el temps Unix actual en segons. Es pot fer servir sense cometes per a camps numèrics, p. ex. "event_timestamp": __now__.
ssfEmitPayloadInvalidJson=La càrrega útil no és un JSON vàlid: {{error}}
ssfEmitEvent=Emet l’esdeveniment
ssfEmitResult=Emès — estat={{status}}, jti={{jti}}
ssfEmitResultLookupLink=Cerca aquest esdeveniment a la cerca d’esdeveniments
ssfEmitErrorSubjectNotFound=Subjecte no trobat: {{type}} = {{value}}
ssfEmitErrorInvalidRequest=Sol·licitud no vàlida: {{detail}}
ssfEmitErrorNoDeliveryConfig=El flux no té cap mètode de lliurament configurat, de manera que l’esdeveniment no es pot lliurar. Configureu primer el lliurament per enviament o per consulta per al flux.
ssfEmitErrorUnknown=L’emissió ha fallat: {{detail}}
ssfReceiverHelp=Política del costat del transmissor aplicada quan Keycloak lliura testimonis d’esdeveniments de seguretat a aquest receptor.
ssfSectionGeneral=General
ssfSectionGeneralHelp=Identitat, visualització i comportament del flux per a aquest receptor SSF: perfil i descripció, l’audiència objectiu, per a quins subjectes es fan els lliuraments, el format d’identificador de subjecte, la política de verificació i la finestra de gràcia aplicada quan els receptors eliminen subjectes. S’aplica sempre que es registra o s’actualitza un flux per a aquest client.
ssfSectionAuthentication=Autenticació
ssfSectionAuthenticationHelp=Regles d’accés que controlen qui pot gestionar el flux SSF d’aquest receptor i invocar el punt final d’emissió d’esdeveniments sintètics.
ssfSectionDelivery=Lliurament
ssfSectionDeliveryHelp=Quins mètodes de lliurament pot fer servir aquest receptor i, quan es permet el lliurament per enviament, els prefixos d’URL als quals el transmissor té permís per enviar testimonis d’esdeveniments de seguretat.
ssfSectionEvents=Esdeveniments
ssfSectionEventsHelp=Quins tipus d’esdeveniments anuncia i lliura aquest receptor, les restriccions d’edat i inactivitat que delimiten la safata de sortida, i si els administradors poden emetre esdeveniments sintètics per a la depuració o la integració de fluxos de treball.
ssfAllowedDeliveryMethods=Mètodes de lliurament permesos
ssfAllowedDeliveryMethodsHelp=Quins mètodes de lliurament pot seleccionar aquest receptor en registrar un flux. Cal habilitar almenys un mètode. El receptor tria un dels mètodes permesos en el moment de crear el flux; restringir aquesta llista a només consulta prohibeix completament que el transmissor faci crides HTTP sortints a aquest receptor.
ssfAllowedDeliveryMethods.push=Lliurament per enviament
ssfAllowedDeliveryMethods.pushHelp=El transmissor envia mitjançant POST els testimonis d’esdeveniments de seguretat a un URL proporcionat pel receptor (RFC 8935). Requereix que s’hagin configurat URL d’enviament vàlids a continuació.
ssfAllowedDeliveryMethods.poll=Lliurament per consulta
ssfAllowedDeliveryMethods.pollHelp=El receptor extreu els testimonis d’esdeveniments de seguretat en cua d’un punt final de consulta del transmissor (RFC 8936). L’URL del punt final el genera Keycloak; no cal cap llista d’autoritzacions per receptor.
ssfValidPushUrls=URL d’enviament vàlids
ssfValidPushUrlsHelp=Llista d’autoritzacions de patrons d’URL que el receptor pot registrar com a punt final d’enviament. Cada entrada es compara amb l’URL proporcionat pel receptor mitjançant una coincidència exacta o un comodí de sufix de terminació amb * (p. ex., https://receiver/push/* permet qualsevol inquilí i identificador de flux sota aquest camí). Un URL fora de la llista d’autoritzacions es rebutja amb HTTP 400, que és la defensa SSRF del receptor. El * nu no s’accepta.
ssfValidPushUrls.add=Afegeix un URL d’enviament vàlid
ssfReceiverEnabled=Receptor SSF
ssfReceiverEnabledHelp=Si està habilitat, aquest client actua com a receptor del marc de senyals compartides (SSF). Keycloak transmitirà esdeveniments de seguretat a aquest client d’acord amb el flux SSF configurat.
ssfStream=Flux SSF
ssfStreamHelp=El flux registrat per a aquest receptor i la seva configuració de lliurament d’esdeveniments.
ssfStreamNotRegistered=Encara no s’ha registrat cap flux SSF
ssfStreamNotRegisteredHelp=Aquest client receptor encara no ha registrat cap flux SSF amb el transmissor. Podeu crear-ne un en nom seu a continuació, o el receptor el pot crear ell mateix a través de l’API del transmissor SSF.
ssfCreateStream=Crea el flux
ssfCreateStreamReset=Esborra
ssfCreateStreamSuccess=El flux SSF s’ha creat correctament.
ssfCreateStreamError=No s’ha pogut crear el flux SSF: {{error}}
ssfCreateStreamDeliveryMethod=Mètode de lliurament
ssfCreateStreamDeliveryMethodHelp=El mètode de lliurament SSF per fer servir per a aquest flux. L’enviament (RFC 8935) envia SETs signats a un punt final allotjat pel receptor; la consulta (RFC 8936) allotja el punt final al transmissor i el receptor extreu els SETs segons el seu propi calendari. L’enviament requereix que el receptor proporcioni la seva pròpia URL de punt final; la consulta fa servir una URL generada pel transmissor que es retorna a la resposta de creació.
ssfCreateStreamEndpointUrl=URL del punt final d’enviament
ssfCreateStreamEndpointUrlHelp=URL HTTPS del costat del receptor al qual el transmissor enviarà testimonis d’esdeveniments de seguretat mitjançant POST.
ssfCreateStreamEndpointUrlRequired=Cal una URL de punt final d’enviament.
ssfCreateStreamEndpointUrlInvalid=La URL del punt final d’enviament ha de ser una URL absoluta http o https.
ssfCreateStreamEventsRequested=Esdeveniments sol·licitats
ssfCreateStreamEventsRequestedHelp=Els tipus d’esdeveniments SSF als quals s’ha de subscriure el receptor. Trieu dels esdeveniments que el transmissor està configurat per emetre; deixeu-ho buit per fer servir el conjunt predeterminat admès pel transmissor.
ssfCreateStreamDescription=Descripció
ssfCreateStreamDescriptionHelp=Etiqueta opcional llegible per humans per al flux, visible en aquesta interfície d’administració per als operadors.
ssfStreamAudienceCurrentHelp=L’audiència configurada actualment al flux SSF registrat. Actualitzar el camp d’audiència del flux a la secció del receptor SSF només afecta els fluxos que el receptor registri després del canvi.
ssfStreamPushEndpointUrl=URL del punt final d’enviament
ssfStreamPushEndpointUrlHelp=URL HTTPS del costat del receptor al qual el transmissor envia testimonis d’esdeveniments de seguretat mitjançant POST. Només es mostra per als fluxos que fan servir el mètode de lliurament HTTP per enviament.
ssfStreamPollEndpointUrl=URL del punt final de consulta
ssfStreamPollEndpointUrlHelp=URL allotjada pel transmissor a la qual el receptor envia POST per extreure testimonis d’esdeveniments de seguretat pendents (RFC 8936). El receptor s’autentica amb el seu propi testimoni de portador; no es configura cap capçalera d’autorització del costat del transmissor.
ssfStreamPushAuthHeader=Capçalera d’autorització d’enviament
ssfStreamPushAuthHeaderHelp=Valor enviat a la capçalera de sol·licitud d’autorització en cada enviament (per exemple, un testimoni de portador) tal com és.
ssfDeleteStream=Suprimeix el flux
ssfDeleteStreamConfirmTitle=Suprimiu el flux SSF?
ssfDeleteStreamConfirmMessage=El flux SSF registrat per a aquest client se suprimirà i el receptor l’haurà de tornar a crear. Aquesta acció no es pot desfer. Voleu continuar?
ssfDeleteStreamSuccess=El flux SSF s’ha suprimit correctament.
ssfSubjects=Subjectes SSF
ssfSubjectsHelp=Gestioneu sobre quins usuaris o organitzacions rep esdeveniments aquest receptor. Feu servir «Comprova» per veure si un subjecte està inclòs actualment.
ssfSubjectType=Tipus de subjecte
ssfSubjectTypeHelp=Com s’interpreta el valor de sota en cercar el subjecte. Les opcions d’usuari resolen un usuari de Keycloak per correu electrònic, identificador o nom d’usuari; l’organització (per àlies) resol una organització de Keycloak. La preferència de notificació s’emmagatzema com a atribut ssf.notify.${clientId} a l’entitat resolta.
ssfSubjectType.userEmail=Usuari (per correu electrònic)
ssfSubjectType.userId=Usuari (per identificador)
ssfSubjectType.userUsername=Usuari (per nom d’usuari)
ssfSubjectType.orgAlias=Organització (per àlies)
ssfSubjectValue=Valor del subjecte
ssfSubjectAdd=Afegeix el subjecte
ssfSubjectRemove=Elimina el subjecte
ssfSubjectCheck=Comprova
ssfSubjectStatusLabel=Estat del subjecte
ssfSubjectValueRequired=Introduïu un valor de subjecte.
ssfSubjectNotFound=Subjecte no trobat. Verifiqueu el valor i el tipus de subjecte.
ssfSubjectIsNotified=Els esdeveniments per a aquest subjecte es lliuren a aquest flux.
ssfSubjectIsNotifiedViaOrg=El subjecte s’inclou a través d’una pertinença a una organització per a aquest flux.
ssfSubjectIsNotifiedViaOrgNamed=El subjecte s’inclou a través de la pertinença a l’organització «{{org}}» per a aquest flux.
ssfSubjectIsImplicitlyIncluded=El subjecte s’inclou implícitament en el lliurament d’esdeveniments per a aquest flux (default_subjects=ALL i sense exclusió explícita).
ssfSubjectIsNotNotified=El subjecte no s’inclou en el lliurament d’esdeveniments per a aquest flux.
ssfSubjectAdded=El subjecte s’ha afegit a aquest flux.
ssfSubjectIgnore=Ignora el subjecte
ssfSubjectIgnored=El subjecte s’ha ignorat per a aquest flux.
ssfSubjectIsIgnored=El subjecte s’exclou explícitament del lliurament d’esdeveniments per a aquest flux.
ssfSubjectIsIgnoredViaOrg=El subjecte s’exclou a través d’una pertinença a una organització per a aquest flux.
ssfSubjectIsIgnoredViaOrgNamed=El subjecte s’exclou a través de la pertinença a l’organització «{{org}}» per a aquest flux.
ssfSubjectRemoved=El subjecte s’ha eliminat d’aquest flux.
ssfSubjectActionError=No s’ha pogut actualitzar la preferència de notificació del subjecte: {{error}}
ssfDeleteStreamError=No s’ha pogut suprimir el flux SSF: {{error}}
ssfVerifyStream=Verifica
ssfVerifyStreamSuccess=S’ha enviat l’esdeveniment de verificació al receptor.
ssfVerifyStreamError=No s’ha pogut enviar l’esdeveniment de verificació: {{error}}
ssfProfile=Perfil
ssfProfileHelp=El perfil del marc de senyals compartides (SSF) que es fa servir per a transmetre esdeveniments a aquest receptor.
ssfProfile.SSF_1_0=SSF 1.0
ssfProfile.SSE_CAEP=SSE CAEP 1.0
ssfCreateStreamProfileHelp=El perfil SSF aplicat als esdeveniments enviats per aquest flux. El perfil és una configuració per receptor, de manera que canviar-lo aquí també actualitza l’atribut de perfil dels clients receptors abans de crear el flux.
ssfUserSubjectFormat=Format del subjecte
ssfUserSubjectFormatHelp=Format d’identificador de subjecte que el transmissor utilitza per a la part d’usuari dels testimonis d’esdeveniments de seguretat SSF. Per defecte és iss_sub (emissor del domini + ID d’usuari). Seleccioneu correu electrònic per emetre l’adreça de correu electrònic de l’usuari. Les variants +tenant embolcallen el subjecte d’usuari en un subjecte complex i afegeixen un germà tenant que porta l’àlies d’organització Keycloak de l’usuari; feu servir això quan el receptor esperi enrutament multitenant. Els esdeveniments s’abandonen (amb una entrada de registre clara) quan el format seleccionat no es pot produir (per exemple, s’ha seleccionat correu electrònic però l’usuari no en té, o s’ha seleccionat +tenant però l’usuari no pertany a cap organització).
ssfUserSubjectFormat.iss_sub=iss_sub (emissor i subjecte)
ssfUserSubjectFormat.email=correu electrònic
ssfUserSubjectFormat.complex.iss_sub+tenant=complex(iss_sub + organització tenant)
ssfUserSubjectFormat.complex.email+tenant=complex(correu electrònic + organització tenant)
ssfDefaultSubjects=Subjectes per defecte
ssfDefaultSubjectsHelp=Controla si el transmissor lliura esdeveniments per a tots els usuaris del domini (ALL) o només per als usuaris afegits explícitament mitjançant el punt final d’afegir subjecte o la pestanya Subjectes (NONE). Els receptors poden substituir aquesta configuració per flux en el moment de la creació.
ssfDefaultSubjects.ALL=ALL (lliura esdeveniments per a tots els subjectes)
ssfDefaultSubjects.NONE=NONE (lliura només per als subjectes afegits)
ssfAutoNotifyOnLogin=Afegeix subjecte en iniciar sessió
ssfAutoNotifyOnLoginHelp=Quan està habilitat i els subjectes per defecte estan configurats com a NONE, els usuaris que inicien sessió mitjançant aquest client s’afegeixen automàticament al conjunt de subjectes sobre els quals el receptor rep esdeveniments; equivalent a fer clic a Afegeix per a ells a la pestanya Subjectes. Útil per a escenaris federats on només els usuaris que s’autentiquen mitjançant aquest client haurien d’estar inclosos en el lliurament d’esdeveniments.
ssfRequireServiceAccount=Requereix compte de servei
ssfRequireServiceAccountHelp=Quan està habilitat, només el compte de servei propi del client pot accedir a l’API del transmissor SSF. Aquest és el comportament per defecte quan no s’ha establert explícitament. Inhabiliteu-ho per a clients que utilitzen el flux de codi d’autorització on un usuari real s’autentica i el backend receptor utilitza el testimoni resultant per gestionar el seu flux SSF.
ssfRequiredRole=Rol requerit
ssfRequiredRoleHelp=Quan s’estableix, l’usuari autenticat ha de tenir aquest rol (rol de domini o rol de client en aquest client) per a accedir a l’API del transmissor SSF. Es comprova a més del requisit de compte de servei (si està habilitat) i el requisit d’abast. Deixeu-ho buit per a ometre la comprovació de rol.
ssfAllowEmitEvents=Emissió d’esdeveniments habilitada
ssfAllowEmitEventsHelp=Quan està habilitat, un compte de servei que té el rol configurat a continuació pot enviar esdeveniments SSF sintètics per a aquest receptor mitjançant el punt final d’emissió d’administració. Feu servir això per a entorns on Keycloak no pot observar de manera nativa esdeveniments en sentit ascendent (per exemple, canvis de credencials que es produeixen a LDAP). Si no hi ha cap rol configurat, el punt final es denega. Els cridadors que tenen permís per gestionar aquest client ometen la comprovació de rol.
ssfEmitEventsRole=Rol requerit per emetre esdeveniments
ssfEmitEventsRoleHelp=Rol que ha de tenir el compte de servei cridador per enviar esdeveniments sintètics. Seleccioneu un rol de domini o un rol de client en aquest receptor. Només s’aplica quan «Esdeveniments sintètics» està habilitat.
ssfMinVerificationInterval=Interval mínim de verificació
ssfMinVerificationIntervalHelp=Quantitat mínima de temps en segons que ha de transcórrer entre sol·licituds de verificació iniciades pel receptor per al flux d’aquest client. Les sol·licituds posteriors dins d’aquesta finestra es rebutgen amb HTTP 429. Deixeu-ho buit per utilitzar el valor per defecte de tot el transmissor.
ssfMaxEventAge=Edat màxima d’esdeveniments
ssfMaxEventAgeHelp=Edat màxima (en segons) dels esdeveniments de safata de sortida pendents, retinguts o de correu mort per a aquest receptor. Les files més antigues es purguen en el pas de manteniment del transmissor abans que s’apliqui la finestra de retenció de correu mort global. Feu servir un valor curt per a receptors els esdeveniments dels quals perden rellevància ràpidament (per exemple, sessió revocada). Deixeu heredat per tornar a la retenció de tot el transmissor únicament.
ssfInactivityTimeout=Temps d’espera per inactivitat
ssfInactivityTimeoutHelp=SSF 1.0 inactivity_timeout: si no arriba cap activitat del receptor elegible (qualsevol accés a l’API de gestió de flux, o una consulta per a fluxos POLL) dins d’aquesta finestra, el transmissor posa en pausa automàticament el flux i envia un esdeveniment d’actualització de flux. L’activitat es rastreja amb una granularitat de 5 minuts (escriptura coalescada per evitar sobrecarregar l’emmagatzematge de clients en consultadors ocupats), de manera que la comprovació efectiva pot disparar-se fins a 5 minuts tard; trieu temps d’espera còmodament més grans que això. Deixeu-ho buit per a cap temps d’espera.
ssfSubjectRemovalGrace=Gràcia d’eliminació de subjecte
ssfSubjectRemovalGraceHelp=SSF 1.0 defensa «Malicious Subject Removal». Després d’un /streams/subjects/remove impulsat pel receptor, el transmissor continua lliurant esdeveniments per al subjecte durant aquest nombre de segons, defensant-se contra un testimoni portador del receptor compromès que silenciï silenciosament els esdeveniments d’un objectiu. Les eliminacions impulsades per l’administrador sempre tenen efecte immediatament. Deixeu-ho buit per heretar el valor per defecte SPI de subject-removal-grace-seconds de tot el transmissor; establiu-ho a 0 per excloure aquest receptor de la finestra de gràcia fins i tot quan el valor per defecte del transmissor és positiu (per exemple, per a receptors que eliminen legítimament subjectes quan els usuaris abandonen el seu servei).
ssfAutoVerifyStream=Verificació automàtica del flux
ssfAutoVerifyStreamHelp=Quan està habilitat, el transmissor envia automàticament un SET de verificació de flux poc després que el receptor crei un flux. Quan està inhabilitat, el receptor pot realitzar la verificació enviant una sol·licitud de verificació explícita al punt final de verificació.
ssfVerificationDelay=Retard de verificació
ssfVerificationDelayHelp=Retard en mil·lisegons abans que el transmissor enviï l’esdeveniment de verificació després de crear el flux. Només s’aplica quan la verificació automàtica del flux està habilitada.
ssfStreamStatus=Estat
ssfStreamStatusHelp=Estat actual del flux SSF per a aquest client. Feu servir els botons d’acció de sota per canviar-lo; aquests segueixen el camí de transició del les especificació SSF, que envia un SET d’actualització de flux al receptor i alinea la safata de sortida amb el nou estat.
ssfStreamStatus.enabled=Habilitat
ssfStreamStatus.paused=En pausa
ssfStreamStatus.disabled=Inhabilitat
ssfStreamStatusEnable=Habilita el flux
ssfStreamStatusPause=Posa el flux en pausa
ssfStreamStatusDisable=Inhabilita el flux
ssfStreamStatusUpdateSuccess=Estat del flux actualitzat. S’ha enviat un esdeveniment d’actualització de flux al receptor.
ssfStreamStatusUpdateError=No s’ha pogut actualitzar l’estat del flux: {{error}}
ssfStreamStatusLabel=Estat del flux
ssfStreamIndicator.enabled=Habilitat
ssfStreamIndicator.paused=En pausa
ssfStreamIndicator.disabled=Inhabilitat
ssfStreamIndicator.registered=Registrat
ssfStreamIndicator.unregistered=No registrat
ssfStreamStatusReason=Motiu de l’estat
ssfStreamStatusReasonHelp=Motiu llegible per humans associat amb l’estat actual del flux, si se n’ha proporcionat un quan l’estat es va canviar per última vegada (per exemple, quan un receptor posa en pausa o inhabilita el flux).
ssfDelivery=Mètode de lliurament
ssfDeliveryHelp=El mètode de lliurament que el transmissor utilitza per als esdeveniments d’aquest flux. Push (RFC 8935) envia SETs signats al punt final del receptor; Poll (RFC 8936) reté els esdeveniments a la safata de sortida del transmissor fins que el receptor els recupera mitjançant el punt final de consulta allotjat pel transmissor.
ssfDelivery.PUSH=Push
ssfDelivery.POLL=Poll
ssfDelivery.PULL=Pull
ssfPushEndpointConnectTimeout=Temps d’espera de connexió push
ssfPushEndpointConnectTimeoutHelp=Temps d’espera de connexió en mil·lisegons quan es lliuren esdeveniments SSF mitjançant push HTTP al punt final push del receptor.
ssfPushEndpointSocketTimeout=Temps d’espera de sòcol push
ssfPushEndpointSocketTimeoutHelp=Temps d’espera de sòcol (lectura) en mil·lisegons quan es lliuren esdeveniments SSF mitjançant push HTTP al punt final push del receptor.
welcomeTabTitle=Benvinguda
welcomeTo=Benvinguts a {{realmDisplayInfo}}
welcomeText=Keycloak proporciona federació d’usuaris, autenticació forta, gestió d’usuaris, autorització detallada i molt més. Afegiu autenticació a les aplicacions i securitzeu serveis amb el mínim esforç. No cal gestionar l’emmagatzematge ni l’autenticació dels usuaris.
viewDocumentation=Consulteu la documentació
viewGuides=Visualitza les guies
joinCommunity=Uniu-vos a la comunitat
readBlog=Llegiu el blog
