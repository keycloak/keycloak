logoutConfirmationHelp=Després que l’usuari tanqui la sessió (tancament de sessió iniciat per OIDC RP), es mostrarà una pàgina de confirmació addicional amb un missatge com ara «Heu tancat la sessió» abans de redirigir l’usuari a la pàgina de destinació posterior al tancament de sessió. En aquesta pàgina, l’usuari ha de confirmar que vol ser redirigit a la pàgina de destinació posterior al tancament de sessió.
sectorIdentifierUri.tooltip=Els proveïdors que fan servir valors sub per parells i admeten el registre dinàmic de clients haurien d’utilitzar el paràmetre sector_identifier_uri. Proporciona una manera perquè un grup de llocs web sota control administratiu comú tingui valors sub per parells coherents independentment dels noms de domini individuals. També proporciona una manera perquè els clients canviïn els dominis redirect_uri sense haver de tornar a registrar tots els seus usuaris.
