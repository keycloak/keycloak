---
openapi: 3.1.0
components:
  schemas:
    Auth:
      type: object
      properties:
        method:
          type: string
          description: Which authentication method is used for this client
        secret:
          type: string
          description: Secret used to authenticate this client with Secret authentication
        certificate:
          type: string
          description: Public key used to authenticate this client with Signed JWT
            authentication
    BaseClientRepresentation:
      description: Base client representation with common properties for all client
        types
      type: object
      properties:
        uuid:
          type: string
          description: UUID generated by the server
          readOnly: true
        clientId:
          type: string
          description: ID uniquely identifying this client
        displayName:
          type: string
          description: Human readable name of the client
        description:
          type: string
          description: Human readable description of the client
        enabled:
          type: boolean
          description: Whether this client is enabled
        appUrl:
          type: string
          description: URL to the application's homepage that is represented by this
            client
        redirectUris:
          type: array
          uniqueItems: true
          items:
            type: string
          description: URIs that the browser can redirect to after login
        roles:
          type: array
          uniqueItems: true
          items:
            type: string
          description: Roles associated with this client
        protocol:
          type: string
      discriminator:
        propertyName: protocol
        mapping:
          openid-connect: "#/components/schemas/OIDCClientRepresentation"
          saml: "#/components/schemas/SAMLClientRepresentation"
    Flow:
      type: string
      enum:
      - STANDARD
      - IMPLICIT
      - DIRECT_GRANT
      - SERVICE_ACCOUNT
      - TOKEN_EXCHANGE
      - DEVICE
      - CIBA
    OIDCClientRepresentation:
      type: object
      properties:
        loginFlows:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Flow"
          description: Login flows that are enabled for this client
        auth:
          $ref: "#/components/schemas/Auth"
          description: Authentication configuration for this client
        webOrigins:
          type: array
          uniqueItems: true
          items:
            type: string
          description: Web origins that are allowed to make requests to this client
        serviceAccountRoles:
          type: array
          uniqueItems: true
          items:
            type: string
          description: Roles assigned to the service account
        protocol:
          type: string
      allOf:
      - $ref: "#/components/schemas/BaseClientRepresentation"
    SAMLClientRepresentation:
      description: SAML Client configuration
      type: object
      properties:
        nameIdFormat:
          type: string
          description: "Name ID format to use for the subject (e.g., 'username', 'email',\
            \ 'transient', 'persistent')"
        forceNameIdFormat:
          type: boolean
          description: Force the specified Name ID format even if the client requests
            a different one
        includeAuthnStatement:
          type: boolean
          description: Include AuthnStatement in the SAML response
        signDocuments:
          type: boolean
          description: Sign SAML documents on the server side
        signAssertions:
          type: boolean
          description: Sign SAML assertions
        clientSignatureRequired:
          type: boolean
          description: Require client to sign SAML requests
        forcePostBinding:
          type: boolean
          description: Force POST binding for SAML responses
        frontChannelLogout:
          type: boolean
          description: Use front-channel logout (browser redirect)
        signatureAlgorithm:
          type: string
          description: "Signature algorithm for signing SAML documents (e.g., 'RSA_SHA256',\
            \ 'RSA_SHA512')"
        signatureCanonicalizationMethod:
          type: string
          description: Canonicalization method for XML signatures
        signingCertificate:
          type: string
          description: "X.509 certificate for signing (PEM format, without headers)"
        allowEcpFlow:
          type: boolean
          description: Allow ECP (Enhanced Client or Proxy) flow
        protocol:
          type: string
      allOf:
      - $ref: "#/components/schemas/BaseClientRepresentation"
tags:
- name: Clients (v2)
  x-smallrye-profile-admin: ""
paths:
  /admin/api/{realmName}/clients/{version}:
    get:
      summary: Get all clients
      description: Returns a list of all clients in the realm
      operationId: getClients
      tags:
      - Clients (v2)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BaseClientRepresentation"
    post:
      summary: Create a new client
      description: Creates a new client in the realm
      operationId: createClient
      tags:
      - Clients (v2)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BaseClientRepresentation"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: {}
    parameters:
    - name: realmName
      in: path
      required: true
      schema:
        type: string
    - name: version
      in: path
      required: true
      schema:
        type: string
        pattern: v\d+
  /admin/api/{realmName}/clients/{version}/{id}:
    get:
      operationId: getClient
      tags:
      - Clients (v2)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseClientRepresentation"
    put:
      operationId: createOrUpdateClient
      tags:
      - Clients (v2)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BaseClientRepresentation"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: {}
    patch:
      operationId: patchClient
      tags:
      - Clients (v2)
      requestBody:
        content:
          application/merge-patch+json: {}
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseClientRepresentation"
    delete:
      operationId: deleteClient
      tags:
      - Clients (v2)
      responses:
        "204":
          description: No Content
    parameters:
    - name: realmName
      in: path
      required: true
      schema:
        type: string
    - name: version
      in: path
      required: true
      schema:
        type: string
        pattern: v\d+
    - name: id
      in: path
      required: true
      schema:
        type: string
info:
  title: Keycloak API
  version: 999.0.0-SNAPSHOT
