name: Build Washington Images

on:
  pull_request:
    types:
      - closed
    branches:
      - develop

  push:
    branches:
      - 'release/**'
      - 'feature/**'

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (default: current)'
        required: false
      version:
        description: 'Explicit release version (e.g. 25.0.3-test). Must not be a production format (e.g. 25.0.3).'
        required: false
      marauder_tag:
        description: 'Specific Marauder release tag to use (e.g. v1.2.3-test). Must not be a production format (e.g. v1.2.3).'
        required: false
        type: string

  repository_dispatch:
    types:
      - marauder-release

env:
  REGISTRY_HOSTNAME: ghcr.io
  IMAGE_NAME: ghcr.io/vunetsystems/keycloak
  RELEASE_BRANCH_PREFIX: "release/"
  MAIN_BRANCH: "develop"
  HANOI_REPO: hanoi

jobs:

  # ---------------------------------------------------------------------------
  # 1. BRANCH CONTEXT
  # ---------------------------------------------------------------------------
  branch-context:
    name: Branch Context
    runs-on: ubuntu-latest
    outputs:
      branch-type:       ${{ steps.ctx.outputs.branch-type }}
      image-tag-prefix:  ${{ steps.ctx.outputs.image-tag-prefix }}
      hanoi-target:      ${{ steps.ctx.outputs.hanoi-target }}
      should-build:      ${{ steps.ctx.outputs.should-build }}
      run-versioning:    ${{ steps.ctx.outputs.run-versioning }}
      run-release:       ${{ steps.ctx.outputs.run-release }}
      run-release-retag: ${{ steps.ctx.outputs.run-release-retag }}
      concurrency-group: ${{ steps.ctx.outputs.concurrency-group }}
      is-test-run:       ${{ steps.ctx.outputs.is-test-run }}
      ref-name:          ${{ steps.ctx.outputs.ref-name }}
      checkout-ref:      ${{ steps.ctx.outputs.checkout-ref }}

    steps:
      - name: Checkout Washington
        uses: actions/checkout@v4

      - name: Compute branch context
        id: ctx
        run: |
          REF="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"
          PR_MERGED="${{ github.event.pull_request.merged }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          DEFAULT_CHECKOUT_REF="${{ github.sha }}"

          # Default outputs
          echo "branch-type=none"        >> $GITHUB_OUTPUT
          echo "image-tag-prefix="       >> $GITHUB_OUTPUT
          echo "hanoi-target="           >> $GITHUB_OUTPUT
          echo "should-build=false"      >> $GITHUB_OUTPUT
          echo "run-versioning=false"    >> $GITHUB_OUTPUT
          echo "run-release=false"       >> $GITHUB_OUTPUT
          echo "run-release-retag=false" >> $GITHUB_OUTPUT
          echo "concurrency-group=none"  >> $GITHUB_OUTPUT
          echo "is-test-run=false"       >> $GITHUB_OUTPUT
          echo "ref-name=$REF"           >> $GITHUB_OUTPUT
          echo "checkout-ref=$DEFAULT_CHECKOUT_REF" >> $GITHUB_OUTPUT

          if [[ "$EVENT" == "push" && "$COMMIT_MSG" == *"[skip ci]"* ]]; then
            echo "Detected skip-ci commit; skipping."
            exit 0
          fi

          if [[ "$EVENT" == "push" && "$REF" == feature/* ]]; then
            JIRA_TICKET=$(echo "$REF" | sed 's|feature/||' | grep -oP '^[A-Z]+-[0-9]+' || true)
            BRANCH_SLUG=$(echo "$REF" | sed 's|feature/||' | sed 's|[^a-zA-Z0-9]|-|g')
            TAG_SLUG="${JIRA_TICKET:-$BRANCH_SLUG}"
            echo "branch-type=feature"                                              >> $GITHUB_OUTPUT
            echo "image-tag-prefix=feat-${TAG_SLUG}-b${{ github.run_number }}"     >> $GITHUB_OUTPUT
            echo "hanoi-target=$REF"                                                >> $GITHUB_OUTPUT
            echo "should-build=true"                                                >> $GITHUB_OUTPUT
            echo "is-test-run=false"                                                >> $GITHUB_OUTPUT
            echo "run-versioning=false"                                             >> $GITHUB_OUTPUT
            echo "run-release=false"                                                >> $GITHUB_OUTPUT
            echo "run-release-retag=false"                                          >> $GITHUB_OUTPUT
            echo "concurrency-group=washington-feature-${BRANCH_SLUG}"             >> $GITHUB_OUTPUT
            echo "ref-name=$REF"                                                    >> $GITHUB_OUTPUT
            echo "checkout-ref=$DEFAULT_CHECKOUT_REF"                              >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "$EVENT" == "repository_dispatch" ]]; then
            TRIGGERED_BY="${{ github.event.client_payload.triggered_by }}"
            echo "branch-type=develop"                                 >> $GITHUB_OUTPUT
            echo "image-tag-prefix=main-b${{ github.run_number }}"    >> $GITHUB_OUTPUT
            echo "hanoi-target=develop"                                >> $GITHUB_OUTPUT
            echo "should-build=true"                                   >> $GITHUB_OUTPUT
            echo "concurrency-group=washington-develop"                >> $GITHUB_OUTPUT
            echo "ref-name=develop"                                    >> $GITHUB_OUTPUT
            echo "checkout-ref=$DEFAULT_CHECKOUT_REF"                  >> $GITHUB_OUTPUT

            if [[ "$TRIGGERED_BY" == "manual" ]]; then
              # Test run: image gets a build-number tag, nothing else runs
              echo "is-test-run=true"      >> $GITHUB_OUTPUT
              echo "run-versioning=false"  >> $GITHUB_OUTPUT
              echo "run-release=false"     >> $GITHUB_OUTPUT
            else
              # Full develop flow ? build + Hanoi update, no version bump
              echo "is-test-run=false"     >> $GITHUB_OUTPUT
              echo "run-versioning=false"  >> $GITHUB_OUTPUT
              echo "run-release=true"      >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          if [[ "$EVENT" == "pull_request" && "$PR_MERGED" == "true" && "$BASE_REF" == "develop" ]]; then
            echo "branch-type=develop"                              >> $GITHUB_OUTPUT
            echo "image-tag-prefix=main-b${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "hanoi-target=develop"                            >> $GITHUB_OUTPUT
            echo "should-build=true"                               >> $GITHUB_OUTPUT
            echo "is-test-run=false"                               >> $GITHUB_OUTPUT
            echo "run-versioning=false"                            >> $GITHUB_OUTPUT
            echo "run-release=true"                                >> $GITHUB_OUTPUT
            echo "concurrency-group=washington-develop"            >> $GITHUB_OUTPUT
            echo "ref-name=develop"                                >> $GITHUB_OUTPUT
            echo "checkout-ref=${{ github.event.pull_request.merge_commit_sha || github.sha }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "$EVENT" == "push" && "$REF" == release/* ]]; then
            RELEASE_LINE=$(echo "$REF" | sed 's|release/||')
            RELEASE_SLUG=$(echo "$RELEASE_LINE" | sed 's|[^a-zA-Z0-9]|-|g')
            echo "branch-type=release"                                              >> $GITHUB_OUTPUT
            echo "image-tag-prefix=NG-${RELEASE_LINE}.0-b${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "hanoi-target=$REF"                                                >> $GITHUB_OUTPUT
            echo "should-build=true"                                                >> $GITHUB_OUTPUT
            echo "is-test-run=false"                                                >> $GITHUB_OUTPUT
            echo "run-versioning=true"                                              >> $GITHUB_OUTPUT
            echo "run-release=true"                                                 >> $GITHUB_OUTPUT
            echo "run-release-retag=true"                                           >> $GITHUB_OUTPUT
            echo "concurrency-group=washington-release-${RELEASE_SLUG}"            >> $GITHUB_OUTPUT
            echo "ref-name=$REF"                                                    >> $GITHUB_OUTPUT
            echo "checkout-ref=$DEFAULT_CHECKOUT_REF"                              >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            INPUT_REF="${{ github.event.inputs.branch }}"
            ACTUAL_REF="${INPUT_REF:-$REF}"
            MARAUDER_TAG="${{ github.event.inputs.marauder_tag }}"
            INPUT_VERSION="${{ github.event.inputs.version }}"

            # Production tag guards
            if [[ -n "$INPUT_VERSION" ]]; then
              if echo "$INPUT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                git fetch --tags --quiet
                if git ls-remote --tags origin | grep -q "refs/tags/v${INPUT_VERSION}$"; then
                  echo "ERROR: '$INPUT_VERSION' is production-format and tag v${INPUT_VERSION} already exists. Aborting."
                  exit 1
                else
                  echo "WARNING: '$INPUT_VERSION' is production-format but tag does not exist yet. Proceeding as test run."
                fi
              fi
            fi

            if [[ -n "$MARAUDER_TAG" ]]; then
              if echo "$MARAUDER_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
                if git ls-remote --tags https://github.com/vunetsystems/marauder.git | grep -q "refs/tags/${MARAUDER_TAG}$"; then
                  echo "ERROR: '$MARAUDER_TAG' is production-format and already exists. Aborting."
                  exit 1
                else
                  echo "WARNING: '$MARAUDER_TAG' is production-format but does not exist yet. Proceeding as test run."
                fi
              fi
            fi

            echo "is-test-run=true"      >> $GITHUB_OUTPUT
            echo "run-versioning=false"  >> $GITHUB_OUTPUT
            echo "run-release=false"     >> $GITHUB_OUTPUT
            echo "should-build=true"     >> $GITHUB_OUTPUT

            if [[ "$ACTUAL_REF" == feature/* ]]; then
              JIRA_TICKET=$(echo "$ACTUAL_REF" | sed 's|feature/||' | grep -oP '^[A-Z]+-[0-9]+' || true)
              BRANCH_SLUG=$(echo "$ACTUAL_REF" | sed 's|feature/||' | sed 's|[^a-zA-Z0-9]|-|g')
              TAG_SLUG="${JIRA_TICKET:-$BRANCH_SLUG}"
              echo "branch-type=feature"                                              >> $GITHUB_OUTPUT
              echo "image-tag-prefix=feat-${TAG_SLUG}-b${{ github.run_number }}"     >> $GITHUB_OUTPUT
              echo "hanoi-target=$ACTUAL_REF"                                         >> $GITHUB_OUTPUT
              echo "concurrency-group=washington-feature-${BRANCH_SLUG}"             >> $GITHUB_OUTPUT

            elif [[ "$ACTUAL_REF" == "develop" ]]; then
              echo "branch-type=develop"                              >> $GITHUB_OUTPUT
              echo "image-tag-prefix=main-b${{ github.run_number }}" >> $GITHUB_OUTPUT
              echo "hanoi-target=develop"                            >> $GITHUB_OUTPUT
              echo "concurrency-group=washington-develop"            >> $GITHUB_OUTPUT

            elif [[ "$ACTUAL_REF" == release/* ]]; then
              RELEASE_SLUG=$(echo "$ACTUAL_REF" | sed 's|release/||' | sed 's|[^a-zA-Z0-9]|-|g')
              echo "branch-type=release"                                              >> $GITHUB_OUTPUT
              # Use a build-number prefix so the Docker tag is never empty on test runs
              echo "image-tag-prefix=release-${RELEASE_SLUG}-b${{ github.run_number }}" >> $GITHUB_OUTPUT
              echo "hanoi-target=$ACTUAL_REF"                                         >> $GITHUB_OUTPUT
              echo "concurrency-group=washington-release-${RELEASE_SLUG}"            >> $GITHUB_OUTPUT
            fi

            echo "ref-name=$ACTUAL_REF" >> $GITHUB_OUTPUT
            echo "checkout-ref=$ACTUAL_REF" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # 2. RELEASE RETAG
  # ---------------------------------------------------------------------------
  release-retag:
    name: Release Retag (align .version on release branch)
    needs: [branch-context]
    if: |
      github.event_name == 'push' &&
      needs.branch-context.outputs.run-release-retag == 'true' &&
      startsWith(needs.branch-context.outputs.ref-name, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VUNET_NEW_CICD_APP_ID }}
          private-key: ${{ secrets.VUNET_NEW_CICD_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout Washington
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ needs.branch-context.outputs.checkout-ref }}
          fetch-depth: 0

      - name: Derive platform version from branch name
        id: rel
        run: |
          # release/3.2 ? REL=3.2 ? VERSION=3.2.0
          REL="${{ needs.branch-context.outputs.ref-name }}"
          REL="${REL#release/}"
          VERSION="${REL}.0"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Derived initial platform version: ${VERSION}"

      - name: Write initial platform version to .version
        shell: python
        run: |
          import json, os
          version = os.environ["VERSION"]
          with open("resources/.version") as f:
            data = json.load(f)
          data.setdefault("platform_info", {})
          data["platform_info"]["version"] = f"NG {version}"
          with open("resources/.version", "w") as f:
            json.dump(data, f, indent=2)
          print(f"Written .version: NG {version}")
        env:
          VERSION: ${{ steps.rel.outputs.version }}

      - name: Commit and push version changes to release branch
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          git config user.name "vunet-new-ci-cd-bot[bot]"
          git config user.email "vunet-new-ci-cd-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || {
            git commit -m "chore: bump washington version to v${VERSION} [skip ci]"
            git push origin HEAD:${{ needs.branch-context.outputs.ref-name }}
          }

  # ---------------------------------------------------------------------------
  # 3. SERIALIZATION GATE
  # ---------------------------------------------------------------------------
  gate:
    name: Serialisation Gate
    needs: branch-context
    if: always() && needs.branch-context.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ needs.branch-context.outputs.concurrency-group }}
      cancel-in-progress: false
    steps:
      - name: Acquired concurrency slot
        run: echo "Concurrency group ${{ needs.branch-context.outputs.concurrency-group }} acquired"

  # ---------------------------------------------------------------------------
  # 4. VERSIONING
  # ---------------------------------------------------------------------------
  versioning:
    name: Versioning
    needs: [branch-context, gate, release-retag]
    if: |
      always() &&
      needs.branch-context.outputs.should-build == 'true' &&
      needs.branch-context.outputs.run-versioning == 'true' &&
      needs.branch-context.outputs.is-test-run == 'false' &&
      needs.gate.result == 'success' &&
      !contains(fromJSON('["failure", "cancelled"]'), needs.release-retag.result)
    runs-on: ubuntu-latest
    outputs:
      # Track A ? Keycloak version
      keycloak-version: ${{ steps.patch-version.outputs.version }}
      cur-version:      ${{ steps.cur-version.outputs.version }}
      sem-version:      ${{ steps.cur-version.outputs.sem-version }}
      release-type:     ${{ steps.release-type.outputs.type }}
      jira-ticket:      ${{ steps.extract-jira.outputs.ticket }}
      # Track B ? Platform version
      platform-version: ${{ steps.platform-version.outputs.version }}
    env:
      MINOR_RELEASE: ${{ contains(github.event.head_commit.message, '[release]') || contains(github.event.pull_request.title, '[release]') }}

    steps:
      - name: Checkout Washington
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.branch-context.outputs.ref-name }}
          fetch-depth: 0

      - name: Extract Jira Ticket
        id: extract-jira
        run: |
          TICKET=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == feature/* ]]; then
            SUFFIX="${{ github.ref_name }}"
            SUFFIX="${SUFFIX#feature/}"
            TICKET=$(echo "$SUFFIX" | grep -oP '^[A-Z]+-[0-9]+' || true)
          fi
          if [ -z "$TICKET" ]; then
            PR_TITLE="${{ github.event.pull_request.title || github.event.head_commit.message }}"
            TICKET=$(echo "$PR_TITLE" | grep -oP '[A-Z]+-\d+' || true)
          fi
          echo "ticket=${TICKET:-}" >> $GITHUB_OUTPUT
          echo "Jira ticket: ${TICKET:-none}"


      - name: Read current Keycloak version from .version
        id: cur-version
        run: |
          VERSION=$(python3 -c "
          import json
          with open('resources/.version') as f:
            data = json.load(f)
          print(data['application_info']['version'])
          ")
          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "sem-version=$VERSION" >> $GITHUB_OUTPUT
          echo "Keycloak version: $VERSION"

      - name: Calculate next Keycloak patch version from .version
        id: patch-version
        run: |
          CURRENT="${{ steps.cur-version.outputs.version }}"
          MAJOR_MINOR=$(echo "$CURRENT" | awk -F '.' '{ print $1"."$2 }')
          PATCH=$(echo "$CURRENT" | awk -F '.' '{ print $3 }')
          NEXT_PATCH=$((PATCH + 1))
          echo "version=${MAJOR_MINOR}.${NEXT_PATCH}" >> $GITHUB_OUTPUT
          echo "Next Keycloak version: ${MAJOR_MINOR}.${NEXT_PATCH}"

      - name: Determine release type (minor vs patch)
        id: release-type
        run: |
          if [[ "${{ env.MINOR_RELEASE }}" == "true" ]]; then
            echo "type=feature" >> $GITHUB_OUTPUT
          else
            echo "type=bug" >> $GITHUB_OUTPUT
          fi


      - name: Read and increment platform version from .version
        id: platform-version
        shell: python
        run: |
          import json, os, re
          with open("resources/.version") as f:
            data = json.load(f)
          raw = data["platform_info"]["version"]  # e.g. "NG 3.1.0"
          match = re.search(r"\d+\.\d+\.\d+", raw)
          if not match:
            raise Exception(f"Invalid platform version format in .version: {raw}")
          current = match.group(0)  # e.g. "3.1.0"
          major, minor, patch = map(int, current.split("."))

          minor_release = os.environ.get("MINOR_RELEASE", "false") == "true"
          if minor_release:
            minor += 1
            patch = 0
          else:
            patch += 1

          next_ver = f"{major}.{minor}.{patch}"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"version={next_ver}\n")
          print(f"Platform version: {current} ? {next_ver}")
        env:
          MINOR_RELEASE: ${{ env.MINOR_RELEASE }}

  # ---------------------------------------------------------------------------
  # 5. BUILD
  # ---------------------------------------------------------------------------
  build:
    name: Build and Push Image
    needs: [branch-context, gate, versioning, release-retag]
    if: |
      always() &&
      needs.branch-context.outputs.should-build == 'true' &&
      needs.gate.result == 'success' &&
      (needs.release-retag.result == 'success' || needs.release-retag.result == 'skipped') &&
      (needs.versioning.result == 'success' || needs.versioning.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      combined-tag: ${{ steps.tags.outputs.combined_tag }}
      digest:       ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout Washington
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.branch-context.outputs.checkout-ref }}

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VUNET_NEW_CICD_APP_ID }}
          private-key: ${{ secrets.VUNET_NEW_CICD_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: marauder

      - name: Resolve Marauder version
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            REQUESTED_MARAUDER_TAG="${{ github.event.client_payload.release_tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.marauder_tag }}" ]]; then
            REQUESTED_MARAUDER_TAG="${{ github.event.inputs.marauder_tag }}"
          else
            REQUESTED_MARAUDER_TAG=""
          fi

          if [[ -n "$REQUESTED_MARAUDER_TAG" ]]; then
            RELEASE_JSON="$(
              curl -fsSL \
                -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/vunetsystems/marauder/releases/tags/${REQUESTED_MARAUDER_TAG}" \
            )"
          else
            RELEASE_JSON="$(
              curl -fsSL \
                -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/vunetsystems/marauder/releases/latest \
            )"
          fi

          MARAUDER_VERSION="$(printf '%s' "$RELEASE_JSON" | jq -r '.tag_name')"
          MARAUDER_TARBALL="$(printf '%s' "$RELEASE_JSON" | jq -r '.assets[] | select(.name | startswith("marauder-plugins-") and endswith(".tar.gz")) | .name' | head -n1)"
          MARAUDER_ASSET_ID="$(printf '%s' "$RELEASE_JSON" | jq -r --arg name "$MARAUDER_TARBALL" '.assets[] | select(.name == $name) | .id' | head -n1)"

          if [ -z "$MARAUDER_VERSION" ] || [ "$MARAUDER_VERSION" == "null" ]; then
            echo "ERROR: Could not resolve Marauder version."
            exit 1
          fi

          if [ -z "$MARAUDER_TARBALL" ] || [ "$MARAUDER_TARBALL" == "null" ]; then
            echo "ERROR: Could not resolve Marauder tarball asset for release ${MARAUDER_VERSION}."
            exit 1
          fi

          if [ -z "$MARAUDER_ASSET_ID" ] || [ "$MARAUDER_ASSET_ID" == "null" ]; then
            echo "ERROR: Could not resolve Marauder asset id for ${MARAUDER_TARBALL}."
            exit 1
          fi

          echo "MARAUDER_VERSION=${MARAUDER_VERSION}" >> $GITHUB_ENV
          echo "MARAUDER_TARBALL=${MARAUDER_TARBALL}" >> $GITHUB_ENV
          echo "MARAUDER_ASSET_ID=${MARAUDER_ASSET_ID}" >> $GITHUB_ENV

      - name: Download Marauder release asset
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/vunetsystems/marauder/releases/assets/${MARAUDER_ASSET_ID}" \
            -o quarkus/container/marauder-plugins.tar.gz

          test -s quarkus/container/marauder-plugins.tar.gz

      - name: Download Keycloak dist from latest develop build
        if: github.event_name == 'repository_dispatch'
        run: |
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/release.yml/runs?branch=develop&status=success&per_page=10" \
            --jq '[.workflow_runs[] | select(.conclusion == "success")] | .[0].id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" == "null" ]; then
            echo "ERROR: No successful develop build found to download keycloak-dist artifact from."
            exit 1
          fi

          echo "Downloading keycloak-dist artifact from run $RUN_ID"
          gh run download "$RUN_ID" --name keycloak-dist --dir quarkus/container/

          test -n "$(ls quarkus/container/keycloak-*.tar.gz 2>/dev/null)" || {
            echo "ERROR: keycloak-dist artifact not found in run $RUN_ID"
            exit 1
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Keycloak version for build
        id: resolved-kc
        run: |
          VERSIONING_KC='${{ needs.versioning.outputs.keycloak-version }}'
          if [ -n "$VERSIONING_KC" ]; then
            echo "version=$VERSIONING_KC" >> $GITHUB_OUTPUT
          else
            python3 -c "import json; d=json.load(open('resources/.version')); print('version='+d['application_info']['version'])" >> $GITHUB_OUTPUT
          fi

      - name: Compute image tag
        id: tags
        run: |
          IMAGE_TAG_PREFIX='${{ needs.branch-context.outputs.image-tag-prefix }}'
          BRANCH_TYPE='${{ needs.branch-context.outputs.branch-type }}'

          # All branch types use image-tag-prefix as the Docker tag:
          # develop  ? main-b<run>
          # feature  ? feat-<jira>-b<run>
          # release  ? NG-5.1.0-b<run>
          COMBINED_TAG="$IMAGE_TAG_PREFIX"

          echo "combined_tag=$COMBINED_TAG" >> $GITHUB_OUTPUT
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          if [ "$BRANCH_TYPE" == "develop" ] && [ "${{ needs.branch-context.outputs.is-test-run }}" == "false" ]; then
            echo "${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
          fi
          echo "${{ env.IMAGE_NAME }}:$COMBINED_TAG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set Keycloak version in pom.xml
        if: github.event_name != 'repository_dispatch'
        run: |
          [ -x "./set-version.sh" ] || { echo "ERROR: set-version.sh not found or not executable"; exit 1; }
          ./set-version.sh ${{ steps.resolved-kc.outputs.version }}

      - name: Build Keycloak
        if: github.event_name != 'repository_dispatch'
        uses: ./.github/actions/build-keycloak

      - name: Copy Keycloak dist into Docker context
        if: github.event_name != 'repository_dispatch'
        run: cp quarkus/dist/target/keycloak-*.tar.gz quarkus/container/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./quarkus/container/
          file: ./quarkus/container/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            KEYCLOAK_VERSION=${{ steps.resolved-kc.outputs.version }}
            MARAUDER_VERSION=${{ env.MARAUDER_VERSION }}
            MARAUDER_TARBALL=${{ env.MARAUDER_TARBALL }}

      - name: Install Cosign
        if: success()
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign image with Cosign
        if: success() && steps.build.outputs.digest != ''
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          cosign sign --key cosign.key --yes "${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          rm -f cosign.key

      - name: Upload release artifact
        if: needs.branch-context.outputs.branch-type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-dist
          path: quarkus/dist/target/keycloak-*.tar.gz

  # ---------------------------------------------------------------------------
  # 6. HELM UPDATE
  # ---------------------------------------------------------------------------
  helm-update:
    name: Update Hanoi Helm Charts
    needs: [branch-context, gate, build]
    if: |
      always() &&
      needs.branch-context.outputs.should-build == 'true' &&
      needs.branch-context.outputs.is-test-run == 'false' &&
      needs.gate.result == 'success' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    env:
      HANOI_TARGET: ${{ needs.branch-context.outputs.hanoi-target }}

    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VUNET_NEW_CICD_APP_ID }}
          private-key: ${{ secrets.VUNET_NEW_CICD_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ env.HANOI_REPO }}

      - name: Checkout Washington
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.branch-context.outputs.checkout-ref }}
          path: washington
          fetch-depth: 0

      - name: Checkout Hanoi
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ env.HANOI_REPO }}
          token: ${{ steps.generate-token.outputs.token }}
          path: hanoi
          fetch-depth: 0

      - name: Setup Hanoi branch
        run: |
          cd hanoi
          git config user.name "vunet-new-ci-cd-bot[bot]"
          git config user.email "vunet-new-ci-cd-bot@users.noreply.github.com"
          TARGET="${{ env.HANOI_TARGET }}"
          git fetch origin
          if git ls-remote --heads origin "$TARGET" | grep -q "$TARGET"; then
            git checkout "$TARGET"
            git pull origin "$TARGET"
          else
            echo "Branch '$TARGET' does not exist in Hanoi; creating from develop."
            git checkout develop
            git pull origin develop
            git checkout -b "$TARGET"
            git push -u origin "$TARGET"
          fi

      - name: Update Helm chart image tag
        run: |
          cd hanoi
          TAG='${{ needs.build.outputs.combined-tag }}'
          MAP_FILE="../washington/.ci/helm-map.json"
          CHART_PATHS="helm-charts/keycloak"
          IMAGE_NAME="${{ github.repository_owner }}/keycloak"

          if [ -f "$MAP_FILE" ]; then
            MAPPED_PATHS=$(jq -r '.keycloak.chart_paths[]? // empty' "$MAP_FILE")
            MAPPED_SUFFIX=$(jq -r '.keycloak.image_suffix // empty' "$MAP_FILE")
            [ -n "$MAPPED_PATHS" ] && CHART_PATHS="$MAPPED_PATHS"
            [ -n "$MAPPED_SUFFIX" ] && IMAGE_NAME="${{ github.repository_owner }}/${MAPPED_SUFFIX}"
          fi

          for chart in $CHART_PATHS; do
            [ -f "$chart/values.yaml" ] && \
              sed -i "s|imageTag:.*|imageTag: $TAG|" "$chart/values.yaml" && \
              sed -i "s|imageName:.*|imageName: $IMAGE_NAME|" "$chart/values.yaml"
          done

          git diff --quiet || {
            git add .
            git commit -m "chore: update keycloak image tag to $TAG"
            git pull --rebase origin "$(git branch --show-current)" || true
            git push origin "$(git branch --show-current)"
          }

  # ---------------------------------------------------------------------------
  # 7. COMMIT BUMPS
  # ---------------------------------------------------------------------------
  commit-bumps:
    name: Commit version bumps
    needs: [branch-context, versioning, build, helm-update, release]
    if: |
      always() &&
      needs.branch-context.outputs.is-test-run == 'false' &&
      needs.branch-context.outputs.branch-type == 'release' &&
      needs.versioning.outputs.keycloak-version != '' &&
      needs.build.result == 'success' &&
      needs.helm-update.result == 'success' &&
      (needs.release.result == 'success' || needs.release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VUNET_NEW_CICD_APP_ID }}
          private-key: ${{ secrets.VUNET_NEW_CICD_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout Washington
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ needs.branch-context.outputs.ref-name }}
          fetch-depth: 0
      - name: Pull latest changes
        run: |
            git config user.name "vunet-new-ci-cd-bot[bot]"
            git config user.email "vunet-new-ci-cd-bot@users.noreply.github.com"
            git pull origin ${{ needs.branch-context.outputs.ref-name }}

      - name: Update pom.xml with new Keycloak version
        run: |
          [ -x "./set-version.sh" ] || { echo "ERROR: set-version.sh not found or not executable"; exit 1; }
          ./set-version.sh ${{ needs.versioning.outputs.keycloak-version }}

      - name: Update .version with new Keycloak version
        shell: python
        run: |
          import json, os
          version = os.environ["KEYCLOAK_VERSION"]
          with open("resources/.version") as f:
            data = json.load(f)
          data.setdefault("application_info", {})
          data["application_info"]["version"] = version
          with open("resources/.version", "w") as f:
            json.dump(data, f, indent=2)
          print(f"Updated application_info.version to {version}")
        env:
          KEYCLOAK_VERSION: ${{ needs.versioning.outputs.keycloak-version }}

      - name: Update .version with new platform version
        if: needs.branch-context.outputs.branch-type == 'release'
        shell: python
        run: |
          import json, os
          version = os.environ["PLATFORM_VERSION"]
          with open("resources/.version") as f:
            data = json.load(f)
          data.setdefault("platform_info", {})
          data["platform_info"]["version"] = f"NG {version}"
          with open("resources/.version", "w") as f:
            json.dump(data, f, indent=2)
          print(f"Updated .version to NG {version}")
        env:
          PLATFORM_VERSION: ${{ needs.versioning.outputs.platform-version }}

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
           echo "No changes detected, skipping commit/push."
           exit 0
          fi
          git commit -m "chore: bump washington version to v${{ needs.versioning.outputs.platform-version }} [skip ci]"
          git push origin HEAD:${{ needs.branch-context.outputs.ref-name }}

  # ---------------------------------------------------------------------------
  # 8. RELEASE
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [branch-context, gate, build, versioning, helm-update]
    if: |
      always() &&
      needs.branch-context.outputs.branch-type == 'release' &&
      needs.branch-context.outputs.is-test-run == 'false' &&
      needs.gate.result == 'success' &&
      needs.build.result == 'success' &&
      needs.helm-update.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Washington
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.branch-context.outputs.checkout-ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: keycloak-dist
          path: dist
          if-no-files-found: ignore

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.versioning.outputs.platform-version }}"
          ARTIFACTS=$(ls dist/keycloak-*.tar.gz 2>/dev/null | xargs -I{} echo "{}" || true)

          git config user.email "github-actions@noreply.github.com"
          git config user.name "github-actions[bot]"

          # Guard against duplicate releases before creating or pushing tags.
          if gh release view "v${VERSION}" > /dev/null 2>&1; then
            echo "Release v${VERSION} already exists, skipping."
            exit 0
          fi

          # Only create and push the tag if it does not already exist remotely.
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "refs/tags/v${VERSION}$"; then
            echo "Remote tag v${VERSION} already exists, reusing it."
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi

          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --generate-notes \
            $ARTIFACTS

  # ---------------------------------------------------------------------------
  # 9. JIRA SUCCESS
  # ---------------------------------------------------------------------------
  jira-success:
    name: Update Jira Ticket (Build Success)
    needs:
      - branch-context
      - versioning
      - build
      - helm-update
      - release
      - commit-bumps
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.branch-context.outputs.is-test-run == 'false' &&
      needs.versioning.outputs.jira-ticket != '' &&
      !contains(join(needs.*.result, ','), 'failure') &&
      !contains(join(needs.*.result, ','), 'cancelled')
    env:
      JIRA_URL:       ${{ secrets.JIRA_URL }}
      JIRA_USERNAME:  ${{ secrets.JIRA_USERNAME }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      BRANCH_NAME:    ${{ needs.branch-context.outputs.ref-name }}
      REPOSITORY:     ${{ github.repository }}
      RELEASE_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Post Build Success Comment to Jira
        run: |
          KEYCLOAK_TAG='${{ needs.build.outputs.combined-tag }}'
          PLATFORM_VER='${{ needs.versioning.outputs.platform-version }}'
          OWNER='${{ github.repository_owner }}'

          COMMENT="Build and Deploy Success\n\n"
          COMMENT+="Repository: ${REPOSITORY}\n"
          COMMENT+="Branch: ${BRANCH_NAME}\n"
          COMMENT+="Keycloak Image: ghcr.io/${OWNER}/keycloak:${KEYCLOAK_TAG}\n"
          COMMENT+="Platform Release: v${PLATFORM_VER}\n"
          COMMENT+="Helm Charts: Updated in ${{ github.repository_owner }}/${{ env.HANOI_REPO }}\n"
          COMMENT+="Build Run: ${RELEASE_URL}"

          PAYLOAD=$(jq -n --arg body "$COMMENT" '{body:$body}')

          curl -X POST \
            -u "$JIRA_USERNAME:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$JIRA_URL/rest/api/2/issue/${{ needs.versioning.outputs.jira-ticket }}/comment"

  # ---------------------------------------------------------------------------
  # 10. JIRA FAILURE
  # ---------------------------------------------------------------------------
  jira-failure:
    name: Update Jira Ticket (Build Failed)
    needs:
      - branch-context
      - versioning
      - build
      - helm-update
      - release
      - commit-bumps
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.branch-context.outputs.is-test-run == 'false' &&
      needs.versioning.outputs.jira-ticket != '' &&
      (contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled'))
    env:
      JIRA_URL:       ${{ secrets.JIRA_URL }}
      JIRA_USERNAME:  ${{ secrets.JIRA_USERNAME }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      BRANCH_NAME:    ${{ needs.branch-context.outputs.ref-name }}
      REPOSITORY:     ${{ github.repository }}
      RUN_URL:        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Post Build Failure Comment to Jira
        run: |
          KEYCLOAK_TAG='${{ needs.build.outputs.combined-tag }}'
          BUILD_STATUS="${{ needs.build.result }}"
          HELM_STATUS="${{ needs.helm-update.result }}"
          RELEASE_STATUS="${{ needs.release.result }}"

          FAILED_JOBS=""
          [ "$BUILD_STATUS"   == "failure" ] && FAILED_JOBS+="build "
          [ "$HELM_STATUS"    == "failure" ] && FAILED_JOBS+="helm-update "
          [ "$RELEASE_STATUS" == "failure" ] && FAILED_JOBS+="release "

          COMMENT="Build Failed\n\n"
          COMMENT+="Repository: ${REPOSITORY}\n"
          COMMENT+="Branch: ${BRANCH_NAME}\n"
          COMMENT+="Keycloak Image tag: ${KEYCLOAK_TAG}\n"
          COMMENT+="Failed jobs: ${FAILED_JOBS:-unknown}\n"
          COMMENT+="Build Run: ${RUN_URL}"

          PAYLOAD=$(jq -n --arg body "$COMMENT" '{body:$body}')

          curl -X POST \
            -u "$JIRA_USERNAME:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$JIRA_URL/rest/api/2/issue/${{ needs.versioning.outputs.jira-ticket }}/comment"