name: Keycloak Operator CI

on:
  push:
    branches-ignore:
      - main
      - dependabot/**
      - copilot/**
  pull_request:
  workflow_dispatch:

env:
  MAVEN_ARGS: "-B -nsu -Daether.connector.http.connectionMaxTtl=25"
  MINIKUBE_VERSION: v1.38.0
  KUBERNETES_VERSION: v1.35.0
  MINIKUBE_MEMORY: 4096 # Without explicitly setting memory, minikube uses ~25% of available memory which might be too little on smaller GitHub runners for running the tests

defaults:
  run:
    shell: bash

concurrency:
  # Only cancel jobs for PR updates
  group: operator-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  conditional:
    name: Check conditional workflows and jobs
    runs-on: ubuntu-latest
    outputs:
      operator: ${{ steps.conditional.outputs.operator }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: conditional
        uses: ./.github/actions/conditional
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build distribution
    if: needs.conditional.outputs.operator == 'true'
    runs-on: ubuntu-latest
    needs: conditional
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Keycloak
        uses: ./.github/actions/build-keycloak
        with:
          upload-m2-repo: false
          upload-dist: true

  test-local-apiserver:
    name: Test local apiserver
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Java
        uses: ./.github/actions/java-setup

      - name: Restore Quarkus snapshot cache
        if: github.ref == 'refs/heads/quarkus-next' || github.base_ref == 'quarkus-next'
        uses: ./.github/actions/quarkus-snapshot-cache

      - name: Test operator running locally
        run: |
          ./mvnw install -Poperator -pl :keycloak-operator -am

  test-remote:
    name: Test remote
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
          matrix:
            suite: [slow, fast]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set version
        id: vars
        run: echo "version_remote=0.0.1-${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Setup Java
        uses: ./.github/actions/java-setup

      - name: Restore Quarkus snapshot cache
        if: github.ref == 'refs/heads/quarkus-next' || github.base_ref == 'quarkus-next'
        uses: ./.github/actions/quarkus-snapshot-cache

      - name: Setup Minikube-Kubernetes
        uses: manusa/actions-setup-minikube@b65276017fdec6f1e6498129fb740e34e260dc55 # v2.18.0
        with:
          minikube version: ${{ env.MINIKUBE_VERSION }}
          kubernetes version: ${{ env.KUBERNETES_VERSION }}
          github token: ${{ secrets.GITHUB_TOKEN }}
          driver: docker
          start args: --addons=ingress --memory=${{ env.MINIKUBE_MEMORY }} --cni calico --cpus=max

      - name: Download keycloak distribution
        id: download-keycloak-dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: keycloak-dist
          path: quarkus/container

      - name: Build Keycloak Docker images
        run: |
          eval $(minikube -p minikube docker-env)
          (cd quarkus/container && docker build --build-arg KEYCLOAK_DIST=$(ls keycloak-*.tar.gz) . -t keycloak:${{ env.version_remote }})
          (cd operator && ./scripts/build-testing-docker-images.sh ${{ env.version_remote }} keycloak custom-keycloak)

      - name: Test operator running in cluster
        run: |
          declare -A PARAMS
          PARAMS["slow"]="-Dkc.quarkus.tests.groups=slow"
          PARAMS["fast"]='-Dkc.quarkus.tests.groups=!slow'
          
          eval $(minikube -p minikube docker-env)
          ./mvnw install -Poperator -pl :keycloak-operator -am \
              -Dquarkus.container-image.build=true \
              -Dquarkus.kubernetes.image-pull-policy=IfNotPresent \
              -Dkc.operator.keycloak.image=keycloak:${{ env.version_remote }} \
              -Dquarkus.kubernetes.env.vars.kc-operator-keycloak-image-pull-policy=Never \
              -Dtest.operator.custom.image=custom-keycloak:${{ env.version_remote }} \
              --no-transfer-progress -Dtest.operator.deployment=remote ${PARAMS["${{ matrix.suite }}"]}

  test-helm:
    name: Helm chart lint and smoke render
    if: needs.conditional.outputs.operator == 'true'
    runs-on: ubuntu-latest
    needs: conditional
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Java
        uses: ./.github/actions/java-setup

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.14.4

      - name: Generate the Helm chart
        # The Helm chart installs the Operator cluster-wide (see docs). Build it with
        # the cluster-wide profile so the generated RBAC watches all namespaces.
        run: ./mvnw -B -Poperator -Pcluster-wide -pl :keycloak-operator -am package -DskipTests

      - name: helm lint
        run: helm lint operator/target/helm/kubernetes/keycloak-operator

      - name: helm template — default
        run: |
          set -euo pipefail
          out=$(helm template kc-op operator/target/helm/kubernetes/keycloak-operator)
          # Default install ships one CRD per CR class (Keycloak, KeycloakRealmImport,
          # KeycloakOIDCClient, KeycloakSAMLClient) plus the operator's Deployment.
          crds=$(echo "$out" | grep -cE '^kind: "?CustomResourceDefinition"?$' || true)
          if [ "$crds" -ne 4 ]; then echo "expected 4 CRDs, got $crds"; exit 1; fi
          echo "$out" | grep -qE '^kind: Deployment$'
          # Cluster-wide install binds the controllers via ClusterRoleBinding.
          echo "$out" | grep -qE '^kind: ClusterRoleBinding$'
          # No resource should be rendered twice (kind+name+namespace must be unique).
          dupes=$(echo "$out" | awk '
            /^kind:/{k=$2} /^  name:/{n=$2} /^  namespace:/{ns=$2}
            /^---/{if(k&&n)print k"/"ns"/"n; k=n=ns=""}
            END{if(k&&n)print k"/"ns"/"n}' | sort | uniq -d)
          if [ -n "$dupes" ]; then echo "duplicate resources rendered:"; echo "$dupes"; exit 1; fi

      - name: helm template — crds.enabled=false
        run: |
          set -euo pipefail
          out=$(helm template kc-op operator/target/helm/kubernetes/keycloak-operator --set crds.enabled=false)
          # CRDs are excluded; everything else still renders.
          if echo "$out" | grep -qE '^kind: "?CustomResourceDefinition"?$'; then
            echo "expected no CRDs with crds.enabled=false"; exit 1
          fi
          echo "$out" | grep -cE '^kind: Deployment$' | grep -q '^1$'

      - name: helm template — resource overrides
        run: |
          set -euo pipefail
          out=$(helm template kc-op operator/target/helm/kubernetes/keycloak-operator \
            --set-string operator.resources.limits.cpu=1500m \
            --set-string operator.resources.limits.memory=1Gi)
          echo "$out" | grep -A4 'resources:' | grep -q 'cpu: 1500m'
          echo "$out" | grep -A4 'resources:' | grep -q 'memory: 1Gi'

  test-helm-install:
    name: Helm chart install on Kubernetes
    if: needs.conditional.outputs.operator == 'true'
    runs-on: ubuntu-latest
    needs: conditional
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Java
        uses: ./.github/actions/java-setup

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.14.4

      - name: Setup Minikube-Kubernetes
        uses: manusa/actions-setup-minikube@b65276017fdec6f1e6498129fb740e34e260dc55 # v2.18.0
        with:
          minikube version: ${{ env.MINIKUBE_VERSION }}
          kubernetes version: ${{ env.KUBERNETES_VERSION }}
          github token: ${{ secrets.GITHUB_TOKEN }}
          driver: docker
          start args: --memory=${{ env.MINIKUBE_MEMORY }} --cpus=max

      - name: Build the operator image and Helm chart
        # Build the chart cluster-wide (see test-helm) and the operator image in
        # one reactor run, inside minikube's docker daemon so the cluster can use
        # the image without a registry push. image-pull-policy=IfNotPresent makes
        # the kubelet use the local image instead of pulling.
        run: |
          eval $(minikube -p minikube docker-env)
          ./mvnw -B -Poperator -Pcluster-wide -pl :keycloak-operator -am package -DskipTests \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.tag=ci \
            -Dquarkus.kubernetes.image-pull-policy=IfNotPresent

      - name: helm install
        # A real API-server install validates what `helm template` cannot: the
        # ClusterRoleBinding ServiceAccount subjects must carry a namespace or
        # the API server rejects them. --wait blocks until the Deployment is
        # Available, so a crash-looping or unschedulable operator fails the job.
        run: |
          set -euo pipefail
          kubectl create namespace keycloak-operator
          helm install kc-op operator/target/helm/kubernetes/keycloak-operator \
            --namespace keycloak-operator \
            --set operator.image=keycloak/keycloak-operator:ci \
            --wait --timeout 5m

      - name: Verify the operator is running
        run: |
          set -euo pipefail
          kubectl -n keycloak-operator rollout status deployment/keycloak-operator --timeout=300s
          for crd in keycloaks keycloakrealmimports keycloakoidcclients keycloaksamlclients; do
            kubectl get crd "${crd}.k8s.keycloak.org"
          done
          kubectl -n keycloak-operator get pods

      - name: Dump operator diagnostics on failure
        if: failure()
        run: |
          kubectl -n keycloak-operator get all || true
          kubectl -n keycloak-operator describe deployment/keycloak-operator || true
          kubectl -n keycloak-operator logs deployment/keycloak-operator --tail=300 || true

  test-olm:
    name: Test OLM installation
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Java
        uses: ./.github/actions/java-setup

      - name: Restore Quarkus snapshot cache
        if: github.ref == 'refs/heads/quarkus-next' || github.base_ref == 'quarkus-next'
        uses: ./.github/actions/quarkus-snapshot-cache

      - name: Setup Minikube-Kubernetes
        uses: manusa/actions-setup-minikube@b65276017fdec6f1e6498129fb740e34e260dc55 # v2.18.0
        with:
          minikube version: ${{ env.MINIKUBE_VERSION }}
          kubernetes version: ${{ env.KUBERNETES_VERSION }}
          github token: ${{ secrets.GITHUB_TOKEN }}
          driver: docker
          start args: --memory=${{ env.MINIKUBE_MEMORY }} --addons=registry --insecure-registry=192.168.49.0/24

      - name: Install OPM / OC
        uses: redhat-actions/openshift-tools-installer@144527c7d98999f2652264c048c7a9bd103f8a82 # v1.13.1
        with:
          # openshift-tools-installer is out-of-date for later opm, which started using the binary name opm-rhelX.
          # we may have to do our own installation to move past this
          opm: 4.16.4
          oc: 4

      - name: Install Yq
        run: sudo snap install yq

      - name: Install OLM
        working-directory: operator
        run: ./scripts/install-olm.sh

      - name: Download keycloak distribution
        id: download-keycloak-dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: keycloak-dist
          path: quarkus/container

      - name: Arrange OLM test installation
        working-directory: operator
        run: |
          echo "Minikube IP $(minikube ip)"
          eval $(minikube -p minikube docker-env)
          REGISTRY=$(minikube ip):5000 ./scripts/olm-testing.sh ${GITHUB_SHA::6}

      - name: Deploy an example Keycloak and wait for it to be ready
        working-directory: operator/scripts
        run: |
          for file in ../target/kubernetes/*k8s.keycloak.org-v1.yml; do
            name=$(basename "$file" -v1.yml)
            ./check-crd-installed.sh ${name}
          done
          ./deploy-examples.sh
          
      - name: Single namespace cleanup
        working-directory: operator/scripts
        run: ./undeploy-examples.sh
      
      - name: Arrange OLM test installation for all namespaces
        working-directory: operator
        run: |
          kubectl patch operatorgroup og --type json --patch '[{"op":"remove","path":"/spec/targetNamespaces"}]'
       
      - name: Deploy an example Keycloak in a different namespace and wait for it to be ready
        working-directory: operator/scripts
        run: |
          kubectl create ns keycloak
          ./deploy-examples.sh keycloak
          ./undeploy-examples.sh keycloak

      - name: Install ServiceMonitor CRD
        working-directory: operator
        run: |
          kubectl apply -f src/test/resources/service-monitor-crds.yml
          ./scripts/check-crd-installed.sh servicemonitors
          kubectl delete pod -l name=keycloak-operator

      - name: Deploy an example Keycloak with ServiceMonitor
        working-directory: operator/scripts
        run: |
          ./deploy-examples.sh keycloak
          kubectl -n keycloak wait servicemonitor/example-kc --for=jsonpath='{.metadata.name}' --timeout=60s

      - name: Debug Custom Resources
        if: failure()
        run: |
          kubectl get keycloaks -A -o yaml
          kubectl get keycloakrealmimports -A -o yaml

      - name: Gather inspect report
        if: failure()
        run: oc adm inspect ns

      - name: Upload inspect report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oc-inspect
          path: inspect.*
          
  test-kustomize:
    name: Test kustomize installation
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: Set version
        id: vars
        run: echo "version_remote=0.0.1-${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Setup Java
        uses: ./.github/actions/java-setup

      - name: Restore Quarkus snapshot cache
        if: github.ref == 'refs/heads/quarkus-next' || github.base_ref == 'quarkus-next'
        uses: ./.github/actions/quarkus-snapshot-cache

      - name: Setup Minikube-Kubernetes
        uses: manusa/actions-setup-minikube@b65276017fdec6f1e6498129fb740e34e260dc55 # v2.18.0
        with:
          minikube version: ${{ env.MINIKUBE_VERSION }}
          kubernetes version: ${{ env.KUBERNETES_VERSION }}
          github token: ${{ secrets.GITHUB_TOKEN }}
          driver: docker
          start args: --memory=${{ env.MINIKUBE_MEMORY }} --addons=registry --insecure-registry=192.168.49.0/24

      - name: Install OPM / OC
        uses: redhat-actions/openshift-tools-installer@144527c7d98999f2652264c048c7a9bd103f8a82 # v1.13.1
        with:
          # openshift-tools-installer is out-of-date for later opm, which started using the binary name opm-rhelX.
          # we may have to do our own installation to move past this
          opm: 4.16.4
          oc: 4

      - name: Download keycloak distribution
        id: download-keycloak-dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: keycloak-dist
          path: quarkus/container

      - name: Build Keycloak Docker image
        run: |
          eval $(minikube -p minikube docker-env)
          (cd quarkus/container && docker build --build-arg KEYCLOAK_DIST=$(ls keycloak-*.tar.gz) . -t keycloak:${{ env.version_remote }})
          
      - name: Arrange kustomize test installation for own namespace
        run: |
          kubectl create ns keycloak-own
        
          eval $(minikube -p minikube docker-env)
          ./mvnw install -Poperator -pl :keycloak-operator -am \
              -Dquarkus.container-image.build=true \
              -Dquarkus.kubernetes.image-pull-policy=IfNotPresent \
              -Dkc.operator.keycloak.image=keycloak:${{ env.version_remote }} \
              -Dquarkus.kubernetes.env.vars.kc-operator-keycloak-image-pull-policy=Never \
              --no-transfer-progress -DskipTests -Dkustomize.namespace=keycloak-own
        
          kubectl apply -k operator/target/kubernetes
          
      - name: Deploy an example Keycloak and wait for it to be ready
        working-directory: operator/scripts
        run: |
          for file in ../target/kubernetes/*k8s.keycloak.org-v1.yml; do
            name=$(basename "$file" -v1.yml)
            ./check-crd-installed.sh ${name}
          done
          ./deploy-examples.sh keycloak-own
          ./undeploy-examples.sh keycloak-own
          kubectl delete ns keycloak-own
          
      - name: Arrange kustomize test installation for all namespaces
        run: |
          kubectl create ns keycloak-operator
          
          eval $(minikube -p minikube docker-env)
          ./mvnw install -Poperator -Pcluster-wide -pl :keycloak-operator -am \
              -Dquarkus.container-image.build=true \
              -Dquarkus.kubernetes.image-pull-policy=IfNotPresent \
              -Dkc.operator.keycloak.image=keycloak:${{ env.version_remote }} \
              -Dquarkus.kubernetes.env.vars.kc-operator-keycloak-image-pull-policy=Never \
              --no-transfer-progress -DskipTests
          
          kubectl apply -k operator/target/kubernetes

      - name: Deploy an example Keycloak and wait for it to be ready
        working-directory: operator/scripts
        run: |
          for file in ../target/kubernetes/*k8s.keycloak.org-v1.yml; do
            name=$(basename "$file" -v1.yml)
            ./check-crd-installed.sh ${name}
          done
          kubectl create ns keycloak
          ./deploy-examples.sh keycloak
          ./undeploy-examples.sh keycloak
            
      - name: Debug Custom Resources
        if: failure()
        run: |
          kubectl get keycloaks -A -o yaml
          kubectl get keycloakrealmimports -A -o yaml

      - name: Gather inspect report
        if: failure()
        run: oc adm inspect ns

      - name: Upload inspect report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oc-inspect
          path: inspect.*

  check:
    name: Status Check - Keycloak Operator CI
    if: always()
    needs:
      - conditional
      - build
      - test-local-apiserver
      - test-remote
      - test-helm
      - test-helm-install
      - test-olm
      - test-kustomize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/status-check
        with:
          jobs: ${{ toJSON(needs) }}
