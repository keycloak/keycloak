name: Pre-triage Pull Request

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
    branches:
      - main 

jobs:
  pre-triage:
    env:
      GH_TOKEN: ${{ github.token }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Check linked issues
        id: check-linked-issues
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          FAILED=0
          ERRORS=""
          MARKER="<!-- pre-triage-linked-issues -->"

          # Append an error message to the ERRORS list and emit a CI annotation.
          add_error() {
            echo "::error::$1"
            ERRORS="${ERRORS}"$'\n'"- $1"
            FAILED=1
          }

          # Extract linked issue numbers from a block of text.
          # Valid patterns: "Closes #NNN" (single issue) or "Resolves #NNN" (one or more issues),
          # each on its own line, case-sensitive, no colon after the keyword.
          extract_issues() {
            local text="$1"
            printf '%s\n' "$text" | grep -E '^(Closes|Resolves) #[0-9]+' | sed -E 's/^(Closes|Resolves) #//' | sort -u || true
          }

          # Validate issue-link formatting in a block of text and report errors.
          check_formatting() {
            local text="$1"
            local location="$2"

            # "Fixes" is for cross-repo references and must not be used here
            if printf '%s\n' "$text" | grep -qE '^Fixes #[0-9]+'; then
              add_error "$location: Use 'Closes' instead of 'Fixes' for issues in this repository"
            fi

            # No colon after the keyword
            if printf '%s\n' "$text" | grep -qE '^(Closes|Resolves): #[0-9]+'; then
              add_error "$location: Use 'Closes #NNN' without a colon (not 'Closes: #NNN')"
            fi

            # Keyword must be capitalized
            if printf '%s\n' "$text" | grep -qE '^closes #[0-9]+'; then
              add_error "$location: Use capitalized 'Closes' (not 'closes')"
            fi
            if printf '%s\n' "$text" | grep -qE '^resolves #[0-9]+'; then
              add_error "$location: Use capitalized 'Resolves' (not 'resolves')"
            fi
          }

          # --- Check PR description ---
          check_formatting "$PR_BODY" "PR description"
          PR_ISSUES=$(extract_issues "$PR_BODY")

          if [ -z "$PR_ISSUES" ]; then
            add_error "PR description must contain a linked issue using 'Closes #NNN' on its own line"
          fi

          # --- Check each commit in the PR ---
          ALL_COMMIT_ISSUES=""
          while IFS= read -r sha; do
            if ! COMMIT_MSG=$(gh api "repos/$REPO/git/commits/$sha" --jq '.message' 2>&1); then
              add_error "Failed to retrieve commit message for $sha: $COMMIT_MSG"
              continue
            fi
            check_formatting "$COMMIT_MSG" "Commit $sha"

            ISSUES=$(extract_issues "$COMMIT_MSG")
            if [ -z "$ISSUES" ]; then
              add_error "Commit $sha must contain a linked issue using 'Closes #NNN' on its own line"
            fi
            ALL_COMMIT_ISSUES="${ALL_COMMIT_ISSUES}"$'\n'"${ISSUES}"
          done < <(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/commits" --jq '.[].sha')

          if [ "$FAILED" -eq 0 ]; then
            COMMIT_ISSUES=$(printf '%s\n' "$ALL_COMMIT_ISSUES" | sort -u | grep -v '^$' || true)

            # --- Verify PR description and commits reference exactly the same issues ---
            while IFS= read -r issue; do
              if ! printf '%s\n' "$COMMIT_ISSUES" | grep -q "^${issue}$"; then
                add_error "Issue #$issue is linked in the PR description but not in the commit messages"
              fi
            done <<< "$PR_ISSUES"

            while IFS= read -r issue; do
              if ! printf '%s\n' "$PR_ISSUES" | grep -q "^${issue}$"; then
                add_error "Issue #$issue is linked in the commit messages but not in the PR description"
              fi
            done <<< "$COMMIT_ISSUES"
          fi

          if [ "$FAILED" -eq 0 ]; then
            # --- Enforce Closes vs Resolves based on issue count ---
            ISSUE_COUNT=$(printf '%s\n' "$PR_ISSUES" | grep -c '.' || true)
            if [ "$ISSUE_COUNT" -eq 1 ]; then
              if printf '%s\n' "$PR_BODY" | grep -qE '^Resolves #[0-9]+'; then
                add_error "PR description: Use 'Closes' (not 'Resolves') when linking a single issue"
              fi
            else
              if printf '%s\n' "$PR_BODY" | grep -qE '^Closes #[0-9]+'; then
                add_error "PR description: Use 'Resolves' (not 'Closes') when linking multiple issues"
              fi
            fi
          fi

          if [ "$FAILED" -eq 0 ]; then
            # --- Verify all linked issues are open ---
            while IFS= read -r issue; do
              if ! ISSUE_DATA=$(gh api "repos/$REPO/issues/$issue" 2>&1); then
                add_error "Issue #$issue could not be retrieved: $ISSUE_DATA"
                continue
              fi
              STATE=$(printf '%s' "$ISSUE_DATA" | jq -r '.state')
              if [ "$STATE" != "open" ]; then
                add_error "Issue #$issue is not open (current state: $STATE)"
              fi
            done <<< "$PR_ISSUES"
          fi

          # --- Find any existing bot comment with our marker ---
          EXISTING_COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1 || true)

          if [ "$FAILED" -ne 0 ]; then
            COMMENT_BODY="${MARKER}
Thank you for contributing this PR. The following linked issue checks failed:
${ERRORS}

Please refer to [CONTRIBUTING.md](https://github.com/${REPO}/blob/main/CONTRIBUTING.md) for requirements."

            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api "repos/$REPO/issues/comments/$EXISTING_COMMENT_ID" -X PATCH --raw-field "body=$COMMENT_BODY"
            else
              gh pr comment "$PR_NUMBER" -R "$REPO" --body "$COMMENT_BODY"
            fi
            exit 1
          else
            # Remove any previous failure comment on success
            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api "repos/$REPO/issues/comments/$EXISTING_COMMENT_ID" -X DELETE
            fi
            echo "All linked issue checks passed."
          fi

      - name: Add label
        if: steps.check-linked-issues.outcome == 'failure'
        run: gh pr edit "${{ github.event.pull_request.number }}" -R "$GITHUB_REPOSITORY" --add-label "action/waiting-for-author"
      # Label is removed when linked-issue checks do not fail
      - name: Remove label
        if: steps.check-linked-issues.outcome != 'failure'
        run: gh pr edit "${{ github.event.pull_request.number }}" -R "$GITHUB_REPOSITORY" --remove-label "action/waiting-for-author"
