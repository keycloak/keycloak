name: Time PartialImport DB Tests (All Databases)

on:
  workflow_dispatch:

jobs:
  time-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Keycloak
        uses: actions/checkout@v4

      - name: Setup Java 21 (Required for modern Keycloak)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Fast Build Keycloak Core (No Tests)
        # We must build the project first so the test module has the latest dependencies
        run: ./mvnw clean install -DskipTests -DskipTestsuite -T 1C

      - name: Run and Time partialimport Package - All Databases Sequentially
        run: |
          echo "=========================================================="
          echo "Running partialimport tests against all databases sequentially"
          echo "=========================================================="
          
          # Array of databases to test
          DATABASES=("h2" "postgres" "mariadb" "mysql")
          
          # Track overall start time
          OVERALL_START=$(date +%s)
          
          # Run tests for each database sequentially
          for DB in "${DATABASES[@]}"; do
            echo ""
            echo "=========================================================="
            echo "Starting tests for database: $DB"
            echo "=========================================================="
            
            # Start timing for this database
            DB_START=$(date +%s)
            
            # Run the tests
            ./mvnw test -pl tests/base -Dtest="org.keycloak.tests.admin.partialimport.**" -P$DB
            
            # Calculate duration for this database
            DB_END=$(date +%s)
            DB_DURATION=$((DB_END - DB_START))
            DB_MINUTES=$((DB_DURATION / 60))
            DB_SECONDS=$((DB_DURATION % 60))
            
            echo "=========================================================="
            echo "COMPLETED: $DB - Time: $DB_MINUTES minutes and $DB_SECONDS seconds"
            echo "=========================================================="
          done
          
          # Calculate overall duration
          OVERALL_END=$(date +%s)
          OVERALL_DURATION=$((OVERALL_END - OVERALL_START))
          OVERALL_MINUTES=$((OVERALL_DURATION / 60))
          OVERALL_SECONDS=$((OVERALL_DURATION % 60))
          
          echo ""
          echo "=========================================================="
          echo "ALL DATABASE TESTS COMPLETED"
          echo "Total time for all databases: $OVERALL_MINUTES minutes and $OVERALL_SECONDS seconds"
          echo "=========================================================="
