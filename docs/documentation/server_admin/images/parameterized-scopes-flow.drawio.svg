<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="880px" height="520px" viewBox="0 0 880 520" content="&lt;mxfile host=&quot;app.diagrams.net&quot;&gt;&lt;diagram name=&quot;Page-1&quot; id=&quot;parameterized-scopes-flow&quot;&gt;&lt;mxGraphModel dx=&quot;880&quot; dy=&quot;520&quot; grid=&quot;1&quot; gridSize=&quot;10&quot; guides=&quot;1&quot; tooltips=&quot;1&quot; connect=&quot;1&quot; arrows=&quot;1&quot; fold=&quot;1&quot; page=&quot;1&quot; pageScale=&quot;1&quot; pageWidth=&quot;880&quot; pageHeight=&quot;520&quot; math=&quot;0&quot; shadow=&quot;0&quot;&gt;&lt;root&gt;&lt;mxCell id=&quot;0&quot;/&gt;&lt;mxCell id=&quot;1&quot; parent=&quot;0&quot;/&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;&lt;/diagram&gt;&lt;/mxfile&gt;">
  <defs>
    <style type="text/css">
      .lifeline-box { fill: #cce5ff; stroke: #36393d; stroke-width: 1.5; rx: 8; ry: 8; }
      .lifeline-label { font-family: Helvetica, Arial, sans-serif; font-size: 13px; fill: #1a1a1a; text-anchor: middle; dominant-baseline: central; }
      .lifeline-sublabel { font-family: Helvetica, Arial, sans-serif; font-size: 11px; fill: #555555; text-anchor: middle; dominant-baseline: central; }
      .lifeline-dash { stroke: #36393d; stroke-width: 1; stroke-dasharray: 6 4; }
      .arrow-solid { stroke: #2d2d2d; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: #2d2d2d; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrowhead); }
      .arrow-label { font-family: Helvetica, Arial, sans-serif; font-size: 12px; fill: #1a1a1a; }
      .arrow-detail { font-family: 'Courier New', monospace; font-size: 11px; fill: #0066cc; }
      .note-box { fill: #fff9e6; stroke: #c9a800; stroke-width: 1; rx: 4; ry: 4; }
      .note-text { font-family: Helvetica, Arial, sans-serif; font-size: 11px; fill: #1a1a1a; }
      .note-code { font-family: 'Courier New', monospace; font-size: 11px; fill: #333333; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2d2d2d"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Lifeline boxes -->
  <rect class="lifeline-box" x="30" y="15" width="180" height="50"/>
  <text class="lifeline-label" x="120" y="33">ProjectHub</text>
  <text class="lifeline-sublabel" x="120" y="50">(Client)</text>

  <rect class="lifeline-box" x="340" y="15" width="180" height="50"/>
  <text class="lifeline-label" x="430" y="40">Keycloak</text>

  <rect class="lifeline-box" x="660" y="15" width="180" height="50"/>
  <text class="lifeline-label" x="750" y="33">ProjectService</text>
  <text class="lifeline-sublabel" x="750" y="50">(Resource Server)</text>

  <!-- Lifeline dashes -->
  <line class="lifeline-dash" x1="120" y1="65" x2="120" y2="500"/>
  <line class="lifeline-dash" x1="430" y1="65" x2="430" y2="500"/>
  <line class="lifeline-dash" x1="750" y1="65" x2="750" y2="500"/>

  <!-- Step 1: Authorization request -->
  <line class="arrow-solid" x1="120" y1="110" x2="422" y2="110"/>
  <text class="arrow-label" x="270" y="100">1. Authorization request</text>
  <text class="arrow-detail" x="270" y="125" text-anchor="middle">scope=openid project:backend-api</text>

  <!-- Step 2: Validate parameter -->
  <rect class="note-box" x="355" y="150" width="150" height="40"/>
  <text class="note-text" x="430" y="164" text-anchor="middle">Validate parameter</text>
  <text class="note-text" x="430" y="179" text-anchor="middle">(type: string ✓)</text>

  <!-- Step 3: Login & consent -->
  <line class="arrow-dashed" x1="430" y1="210" x2="128" y2="210"/>
  <text class="arrow-label" x="280" y="200" text-anchor="middle">2. Login &amp; consent prompt</text>
  <text class="arrow-detail" x="280" y="225" text-anchor="middle">consent: "project: backend-api"</text>

  <!-- Step 4: User authenticates -->
  <line class="arrow-solid" x1="120" y1="260" x2="422" y2="260"/>
  <text class="arrow-label" x="270" y="250" text-anchor="middle">3. Authenticate &amp; grant consent</text>

  <!-- Step 5: Access token -->
  <line class="arrow-dashed" x1="430" y1="310" x2="128" y2="310"/>
  <text class="arrow-label" x="280" y="295" text-anchor="middle">4. Access token</text>
  <text class="arrow-detail" x="280" y="325" text-anchor="middle">scope: "openid project:backend-api"</text>

  <!-- Step 6: API request -->
  <line class="arrow-solid" x1="120" y1="380" x2="742" y2="380"/>
  <text class="arrow-label" x="430" y="365" text-anchor="middle">5. API request with access token</text>
  <text class="arrow-detail" x="430" y="395" text-anchor="middle">GET /api/projects/backend-api/resources</text>

  <!-- Step 7: Enforce scope -->
  <rect class="note-box" x="665" y="410" width="170" height="40"/>
  <text class="note-text" x="750" y="424" text-anchor="middle">Enforce access based on</text>
  <text class="note-code" x="750" y="439" text-anchor="middle">project:backend-api</text>

  <!-- Step 8: Response -->
  <line class="arrow-dashed" x1="750" y1="470" x2="128" y2="470"/>
  <text class="arrow-label" x="430" y="460" text-anchor="middle">6. Project resources</text>

</svg>
