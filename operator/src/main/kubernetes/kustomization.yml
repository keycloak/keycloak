apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ${kustomize.namespace}

resources:
  - ${crds}
  - kubernetes.yml
  
transformers:
  - |-
    apiVersion: builtin
    kind: NamespaceTransformer
    metadata:
      name: notImportantHere
    setRoleBindingSubjects: allServiceAccounts
    fieldSpecs:
    - path: metadata/namespace
      create: true
